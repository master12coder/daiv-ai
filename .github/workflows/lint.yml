name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install ruff mypy pyyaml
      - name: Ruff check
        run: ruff check jyotish/ tests/ scripts/
      - name: Mypy check
        run: mypy jyotish/ --ignore-missing-imports
