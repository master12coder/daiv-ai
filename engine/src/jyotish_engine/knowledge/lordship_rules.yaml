# =============================================================================
# Parashari Jyotish Lordship Rules - Complete Encyclopedic Reference
# =============================================================================
# Based on Brihat Parashara Hora Shastra (BPHS) lordship principles:
#
#   - Kendra lords (houses 1, 4, 7, 10): Lose natural beneficence if naturally
#     benefic; gain beneficence if naturally malefic. This is the "Kendradhipati
#     dosha" for benefics and "Kendradhipati yoga" for malefics.
#   - Trikona lords (houses 1, 5, 9): Always functionally benefic regardless
#     of natural status.
#   - Dusthana lords (houses 3, 6, 8, 12): Functionally malefic.
#   - Yogakaraka: A single planet owning both a kendra and a trikona becomes
#     the most auspicious planet (yogakaraka) for that lagna.
#   - Maraka planets: Lords of the 2nd and 7th houses are maraka (death-
#     inflicting) planets.
#   - The lagna lord (1st house lord) is always benefic as it owns both a
#     kendra and a trikona simultaneously.
#
# House-Sign Mapping Reference (fixed for Nirayana/sidereal zodiac):
#   Aries=1, Taurus=2, Gemini=3, Cancer=4, Leo=5, Virgo=6,
#   Libra=7, Scorpio=8, Sagittarius=9, Capricorn=10, Aquarius=11, Pisces=12
#
# Dual-lordship planets (owning two signs):
#   Mars    -> Aries, Scorpio
#   Venus   -> Taurus, Libra
#   Mercury -> Gemini, Virgo
#   Jupiter -> Sagittarius, Pisces
#   Saturn  -> Capricorn, Aquarius
#
# Single-lordship luminaries:
#   Sun  -> Leo
#   Moon -> Cancer
#
# Rahu and Ketu do not own signs in classical Parashari system but act as
# agents of their sign dispositors and conjunct planets.
# =============================================================================

lagnas:

  # ===========================================================================
  # 1. MESHA (ARIES) LAGNA
  # ===========================================================================
  mesha:
    lagna_number: 1
    sign: Aries
    sign_sanskrit: Mesha
    sign_lord: Mars
    element: Fire
    modality: Chara (Cardinal)

    house_lords:
      1: Mars        # Aries - Kendra + Trikona
      2: Venus       # Taurus - Maraka
      3: Mercury     # Gemini - Dusthana (upachaya)
      4: Moon        # Cancer - Kendra
      5: Sun         # Leo - Trikona
      6: Mercury     # Virgo - Dusthana
      7: Venus       # Libra - Kendra + Maraka
      8: Mars        # Scorpio - Dusthana
      9: Jupiter     # Sagittarius - Trikona
      10: Saturn     # Capricorn - Kendra
      11: Saturn     # Aquarius - Labha (upachaya)
      12: Jupiter    # Pisces - Dusthana

    yogakaraka:
      planet: Sun
      reasoning: >
        Sun owns the 5th house (Leo), a trikona. While Sun does not simultaneously
        own a kendra, Parashara specifically singles out Sun as the most benefic
        planet for Mesha lagna due to its pure trikona lordship without any
        dusthana involvement. In strict dual-lordship yogakaraka terms, no single
        planet owns both a kendra and trikona (other than Mars who also owns the
        8th). Sun as 5th lord is the strongest functional benefic. Some texts
        consider Mars a conditional yogakaraka since it owns lagna (kendra+trikona)
        and the 8th, where its lagna lordship dominates.

    functional_benefics:
      - planet: Mars
        houses_owned: [1, 8]
        reasoning: >
          Lagna lord is always benefic. Ownership of 8th house (Scorpio) is
          mitigated because the 1st house lordship (kendra + trikona) dominates.
          Parashara states the lagna lord is always auspicious.
      - planet: Sun
        houses_owned: [5]
        reasoning: >
          5th lord (Leo) is a pure trikona lord. Sun has no other lordship.
          Pure trikona lordship makes Sun the most benefic planet for this lagna.
      - planet: Jupiter
        houses_owned: [9, 12]
        reasoning: >
          9th lord (Sagittarius) is a trikona lord. The 12th lordship (Pisces)
          introduces some blemish, but the 9th house trikona lordship is
          considered dominant. Jupiter remains benefic overall.
      - planet: Moon
        houses_owned: [4]
        reasoning: >
          4th lord (Cancer) is a kendra lord. As a natural benefic owning a
          kendra, Moon gets Kendradhipati dosha (reduced beneficence). However,
          Moon is still broadly favorable, especially when strong and well-placed.
          Classified as a mild benefic or neutral.

    functional_malefics:
      - planet: Mercury
        houses_owned: [3, 6]
        reasoning: >
          Mercury owns the 3rd (Gemini) and 6th (Virgo) houses, both dusthana/
          upachaya. Double dusthana lordship makes Mercury a clear functional
          malefic for Mesha lagna.
      - planet: Venus
        houses_owned: [2, 7]
        reasoning: >
          Venus owns the 2nd (Taurus) and 7th (Libra) houses. Both are maraka
          sthanas. Venus is a double maraka and also suffers Kendradhipati dosha
          as a natural benefic owning the 7th kendra. Venus is the chief
          functional malefic for Aries lagna.
      - planet: Saturn
        houses_owned: [10, 11]
        reasoning: >
          Saturn owns the 10th (Capricorn, a kendra) and 11th (Aquarius).
          Despite 10th house being a kendra (which normally helps a natural
          malefic), the 11th house lordship is considered inauspicious in
          Parashari rules. The combination makes Saturn a functional malefic.

    maraka:
      - planet: Venus
        houses: [2, 7]
        reasoning: >
          Venus is the lord of both maraka houses (2nd = Taurus, 7th = Libra).
          This makes Venus the primary and most potent maraka planet for Aries
          lagna. In its dasha/antardasha, Venus can bring health crises or
          death-like experiences, especially if afflicted.

    gemstone_recommendations:
      Mars:
        gemstone: Red Coral (Moonga)
        recommendation: wear
        reasoning: >
          Mars is the lagna lord. Strengthening Mars supports vitality, courage,
          identity, and overall life force. Always recommended for Mesha natives.
      Sun:
        gemstone: Ruby (Manikya)
        recommendation: wear
        reasoning: >
          Sun is the 5th lord (pure trikona). Strengthening Sun enhances
          intelligence, progeny matters, spiritual merit, and creativity.
          Highly recommended.
      Jupiter:
        gemstone: Yellow Sapphire (Pukhraj)
        recommendation: wear
        reasoning: >
          Jupiter is the 9th lord (trikona of dharma/fortune). Strengthening
          Jupiter enhances luck, higher learning, father, and spiritual growth.
          The 12th house co-lordship is secondary. Recommended.
      Moon:
        gemstone: Pearl (Moti)
        recommendation: test
        reasoning: >
          Moon is the 4th lord (kendra). As a natural benefic, Moon gets
          Kendradhipati dosha. Pearl can be worn if Moon is weak, waning, or
          afflicted in the chart; otherwise it may give mixed results.
      Mercury:
        gemstone: Emerald (Panna)
        recommendation: avoid
        reasoning: >
          Mercury rules the 3rd and 6th houses (both dusthana). Strengthening
          Mercury would amplify enemies, debts, diseases (6th) and unnecessary
          struggles (3rd). Avoid wearing emerald.
      Venus:
        gemstone: Diamond (Heera)
        recommendation: avoid
        reasoning: >
          Venus rules the 2nd and 7th (double maraka). Strengthening Venus can
          activate maraka effects and bring health dangers. Also a functional
          malefic. Strictly avoid.
      Saturn:
        gemstone: Blue Sapphire (Neelam)
        recommendation: avoid
        reasoning: >
          Saturn rules the 10th and 11th houses. The 11th lordship makes Saturn
          a functional malefic. Strengthening Saturn may amplify obstacles.
          Avoid unless Saturn is in its own sign/exalted and specifically needed
          for career in a well-analyzed chart.

  # ===========================================================================
  # 2. VRISHABHA (TAURUS) LAGNA
  # ===========================================================================
  vrishabha:
    lagna_number: 2
    sign: Taurus
    sign_sanskrit: Vrishabha
    sign_lord: Venus
    element: Earth
    modality: Sthira (Fixed)

    house_lords:
      1: Venus       # Taurus - Kendra + Trikona
      2: Mercury     # Gemini - Maraka
      3: Moon        # Cancer - Dusthana (upachaya)
      4: Sun         # Leo - Kendra
      5: Mercury     # Virgo - Trikona
      6: Venus       # Libra - Dusthana
      7: Mars        # Scorpio - Kendra + Maraka
      8: Jupiter     # Sagittarius - Dusthana
      9: Saturn      # Capricorn - Trikona
      10: Saturn     # Aquarius - Kendra
      11: Jupiter    # Pisces - Labha
      12: Mars       # Aries - Dusthana

    yogakaraka:
      planet: Saturn
      reasoning: >
        Saturn owns the 9th house (Capricorn, a trikona) and the 10th house
        (Aquarius, a kendra). Simultaneous ownership of a kendra and a trikona
        by a single planet is the textbook definition of yogakaraka. Saturn is
        the undisputed yogakaraka for Vrishabha lagna. This is one of the
        clearest yogakaraka assignments in Jyotish.

    functional_benefics:
      - planet: Venus
        houses_owned: [1, 6]
        reasoning: >
          Venus is the lagna lord (Taurus). Lagna lordship always confers
          beneficence. The 6th house co-lordship (Libra) is secondary and
          mitigated by the primacy of the 1st house. Venus remains benefic.
      - planet: Saturn
        houses_owned: [9, 10]
        reasoning: >
          Saturn is the yogakaraka, owning the 9th (trikona) and 10th (kendra).
          The most auspicious planet for this lagna. Saturn's dashas bring
          prosperity, career success, and spiritual advancement.
      - planet: Mercury
        houses_owned: [2, 5]
        reasoning: >
          Mercury owns the 5th house (Virgo, a trikona) and the 2nd house
          (Gemini). The 5th lordship confers strong beneficence. The 2nd
          lordship adds wealth significations. Mercury is benefic overall,
          though the 2nd house also carries maraka potential.
      - planet: Sun
        houses_owned: [4]
        reasoning: >
          Sun owns the 4th house (Leo, a kendra). As a natural malefic owning
          a kendra, Sun gains beneficence (Kendradhipati yoga for malefics).
          Sun is a mild benefic for Taurus lagna.

    functional_malefics:
      - planet: Jupiter
        houses_owned: [8, 11]
        reasoning: >
          Jupiter owns the 8th (Sagittarius, dusthana) and 11th (Pisces).
          Both lordships are inauspicious in Parashari rules. Despite being
          a natural benefic, Jupiter is the chief functional malefic for
          Vrishabha lagna. This is a frequently misunderstood assignment.
      - planet: Mars
        houses_owned: [7, 12]
        reasoning: >
          Mars owns the 7th (Scorpio, kendra + maraka) and 12th (Aries,
          dusthana). The 12th lordship is inauspicious, and the 7th makes
          Mars a maraka. Mars is a functional malefic.
      - planet: Moon
        houses_owned: [3]
        reasoning: >
          Moon owns the 3rd house (Cancer). The 3rd is a mild dusthana/
          upachaya. Moon is a mild functional malefic or neutral, less
          harmful than Jupiter or Mars but not supportive either.

    maraka:
      - planet: Mercury
        houses: [2]
        reasoning: >
          Mercury owns the 2nd house (Gemini), a maraka sthana. However,
          Mercury also owns the 5th (trikona), which significantly dilutes
          its maraka potential. Mercury is a mild maraka at best.
      - planet: Mars
        houses: [7]
        reasoning: >
          Mars owns the 7th house (Scorpio), the other maraka sthana. Combined
          with 12th lordship (Aries), Mars is a more potent maraka than Mercury
          for this lagna.

    gemstone_recommendations:
      Venus:
        gemstone: Diamond (Heera)
        recommendation: wear
        reasoning: >
          Venus is the lagna lord. Strengthening Venus supports health, personality,
          charisma, and overall well-being. Always recommended for Vrishabha natives.
      Saturn:
        gemstone: Blue Sapphire (Neelam)
        recommendation: wear
        reasoning: >
          Saturn is the yogakaraka (9th + 10th lord). Strengthening Saturn enhances
          fortune, career, dharma, and overall prosperity. Highly recommended.
      Mercury:
        gemstone: Emerald (Panna)
        recommendation: wear
        reasoning: >
          Mercury owns the 5th (trikona) and 2nd houses. Strengthening Mercury
          enhances intelligence, progeny, wealth, and speech. Recommended.
      Sun:
        gemstone: Ruby (Manikya)
        recommendation: test
        reasoning: >
          Sun is the 4th lord (kendra). As a malefic gaining kendra beneficence,
          it is mildly positive. Ruby can be worn if Sun is weak and the native
          needs support in property, education, or domestic happiness.
      Jupiter:
        gemstone: Yellow Sapphire (Pukhraj)
        recommendation: avoid
        reasoning: >
          Jupiter owns the 8th and 11th houses, both inauspicious. Strengthening
          Jupiter amplifies sudden disruptions, obstacles, and unfulfilled desires.
          Avoid wearing yellow sapphire.
      Mars:
        gemstone: Red Coral (Moonga)
        recommendation: avoid
        reasoning: >
          Mars owns the 7th (maraka) and 12th (loss). Strengthening Mars can
          activate maraka effects and increase expenditure/loss. Avoid.
      Moon:
        gemstone: Pearl (Moti)
        recommendation: neutral
        reasoning: >
          Moon owns only the 3rd house (mild dusthana). Pearl is generally not
          recommended but not strongly contraindicated. Wear only if Moon is
          severely afflicted and the native needs emotional stability.

  # ===========================================================================
  # 3. MITHUNA (GEMINI) LAGNA
  # ===========================================================================
  mithuna:
    lagna_number: 3
    sign: Gemini
    sign_sanskrit: Mithuna
    sign_lord: Mercury
    element: Air
    modality: Dwiswabhava (Mutable)

    house_lords:
      1: Mercury     # Gemini - Kendra + Trikona
      2: Moon        # Cancer - Maraka
      3: Sun         # Leo - Dusthana (upachaya)
      4: Mercury     # Virgo - Kendra
      5: Venus       # Libra - Trikona
      6: Mars        # Scorpio - Dusthana
      7: Jupiter     # Sagittarius - Kendra + Maraka
      8: Saturn      # Capricorn - Dusthana
      9: Saturn      # Aquarius - Trikona
      10: Jupiter    # Pisces - Kendra
      11: Mars       # Aries - Labha
      12: Venus      # Taurus - Dusthana

    yogakaraka:
      planet: Venus
      reasoning: >
        Venus owns the 5th house (Libra, a trikona). Venus does not simultaneously
        own a kendra, so it is not a strict yogakaraka by the dual-lordship
        definition. However, Venus is the strongest functional benefic for Mithuna
        lagna as the pure 5th lord. Saturn owns the 9th (trikona) and 8th
        (dusthana), giving mixed results. In practice, Venus is treated as the
        most auspicious planet. Some authorities consider no planet a strict
        yogakaraka for Gemini lagna since no single planet owns both a kendra
        and trikona (Mercury owns 1st and 4th, both kendras, not kendra+trikona
        in the yogakaraka sense since 1st is both).

    functional_benefics:
      - planet: Mercury
        houses_owned: [1, 4]
        reasoning: >
          Mercury is the lagna lord (Gemini) and 4th lord (Virgo). Owning the
          1st house (kendra + trikona) ensures beneficence. The 4th is also
          a kendra. Mercury is the anchor planet for this lagna.
      - planet: Venus
        houses_owned: [5, 12]
        reasoning: >
          Venus owns the 5th house (Libra, trikona) and 12th house (Taurus).
          The 5th lordship confers strong beneficence. The 12th lordship is a
          blemish but is overridden by the trikona ownership. Venus is the
          strongest benefic after the lagna lord.
      - planet: Saturn
        houses_owned: [8, 9]
        reasoning: >
          Saturn owns the 9th house (Aquarius, trikona) and the 8th house
          (Capricorn, dusthana). The 9th lordship is highly benefic, but the
          8th lordship introduces complications. Parashara states that when a
          planet owns both a trikona and dusthana, the trikona lordship
          prevails. Saturn is benefic overall but with caveats.

    functional_malefics:
      - planet: Mars
        houses_owned: [6, 11]
        reasoning: >
          Mars owns the 6th (Scorpio, dusthana) and 11th (Aries). Both
          lordships are inauspicious. Mars is the chief functional malefic
          for Mithuna lagna.
      - planet: Jupiter
        houses_owned: [7, 10]
        reasoning: >
          Jupiter owns the 7th (Sagittarius, kendra + maraka) and 10th
          (Pisces, kendra). As a natural benefic owning two kendras, Jupiter
          gets double Kendradhipati dosha. Jupiter is a functional malefic
          and maraka for Gemini lagna. This is one of the most counterintuitive
          but well-established rules in Parashari Jyotish.
      - planet: Sun
        houses_owned: [3]
        reasoning: >
          Sun owns the 3rd house (Leo), a mild dusthana/upachaya. Sun is a
          mild functional malefic. Its single lordship of the 3rd makes it
          less harmful than Mars or Jupiter but still not supportive.

    maraka:
      - planet: Moon
        houses: [2]
        reasoning: >
          Moon owns the 2nd house (Cancer), a maraka sthana. With single
          lordship of only the 2nd house, Moon is a straightforward maraka
          for Gemini lagna.
      - planet: Jupiter
        houses: [7]
        reasoning: >
          Jupiter owns the 7th house (Sagittarius), the other maraka sthana.
          Combined with being a functional malefic due to Kendradhipati dosha,
          Jupiter is a potent maraka.

    gemstone_recommendations:
      Mercury:
        gemstone: Emerald (Panna)
        recommendation: wear
        reasoning: >
          Mercury is the lagna lord and 4th lord. Strengthening Mercury
          supports intellect, communication, health, education, and property.
          Always recommended for Mithuna natives.
      Venus:
        gemstone: Diamond (Heera)
        recommendation: wear
        reasoning: >
          Venus is the 5th lord (trikona). Strengthening Venus enhances
          intelligence, creativity, romance, and spiritual merit. Recommended.
      Saturn:
        gemstone: Blue Sapphire (Neelam)
        recommendation: test
        reasoning: >
          Saturn owns the 9th (trikona) and 8th (dusthana). Results are mixed.
          Blue Sapphire can be worn if Saturn is well-placed and the native
          needs fortune/dharma support, but test carefully due to the 8th
          house co-lordship.
      Moon:
        gemstone: Pearl (Moti)
        recommendation: avoid
        reasoning: >
          Moon is the 2nd lord (maraka). Strengthening Moon can activate
          maraka effects. Avoid wearing pearl unless Moon is extremely well-
          placed and the native needs specific 2nd house support (wealth,
          family).
      Mars:
        gemstone: Red Coral (Moonga)
        recommendation: avoid
        reasoning: >
          Mars owns the 6th and 11th, both inauspicious houses. Strengthening
          Mars amplifies enemies, conflicts, and unfulfilled ambitions. Avoid.
      Jupiter:
        gemstone: Yellow Sapphire (Pukhraj)
        recommendation: avoid
        reasoning: >
          Jupiter is a functional malefic (7th + 10th lord with Kendradhipati
          dosha) and a maraka. Strengthening Jupiter can bring health dangers
          and obstacles disguised as opportunities. Avoid.
      Sun:
        gemstone: Ruby (Manikya)
        recommendation: neutral
        reasoning: >
          Sun owns only the 3rd house (mild dusthana). Ruby is generally not
          recommended but not strongly harmful. May be worn during Sun dasha
          if Sun is very weak and the native needs courage and initiative.

  # ===========================================================================
  # 4. KARKA (CANCER) LAGNA
  # ===========================================================================
  karka:
    lagna_number: 4
    sign: Cancer
    sign_sanskrit: Karka
    sign_lord: Moon
    element: Water
    modality: Chara (Cardinal)

    house_lords:
      1: Moon        # Cancer - Kendra + Trikona
      2: Sun         # Leo - Maraka
      3: Mercury     # Virgo - Dusthana (upachaya)
      4: Venus       # Libra - Kendra
      5: Mars        # Scorpio - Trikona
      6: Jupiter     # Sagittarius - Dusthana
      7: Saturn      # Capricorn - Kendra + Maraka
      8: Saturn      # Aquarius - Dusthana
      9: Jupiter     # Pisces - Trikona
      10: Mars       # Aries - Kendra
      11: Venus      # Taurus - Labha
      12: Mercury    # Gemini - Dusthana

    yogakaraka:
      planet: Mars
      reasoning: >
        Mars owns the 5th house (Scorpio, a trikona) and the 10th house (Aries,
        a kendra). This simultaneous kendra-trikona ownership makes Mars the
        textbook yogakaraka for Karka lagna. Mars dashas can bring tremendous
        success in career, progeny, and creative endeavors. This is one of the
        most celebrated yogakaraka positions in Jyotish.

    functional_benefics:
      - planet: Moon
        houses_owned: [1]
        reasoning: >
          Moon is the lagna lord (Cancer). The lagna lord is always benefic.
          Strengthening Moon is essential for Cancer natives.
      - planet: Mars
        houses_owned: [5, 10]
        reasoning: >
          Mars is the yogakaraka, owning the 5th (trikona) and 10th (kendra).
          Mars is the most powerful benefic for this lagna, bringing raja yoga
          potential.
      - planet: Jupiter
        houses_owned: [6, 9]
        reasoning: >
          Jupiter owns the 9th (Pisces, trikona) and 6th (Sagittarius, dusthana).
          The 9th lordship dominates, making Jupiter benefic overall. The 6th
          co-lordship introduces some blemish but does not negate the trikona
          beneficence.

    functional_malefics:
      - planet: Saturn
        houses_owned: [7, 8]
        reasoning: >
          Saturn owns the 7th (Capricorn, kendra + maraka) and 8th (Aquarius,
          dusthana). The 8th lordship is deeply inauspicious, and the 7th makes
          Saturn a maraka. Saturn is the primary functional malefic for Cancer
          lagna.
      - planet: Venus
        houses_owned: [4, 11]
        reasoning: >
          Venus owns the 4th (Libra, kendra) and 11th (Taurus). The 11th
          lordship is inauspicious, and as a natural benefic owning the 4th
          kendra, Venus gets Kendradhipati dosha. Venus is a functional malefic.
      - planet: Mercury
        houses_owned: [3, 12]
        reasoning: >
          Mercury owns the 3rd (Virgo) and 12th (Gemini), both dusthana.
          Double dusthana lordship makes Mercury a functional malefic.
      - planet: Sun
        houses_owned: [2]
        reasoning: >
          Sun owns the 2nd house (Leo), a maraka sthana. Sun is a mild
          functional malefic/neutral due to maraka lordship. However, Sun is
          a friend of the lagna lord Moon, which mitigates some harm.

    maraka:
      - planet: Sun
        houses: [2]
        reasoning: >
          Sun owns the 2nd house (Leo), a maraka sthana. Sun is a maraka
          for Cancer lagna, though its natural friendship with Moon (lagna
          lord) reduces the severity somewhat.
      - planet: Saturn
        houses: [7]
        reasoning: >
          Saturn owns the 7th house (Capricorn), the other maraka sthana.
          Combined with 8th lordship, Saturn is the most dangerous maraka
          for Cancer lagna. Saturn dashas require careful attention.

    gemstone_recommendations:
      Moon:
        gemstone: Pearl (Moti)
        recommendation: wear
        reasoning: >
          Moon is the lagna lord. Pearl strengthens health, mind, emotions,
          and overall vitality. Essential for Cancer natives.
      Mars:
        gemstone: Red Coral (Moonga)
        recommendation: wear
        reasoning: >
          Mars is the yogakaraka (5th + 10th lord). Red Coral enhances career,
          intelligence, courage, and success. Highly recommended.
      Jupiter:
        gemstone: Yellow Sapphire (Pukhraj)
        recommendation: wear
        reasoning: >
          Jupiter is the 9th lord (trikona of dharma). Yellow Sapphire enhances
          fortune, spirituality, and wisdom. The 6th co-lordship is secondary.
          Recommended.
      Sun:
        gemstone: Ruby (Manikya)
        recommendation: test
        reasoning: >
          Sun is the 2nd lord (maraka). However, Sun is friendly to the lagna
          lord Moon and governs wealth and family. Test with caution; may be
          worn if Sun is weak and wealth/family matters need support.
      Saturn:
        gemstone: Blue Sapphire (Neelam)
        recommendation: avoid
        reasoning: >
          Saturn owns the 7th (maraka) and 8th (dusthana). Strengthening Saturn
          amplifies longevity threats and sudden calamities. Avoid.
      Venus:
        gemstone: Diamond (Heera)
        recommendation: avoid
        reasoning: >
          Venus owns the 4th and 11th. The 11th lordship makes Venus a functional
          malefic, and Kendradhipati dosha applies. Avoid wearing diamond.
      Mercury:
        gemstone: Emerald (Panna)
        recommendation: avoid
        reasoning: >
          Mercury owns the 3rd and 12th (double dusthana). Strengthening Mercury
          amplifies losses, expenses, and unnecessary struggles. Avoid.

  # ===========================================================================
  # 5. SIMHA (LEO) LAGNA
  # ===========================================================================
  simha:
    lagna_number: 5
    sign: Leo
    sign_sanskrit: Simha
    sign_lord: Sun
    element: Fire
    modality: Sthira (Fixed)

    house_lords:
      1: Sun         # Leo - Kendra + Trikona
      2: Mercury     # Virgo - Maraka
      3: Venus       # Libra - Dusthana (upachaya)
      4: Mars        # Scorpio - Kendra
      5: Jupiter     # Sagittarius - Trikona
      6: Saturn      # Capricorn - Dusthana
      7: Saturn      # Aquarius - Kendra + Maraka
      8: Jupiter     # Pisces - Dusthana
      9: Mars        # Aries - Trikona
      10: Venus      # Taurus - Kendra
      11: Mercury    # Gemini - Labha
      12: Moon       # Cancer - Dusthana

    yogakaraka:
      planet: Mars
      reasoning: >
