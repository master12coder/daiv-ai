# =============================================================================
# GENERAL NOTES ON APPLICATION
# =============================================================================
#
# 1. These rules are based on Parashari (BPHS) lordship principles and
#    represent the DEFAULT functional nature of planets for each lagna.
#
# 2. Actual results depend heavily on:
#    - The planet's placement (house, sign, nakshatra)
#    - Conjunctions and aspects received
#    - Strength (shadbala, dig bala, etc.)
#    - Dasha/antardasha periods active
#    - Divisional chart (varga) positions
#
# 3. Kendradhipati Dosha: Natural benefics (Jupiter, Venus, Mercury, Moon)
#    owning kendras lose their beneficence. Natural malefics (Saturn, Mars,
#    Sun) owning kendras gain beneficence. This is BPHS Ch. 34.
#
# 4. The lagna lord is ALWAYS treated as benefic regardless of its other
#    lordship (even if it owns a dusthana as well).
#
# 5. Rahu and Ketu are not included as they do not own signs in classical
#    Parashari system. Their results depend on:
#    - Sign dispositor (the planet owning the sign they occupy)
#    - Conjunct planets
#    - Nakshatra lord
#    They amplify the results of their dispositors.
#
# 6. Gemstone recommendations are general guidelines. Individual chart
#    analysis by a qualified Jyotishi should always precede wearing any
#    gemstone, especially Blue Sapphire (Neelam) which requires testing.
#
# 7. "Test" recommendation means: wear the gemstone for a trial period of
#    3-7 days (ideally during the planet's hora or day) and observe effects
#    before committing to long-term wear.
#
# =============================================================================
