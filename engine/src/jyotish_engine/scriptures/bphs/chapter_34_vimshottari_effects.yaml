book: BPHS
chapter: 34
title: "Vimshottari Dasha Effects"
rules:
  # === MAHADASHA GENERAL EFFECTS (9 rules, one per planet) ===

  - verse: 1
    topic: mahadasha_effects
    planets: [Sun]
    houses: []
    text_sanskrit: "Surya Mahadasha Samanya Phalam"
    text_english: "Sun Mahadasha (6 years): Period of authority, government connections, father's influence, and self-expression. Career advancement through leadership and administrative roles. Health focus on heart, eyes, bones, and vitality. Best results when Sun is strong in Leo, Aries (exalted), or in the 10th house. The native gains recognition, develops self-confidence, and assumes positions of command. Government jobs, political careers, and dealings with authority figures are highlighted."
    text_hindi: "सूर्य महादशा (6 वर्ष): अधिकार, शासकीय सम्पर्क, पिता का प्रभाव और आत्माभिव्यक्ति का काल। नेतृत्व और प्रशासनिक भूमिकाओं से व्यावसायिक उन्नति। हृदय, नेत्र, अस्थि और जीवनशक्ति पर स्वास्थ्य केन्द्रित। सूर्य सिंह, मेष (उच्च) या 10वें भाव में बलवान हो तो सर्वोत्तम फल। जातक मान्यता प्राप्त करता है, आत्मविश्वास विकसित करता है, और आज्ञा पद ग्रहण करता है। सरकारी नौकरी, राजनीतिक कैरियर और अधिकारियों से व्यवहार प्रमुख होता है।"
    rule_type: dasha

  - verse: 2
    topic: mahadasha_effects
    planets: [Moon]
    houses: []
    text_sanskrit: "Chandra Mahadasha Samanya Phalam"
    text_english: "Moon Mahadasha (10 years): Period of emotional development, public dealings, mother's role, and mental growth. Gains through liquids, dairy, agriculture, travel, hospitality, and nursing/caregiving professions. Health focus on mind, stomach, breasts, and body fluids. Best when Moon is waxing, in Cancer (own sign), or Taurus (exalted). The native becomes sensitive, nurturing, popular with masses, and gains property and domestic happiness."
    text_hindi: "चन्द्र महादशा (10 वर्ष): भावनात्मक विकास, जन-व्यवहार, माता की भूमिका और मानसिक वृद्धि का काल। तरल पदार्थ, डेयरी, कृषि, यात्रा, आतिथ्य और सेवा व्यवसायों से लाभ। मन, उदर, वक्ष और शारीरिक तरल पदार्थों पर स्वास्थ्य केन्द्रित। चन्द्रमा शुक्ल पक्ष में, कर्क (स्वराशि) या वृषभ (उच्च) में हो तो सर्वोत्तम। जातक संवेदनशील, स्नेही, जनप्रिय बनता है और सम्पत्ति तथा गृह सुख प्राप्त करता है।"
    rule_type: dasha

  - verse: 3
    topic: mahadasha_effects
    planets: [Mars]
    houses: []
    text_sanskrit: "Kuja Mahadasha Samanya Phalam"
    text_english: "Mars Mahadasha (7 years): Period of energy, courage, ambition, and action. Gains through land, property, engineering, military, police, surgery, and sports. Health focus on blood, muscles, head injuries, and fevers. Best when Mars is in Aries, Scorpio (own signs), or Capricorn (exalted). The native becomes bold, competitive, acquires property, and achieves through determined effort. Sibling matters and landed property are major themes."
    text_hindi: "मंगल महादशा (7 वर्ष): ऊर्जा, साहस, महत्वाकांक्षा और कर्म का काल। भूमि, सम्पत्ति, अभियान्त्रिकी, सेना, पुलिस, शल्य चिकित्सा और खेल से लाभ। रक्त, माँसपेशी, शिर आघात और ज्वर पर स्वास्थ्य केन्द्रित। मंगल मेष, वृश्चिक (स्वराशि) या मकर (उच्च) में हो तो सर्वोत्तम। जातक साहसी, प्रतिस्पर्धी बनता है, सम्पत्ति अर्जित करता है, और दृढ़ प्रयास से सफलता पाता है। भाई-बहन और भूसम्पत्ति प्रमुख विषय हैं।"
    rule_type: dasha

  - verse: 4
    topic: mahadasha_effects
    planets: [Rahu]
    houses: []
    text_sanskrit: "Rahu Mahadasha Samanya Phalam"
    text_english: "Rahu Mahadasha (18 years): Period of worldly ambition, foreign connections, unconventional pursuits, and material obsession. Gains through technology, foreign trade, diplomacy, research, and unorthodox professions. Health focus on nervous disorders, poisoning, skin ailments, and psychosomatic illnesses. Best when Rahu is in Taurus, Aquarius, Gemini, or Virgo. The native experiences sudden rise, foreign travel, and dramatic life changes. Results are amplified versions of the sign lord's effects."
    text_hindi: "राहु महादशा (18 वर्ष): सांसारिक महत्वाकांक्षा, विदेशी सम्पर्क, अपारम्परिक कार्य और भौतिक आसक्ति का काल। प्रौद्योगिकी, विदेशी व्यापार, कूटनीति, शोध और अपारम्परिक व्यवसायों से लाभ। तन्त्रिका विकार, विषाक्तता, त्वचा रोग और मनोदैहिक रोगों पर स्वास्थ्य केन्द्रित। राहु वृषभ, कुम्भ, मिथुन या कन्या में हो तो सर्वोत्तम। जातक अचानक उन्नति, विदेश यात्रा और नाटकीय जीवन परिवर्तन अनुभव करता है। फल राशि स्वामी के प्रभावों का प्रवर्धित रूप होते हैं।"
    rule_type: dasha

  - verse: 5
    topic: mahadasha_effects
    planets: [Jupiter]
    houses: []
    text_sanskrit: "Guru Mahadasha Samanya Phalam"
    text_english: "Jupiter Mahadasha (16 years): Period of wisdom, expansion, fortune, and spiritual growth. Gains through teaching, law, finance, religion, philosophy, and advisory roles. Health focus on liver, fat metabolism, diabetes, and obesity. Best when Jupiter is in Sagittarius, Pisces (own signs), or Cancer (exalted). The native gains children, wealth, guru's guidance, higher education, and pilgrimage opportunities. Marriage, if pending, often occurs. Most benevolent Mahadasha when Jupiter is strong."
    text_hindi: "गुरु महादशा (16 वर्ष): ज्ञान, विस्तार, भाग्य और आध्यात्मिक वृद्धि का काल। शिक्षण, विधि, वित्त, धर्म, दर्शन और परामर्श भूमिकाओं से लाभ। यकृत, वसा चयापचय, मधुमेह और मोटापे पर स्वास्थ्य केन्द्रित। गुरु धनु, मीन (स्वराशि) या कर्क (उच्च) में हो तो सर्वोत्तम। जातक सन्तान, धन, गुरु मार्गदर्शन, उच्च शिक्षा और तीर्थयात्रा प्राप्त करता है। विवाह शेष हो तो प्रायः होता है। बलवान गुरु की महादशा सर्वाधिक कल्याणकारी।"
    rule_type: dasha

  - verse: 6
    topic: mahadasha_effects
    planets: [Saturn]
    houses: []
    text_sanskrit: "Shani Mahadasha Samanya Phalam"
    text_english: "Saturn Mahadasha (19 years): Period of discipline, karma, endurance, and delayed rewards. Gains through oil, iron, coal, agriculture, mining, real estate, labour, and service to the masses. Health focus on joints, bones, chronic diseases, and depression. Best when Saturn is in Capricorn, Aquarius (own signs), or Libra (exalted). The native achieves through sustained hard work, patience, and perseverance. Results are slow but permanent. Democratic leadership and service-oriented success are highlighted."
    text_hindi: "शनि महादशा (19 वर्ष): अनुशासन, कर्म, सहनशक्ति और विलम्बित प्रतिफल का काल। तेल, लोहा, कोयला, कृषि, खनन, भूसम्पत्ति, श्रम और जनसेवा से लाभ। जोड़ों, अस्थियों, दीर्घकालिक रोगों और अवसाद पर स्वास्थ्य केन्द्रित। शनि मकर, कुम्भ (स्वराशि) या तुला (उच्च) में हो तो सर्वोत्तम। जातक निरन्तर कठिन परिश्रम, धैर्य और दृढ़ता से सफलता प्राप्त करता है। फल धीमे किन्तु स्थायी होते हैं। लोकतान्त्रिक नेतृत्व और सेवामूलक सफलता प्रमुख होती है।"
    rule_type: dasha

  - verse: 7
    topic: mahadasha_effects
    planets: [Mercury]
    houses: []
    text_sanskrit: "Budha Mahadasha Samanya Phalam"
    text_english: "Mercury Mahadasha (17 years): Period of intellect, communication, trade, and analytical ability. Gains through commerce, writing, accounting, astrology, IT, media, and teaching. Health focus on nervous system, skin, lungs, and speech disorders. Best when Mercury is in Gemini, Virgo (own signs/exalted). The native develops sharp intellect, succeeds in business, excels in education, and earns through multiple skills. A versatile period favouring adaptability and mental agility."
    text_hindi: "बुध महादशा (17 वर्ष): बुद्धि, संचार, व्यापार और विश्लेषणात्मक क्षमता का काल। वाणिज्य, लेखन, लेखांकन, ज्योतिष, सूचना प्रौद्योगिकी, मीडिया और शिक्षण से लाभ। तन्त्रिका तन्त्र, त्वचा, फेफड़े और वाक् विकारों पर स्वास्थ्य केन्द्रित। बुध मिथुन, कन्या (स्वराशि/उच्च) में हो तो सर्वोत्तम। जातक तीक्ष्ण बुद्धि विकसित करता है, व्यापार में सफल होता है, शिक्षा में उत्कृष्ट होता है, और अनेक कौशलों से कमाता है। अनुकूलनशीलता और मानसिक चपलता वाला बहुमुखी काल।"
    rule_type: dasha

  - verse: 8
    topic: mahadasha_effects
    planets: [Ketu]
    houses: []
    text_sanskrit: "Ketu Mahadasha Samanya Phalam"
    text_english: "Ketu Mahadasha (7 years): Period of spiritual awakening, detachment, and karmic resolution. Gains through occult sciences, research, alternative healing, and spiritual teaching. Health focus on mysterious ailments, viral infections, surgery, and psychic disturbances. Best when Ketu is in Sagittarius, Pisces, or Scorpio. The native experiences sudden events, past-life karmic culmination, and spiritual transformation. Material interests wane while inner knowledge deepens. A period of letting go and liberation."
    text_hindi: "केतु महादशा (7 वर्ष): आध्यात्मिक जागृति, वैराग्य और कर्म समाधान का काल। गुप्त विद्या, शोध, वैकल्पिक चिकित्सा और आध्यात्मिक शिक्षण से लाभ। रहस्यमय रोग, विषाणु संक्रमण, शल्य चिकित्सा और मानसिक विकारों पर स्वास्थ्य केन्द्रित। केतु धनु, मीन या वृश्चिक में हो तो सर्वोत्तम। जातक अचानक घटनाओं, पूर्वजन्म कर्म परिणति और आध्यात्मिक रूपान्तरण का अनुभव करता है। भौतिक रुचि क्षीण होती है जबकि आन्तरिक ज्ञान गहन होता है। त्याग और मुक्ति का काल।"
    rule_type: dasha

  - verse: 9
    topic: mahadasha_effects
    planets: [Venus]
    houses: []
    text_sanskrit: "Shukra Mahadasha Samanya Phalam"
    text_english: "Venus Mahadasha (20 years): Period of comfort, romance, artistic expression, and material enjoyment. Gains through arts, entertainment, fashion, luxury goods, vehicles, jewellery, perfumes, and partnerships. Health focus on kidneys, reproductive system, diabetes, and throat. Best when Venus is in Taurus, Libra (own signs), or Pisces (exalted). The longest Mahadasha — it defines two decades of life. Marriage, wealth, vehicles, and all forms of worldly pleasure manifest. The native lives a refined and comfortable life."
    text_hindi: "शुक्र महादशा (20 वर्ष): सुख, प्रेम, कलात्मक अभिव्यक्ति और भौतिक भोग का काल। कला, मनोरंजन, फैशन, विलास वस्तुएँ, वाहन, आभूषण, सुगन्ध और साझेदारी से लाभ। गुर्दे, प्रजनन तन्त्र, मधुमेह और गले पर स्वास्थ्य केन्द्रित। शुक्र वृषभ, तुला (स्वराशि) या मीन (उच्च) में हो तो सर्वोत्तम। सबसे लम्बी महादशा — जीवन के दो दशक निर्धारित करती है। विवाह, धन, वाहन और सभी प्रकार के सांसारिक सुख प्रकट होते हैं। जातक परिष्कृत और आरामदायक जीवन जीता है।"
    rule_type: dasha

  # === ANTARDASHA EFFECTS (36 key combinations) ===

  # --- Sun Mahadasha Antardashas ---

  - verse: 10
    topic: antardasha_effects
    planets: [Sun, Moon]
    houses: []
    text_sanskrit: "Surya Mahadasha Chandra Antardasha"
    text_english: "Sun-Moon Antardasha: Government favour combined with public popularity. The native gains recognition from authority while also connecting with masses. Mother's support aids career. Travel for official purposes, gains from liquids or agriculture through government channels. Mental peace through positions of authority. If Sun and Moon are mutual friends in the chart, excellent results for fame and domestic harmony."
    text_hindi: "सूर्य-चन्द्र अन्तर्दशा: शासकीय कृपा के साथ जनप्रियता। जातक अधिकारियों से मान्यता प्राप्त करता है और जनता से भी जुड़ता है। माता का सहयोग कैरियर में सहायक। शासकीय कार्य से यात्रा, सरकारी माध्यमों से तरल पदार्थ या कृषि से लाभ। अधिकार पद से मानसिक शान्ति। कुण्डली में सूर्य-चन्द्र मित्र हों तो यश और गृह सामंजस्य के लिए उत्तम फल।"
    rule_type: dasha

  - verse: 11
    topic: antardasha_effects
    planets: [Sun, Mars]
    houses: []
    text_sanskrit: "Surya Mahadasha Kuja Antardasha"
    text_english: "Sun-Mars Antardasha: Bold leadership, commanding authority, and executive power. Excellent for military, police, surgical, or engineering careers. Land acquisition through government. Victory over enemies and competitors. Risk of ego-driven conflicts, head injuries, or fevers. The native acts with courage and decisiveness but must guard against aggression and impulsiveness."
    text_hindi: "सूर्य-मंगल अन्तर्दशा: साहसिक नेतृत्व, आज्ञाकारी अधिकार और कार्यकारी शक्ति। सैन्य, पुलिस, शल्य या अभियान्त्रिकी कैरियर के लिए उत्कृष्ट। सरकार से भूमि प्राप्ति। शत्रुओं और प्रतिस्पर्धियों पर विजय। अहंकार से विवाद, शिर आघात या ज्वर का जोखिम। जातक साहस और निर्णायकता से कार्य करता है किन्तु आक्रामकता और आवेश से बचना आवश्यक।"
    rule_type: dasha

  - verse: 12
    topic: antardasha_effects
    planets: [Sun, Jupiter]
    houses: []
    text_sanskrit: "Surya Mahadasha Guru Antardasha"
    text_english: "Sun-Jupiter Antardasha: The most auspicious sub-period within Sun Mahadasha. Government positions in education, law, or finance. Blessings of father and guru combine to elevate the native. Religious leadership, charitable work, and spiritual authority. Children bring honour. Wealth through ethical means, promotions, and recognition from learned authorities."
    text_hindi: "सूर्य-गुरु अन्तर्दशा: सूर्य महादशा में सर्वाधिक शुभ उपकाल। शिक्षा, विधि या वित्त में सरकारी पद। पिता और गुरु का आशीर्वाद मिलकर जातक को ऊँचा उठाता है। धार्मिक नेतृत्व, दानकार्य और आध्यात्मिक अधिकार। सन्तान से सम्मान। नैतिक साधनों से धन, पदोन्नति और विद्वान अधिकारियों से मान्यता।"
    rule_type: dasha

  - verse: 13
    topic: antardasha_effects
    planets: [Sun, Saturn]
    houses: []
    text_sanskrit: "Surya Mahadasha Shani Antardasha"
    text_english: "Sun-Saturn Antardasha: Natural enmity between Sun and Saturn creates tension. Conflicts with authority or father, career obstacles, governmental delays, and health issues related to bones and heart. However, if both are well-placed, gives authority over labour and masses, success in mining or oil industry, and government service in administrative capacity. The native must exercise patience and humility."
    text_hindi: "सूर्य-शनि अन्तर्दशा: सूर्य और शनि की नैसर्गिक शत्रुता से तनाव। अधिकारियों या पिता से विवाद, व्यावसायिक बाधाएँ, शासकीय विलम्ब, और अस्थि तथा हृदय सम्बन्धी स्वास्थ्य समस्याएँ। किन्तु दोनों शुभ स्थिति में हों तो श्रमिकों और जनता पर अधिकार, खनन या तेल उद्योग में सफलता, और प्रशासनिक सरकारी सेवा देता है। जातक को धैर्य और विनम्रता का अभ्यास करना आवश्यक।"
    rule_type: dasha

  # --- Moon Mahadasha Antardashas ---

  - verse: 14
    topic: antardasha_effects
    planets: [Moon, Mars]
    houses: []
    text_sanskrit: "Chandra Mahadasha Kuja Antardasha"
    text_english: "Moon-Mars Antardasha: Emotional courage and protective instinct. Property acquisition, gains from agriculture and land. The native acts boldly in defence of family and home. Risk of emotional aggression, blood-related ailments, and domestic conflicts. If Moon-Mars form Chandra-Mangala Yoga in the chart, gives wealth through property and courageous public leadership."
    text_hindi: "चन्द्र-मंगल अन्तर्दशा: भावनात्मक साहस और रक्षात्मक प्रवृत्ति। सम्पत्ति प्राप्ति, कृषि और भूमि से लाभ। जातक परिवार और गृह की रक्षा में साहसपूर्वक कार्य करता है। भावनात्मक आक्रामकता, रक्त सम्बन्धी रोग और घरेलू विवाद का जोखिम। कुण्डली में चन्द्र-मंगल योग बनता हो तो सम्पत्ति से धन और साहसिक जननेतृत्व देता है।"
    rule_type: dasha

  - verse: 15
    topic: antardasha_effects
    planets: [Moon, Mercury]
    houses: []
    text_sanskrit: "Chandra Mahadasha Budha Antardasha"
    text_english: "Moon-Mercury Antardasha: Imaginative intellect, success in writing, communication with masses, and business acumen. Gains through trade, media, publishing, and public relations. The native thinks creatively and communicates emotionally. Excellent for authors, journalists, and marketers. Risk of overthinking, anxiety, and nervous exhaustion if both are afflicted."
