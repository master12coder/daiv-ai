    text_hindi: "शुक्र-चन्द्र अन्तर्दशा: भावनात्मक सौन्दर्य और स्नेहिल विलास। प्रेम पूर्णता, गृह सुख और भावनाओं से कलात्मक प्रेरणा। आतिथ्य, डेयरी, सुगन्ध और महिलाकेन्द्रित व्यवसायों से लाभ। जातक सुन्दर घरेलू वातावरण रचता है। सुख हेतु जलयात्रा। माता वैवाहिक सुख में सहायक। भावनात्मक फिजूलखर्ची, मनोदशा आधारित व्यय और सम्पत्ति के प्रति भावुक लगाव का जोखिम।"
    rule_type: dasha

  - verse: 38
