    text_hindi: "शनि-बुध अन्तर्दशा: अनुशासित बुद्धि और व्यवस्थित सोच। लेखांकन, लेखा परीक्षा, डेटा प्रबन्धन और व्यवस्थित शोध में सफलता। जातक यथार्थता और विस्तार से कार्य करता है। दीर्घकालिक बौद्धिक परियोजनाओं, लिपिकीय या प्रशासनिक कार्य से लाभ। पारम्परिक कौशल या शिल्प सीखने के लिए अच्छा। मानसिक थकान, संचार विलम्ब और निराशावादी सोच का जोखिम। व्यवस्थित कार्य से स्थिर आय।"
    rule_type: dasha

  - verse: 31
    topic: antardasha_effects
    planets: [Saturn, Jupiter]
    houses: []
    text_sanskrit: "Shani Mahadasha Guru Antardasha"
    text_english: "Saturn-Jupiter Antardasha: Structured wisdom and disciplined expansion. Success in institutional roles, banking, government administration, and religious organizations. The native builds enduring systems and institutions. Jupiter's optimism lifts Saturn's heaviness. Gains through long-term investments, educational trusts, and charitable endowments. Children's progress stabilizes. Health improvement through regulated diet and exercise."
    text_hindi: "शनि-गुरु अन्तर्दशा: संरचित ज्ञान और अनुशासित विस्तार। संस्थागत भूमिकाओं, बैंकिंग, सरकारी प्रशासन और धार्मिक संगठनों में सफलता। जातक स्थायी तन्त्र और संस्थाएँ बनाता है। गुरु का आशावाद शनि के भार को हल्का करता है। दीर्घकालिक निवेश, शैक्षिक न्यास और धर्मार्थ बन्दोबस्त से लाभ। सन्तान की प्रगति स्थिर होती है। नियमित आहार और व्यायाम से स्वास्थ्य सुधार।"
    rule_type: dasha

  - verse: 32
    topic: antardasha_effects
    planets: [Saturn, Venus]
    houses: []
    text_sanskrit: "Shani Mahadasha Shukra Antardasha"
    text_english: "Saturn-Venus Antardasha: Luxury earned through hard work. Acquisition of property, vehicles, and comforts after sustained effort. Venus is exalted in Saturn's sign Libra — this combination often brings delayed but substantial material rewards. Success in real estate, hospitality, and entertainment management. Marriage may occur late but be stable. The native develops refined taste through discipline."
    text_hindi: "शनि-शुक्र अन्तर्दशा: कठिन परिश्रम से अर्जित विलास। निरन्तर प्रयास के बाद सम्पत्ति, वाहन और सुख-सुविधाएँ प्राप्ति। शुक्र शनि की राशि तुला में उच्च है — यह संयोग प्रायः विलम्बित किन्तु ठोस भौतिक प्रतिफल लाता है। भूसम्पत्ति, आतिथ्य और मनोरंजन प्रबन्धन में सफलता। विवाह देर से किन्तु स्थिर हो सकता है। जातक अनुशासन से परिष्कृत रुचि विकसित करता है।"
    rule_type: dasha

  - verse: 33
    topic: antardasha_effects
    planets: [Saturn, Rahu]
    houses: []
    text_sanskrit: "Shani Mahadasha Rahu Antardasha"
    text_english: "Saturn-Rahu Antardasha: Intense karmic pressure and foreign influence. The native may relocate abroad under difficult circumstances, face immigration challenges, or experience workplace politics. Chronic illness, depression, and isolation are possible. However, for strong placements, gives power in multinational organizations, success in foreign technology sectors, and authority over large workforces abroad. One of the most testing sub-periods requiring extreme resilience."
    text_hindi: "शनि-राहु अन्तर्दशा: तीव्र कर्म दबाव और विदेशी प्रभाव। जातक कठिन परिस्थितियों में विदेश स्थानान्तरित हो सकता है, आप्रवासन चुनौतियों का सामना, या कार्यस्थल राजनीति का अनुभव कर सकता है। दीर्घकालिक रोग, अवसाद और एकाकीपन सम्भव। किन्तु बलवान स्थितियों में बहुराष्ट्रीय संगठनों में सत्ता, विदेशी प्रौद्योगिकी क्षेत्रों में सफलता और विदेश में बड़े कार्यबल पर अधिकार देता है। अत्यधिक सहनशक्ति की परीक्षा वाला उपकाल।"
    rule_type: dasha

  # --- Mercury Mahadasha Antardashas ---

  - verse: 34
    topic: antardasha_effects
    planets: [Mercury, Venus]
    houses: []
    text_sanskrit: "Budha Mahadasha Shukra Antardasha"
    text_english: "Mercury-Venus Antardasha: Creative intelligence and artistic communication. Both are friends and benefics — results are harmonious. Success in media, advertising, design, fashion writing, and entertainment business. The native communicates beautifully and earns through aesthetic skills. Romantic relationships through intellectual connections. Gains from trade in luxury, beauty, and artistic goods. One of the most pleasant and productive sub-periods."
    text_hindi: "बुध-शुक्र अन्तर्दशा: सृजनात्मक बुद्धि और कलात्मक संवाद। दोनों मित्र और शुभ ग्रह हैं — फल सामंजस्यपूर्ण। मीडिया, विज्ञापन, डिज़ाइन, फैशन लेखन और मनोरंजन व्यवसाय में सफलता। जातक सुन्दर संवाद करता है और सौन्दर्यात्मक कौशल से कमाता है। बौद्धिक जुड़ाव से प्रेम सम्बन्ध। विलास, सौन्दर्य और कलात्मक वस्तुओं के व्यापार से लाभ। सर्वाधिक सुखद और उत्पादक उपकालों में से एक।"
    rule_type: dasha

  - verse: 35
    topic: antardasha_effects
    planets: [Mercury, Jupiter]
    houses: []
    text_sanskrit: "Budha Mahadasha Guru Antardasha"
    text_english: "Mercury-Jupiter Antardasha: Wisdom combined with communication. Success in publishing, higher education, financial consulting, and scriptural studies. The native becomes a bridge between knowledge and application. Gains through writing educational or religious texts, astrology practice, and advisory services. Children excel in education. Business expansion through wise planning. Despite natural enmity between Mercury and Jupiter, both being benefics, results are largely positive."
    text_hindi: "बुध-गुरु अन्तर्दशा: ज्ञान और संवाद का संयोग। प्रकाशन, उच्च शिक्षा, वित्तीय परामर्श और शास्त्रीय अध्ययन में सफलता। जातक ज्ञान और व्यवहार के बीच सेतु बनता है। शैक्षिक या धार्मिक ग्रन्थ लेखन, ज्योतिष अभ्यास और परामर्श सेवाओं से लाभ। सन्तान शिक्षा में उत्कृष्ट। बुद्धिमत्तापूर्ण नियोजन से व्यापार विस्तार। बुध और गुरु में नैसर्गिक शत्रुता होते हुए भी दोनों शुभ होने से फल अधिकांशतः सकारात्मक।"
    rule_type: dasha

  - verse: 36
    topic: antardasha_effects
    planets: [Mercury, Saturn]
    houses: []
    text_sanskrit: "Budha Mahadasha Shani Antardasha"
    text_english: "Mercury-Saturn Antardasha: Methodical work and structured communication. Mercury and Saturn are friends — this combination gives success through detailed, systematic effort. Gains through accounting, law, civil service examinations, and technical documentation. The native masters complex systems through patient study. Real estate through careful negotiation. Risk of delays in communication, pessimistic speech, and mental exhaustion from overwork."
    text_hindi: "बुध-शनि अन्तर्दशा: व्यवस्थित कार्य और संरचित संवाद। बुध और शनि मित्र हैं — यह संयोग विस्तृत, व्यवस्थित प्रयास से सफलता देता है। लेखांकन, विधि, सिविल सेवा परीक्षा और तकनीकी प्रलेखन से लाभ। जातक धैर्यपूर्ण अध्ययन से जटिल तन्त्रों में दक्षता प्राप्त करता है। सावधानीपूर्ण बातचीत से भूसम्पत्ति। संचार में विलम्ब, निराशावादी वाणी और अति परिश्रम से मानसिक थकान का जोखिम।"
    rule_type: dasha

  # --- Venus Mahadasha Antardashas ---

