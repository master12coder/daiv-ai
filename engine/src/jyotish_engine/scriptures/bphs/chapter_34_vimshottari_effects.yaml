    text_hindi: "शुक्र-मंगल अन्तर्दशा: आवेश, सम्पत्ति और इन्द्रिय सुख। भूमि, वाहन और विलासपूर्ण सम्पत्ति प्राप्ति। तीव्र प्रणय अनुभव और शारीरिक आकर्षण। भूसम्पत्ति, वाहन, सौन्दर्य प्रसाधन और आतिथ्य उद्योगों में सफलता। विवाह या प्रेम प्रतिबद्धता का गहन होना। आवेगपूर्ण व्यय, जीवनसाथी से उत्कट विवाद और अतिभोग का जोखिम। जातक दृढ़ कर्म से इच्छाओं की पूर्ति करता है।"
    rule_type: dasha

  - verse: 39
    topic: antardasha_effects
    planets: [Venus, Jupiter]
    houses: []
    text_sanskrit: "Shukra Mahadasha Guru Antardasha"
    text_english: "Venus-Jupiter Antardasha: Double benefic blessings — the most auspicious sub-period within Venus Mahadasha. Wealth, marriage happiness, children, education, and spiritual comfort all flourish. Gains through partnerships in finance, education, and arts. The native lives a life of cultured abundance. Pilgrimage combined with pleasure travel. Despite mutual enmity, both being great benefics ensures overwhelmingly positive results."
    text_hindi: "शुक्र-गुरु अन्तर्दशा: दोहरा शुभ आशीर्वाद — शुक्र महादशा में सर्वाधिक शुभ उपकाल। धन, वैवाहिक सुख, सन्तान, शिक्षा और आध्यात्मिक सुख सभी पुष्पित होते हैं। वित्त, शिक्षा और कला में साझेदारी से लाभ। जातक संस्कारित प्रचुरता का जीवन जीता है। सुख-यात्रा सहित तीर्थयात्रा। परस्पर शत्रुता के बावजूद दोनों महाशुभ ग्रह होने से फल अत्यधिक सकारात्मक।"
    rule_type: dasha

  - verse: 40
    topic: antardasha_effects
    planets: [Venus, Saturn]
    houses: []
    text_sanskrit: "Shukra Mahadasha Shani Antardasha"
    text_english: "Venus-Saturn Antardasha: Venus and Saturn share a friendly relationship. Luxury earned through persistent effort, success in real estate and construction of beautiful structures, artistic mastery through discipline, and wealth through long-term partnerships. Film production, architecture, and interior design are favoured. The native develops enduring aesthetic sensibility. Marriage stability through mature understanding. Delayed but lasting material rewards."
    text_hindi: "शुक्र-शनि अन्तर्दशा: शुक्र और शनि मित्र सम्बन्ध रखते हैं। निरन्तर प्रयास से अर्जित विलास, भूसम्पत्ति और सुन्दर संरचनाओं के निर्माण में सफलता, अनुशासन से कलात्मक दक्षता और दीर्घकालिक साझेदारी से धन। चलचित्र निर्माण, वास्तुकला और आन्तरिक सज्जा अनुकूल। जातक स्थायी सौन्दर्यबोध विकसित करता है। परिपक्व समझ से वैवाहिक स्थिरता। विलम्बित किन्तु स्थायी भौतिक प्रतिफल।"
    rule_type: dasha

  # --- Ketu Mahadasha Antardashas ---

  - verse: 41
    topic: antardasha_effects
    planets: [Ketu, Moon]
    houses: []
    text_sanskrit: "Ketu Mahadasha Chandra Antardasha"
    text_english: "Ketu-Moon Antardasha: Emotional detachment and psychic sensitivity. The mind becomes introspective and drawn towards meditation. Risk of depression, anxiety, insomnia, and separation from mother. However, for spiritually inclined natives, gives deep intuitive abilities, psychic experiences, and emotional liberation. Past-life memories may surface. Gains through healing, counselling, and spiritual practices. The native must guard mental health carefully."
    text_hindi: "केतु-चन्द्र अन्तर्दशा: भावनात्मक वैराग्य और अतीन्द्रिय संवेदनशीलता। मन अन्तर्मुखी होता है और ध्यान की ओर आकर्षित होता है। अवसाद, व्याकुलता, अनिद्रा और माता से वियोग का जोखिम। किन्तु आध्यात्मिक प्रवृत्ति के जातकों को गहन अन्तर्ज्ञान, अतीन्द्रिय अनुभव और भावनात्मक मुक्ति मिलती है। पूर्वजन्म स्मृतियाँ सतह पर आ सकती हैं। चिकित्सा, परामर्श और आध्यात्मिक साधना से लाभ। जातक को मानसिक स्वास्थ्य की सावधानीपूर्वक रक्षा करनी चाहिए।"
    rule_type: dasha

  - verse: 42
    topic: antardasha_effects
    planets: [Ketu, Mars]
    houses: []
    text_sanskrit: "Ketu Mahadasha Kuja Antardasha"
    text_english: "Ketu-Mars Antardasha: Sudden, sharp events and surgical interventions. Risk of accidents, burns, cuts, and emergency situations. The combination of headless Ketu with aggressive Mars creates unpredictable volatile energy. However, for well-placed charts, gives mastery in martial arts, tantric practices, surgical excellence, and decisive spiritual breakthroughs. The native must avoid reckless actions and channel energy into disciplined practice."
    text_hindi: "केतु-मंगल अन्तर्दशा: अचानक, तीव्र घटनाएँ और शल्य हस्तक्षेप। दुर्घटना, जलन, कटने और आपातकालीन स्थितियों का जोखिम। शिरहीन केतु और आक्रामक मंगल का संयोग अप्रत्याशित अस्थिर ऊर्जा उत्पन्न करता है। किन्तु शुभ कुण्डलियों में युद्ध कला, तान्त्रिक साधना, शल्य चिकित्सा उत्कृष्टता और निर्णायक आध्यात्मिक सफलता देता है। जातक को लापरवाह कार्यों से बचना और ऊर्जा को अनुशासित अभ्यास में लगाना चाहिए।"
    rule_type: dasha

  - verse: 43
    topic: antardasha_effects
    planets: [Ketu, Jupiter]
    houses: []
    text_sanskrit: "Ketu Mahadasha Guru Antardasha"
    text_english: "Ketu-Jupiter Antardasha: Spiritual wisdom and moksha-oriented knowledge. The most favourable sub-period within Ketu Mahadasha. Jupiter's guidance illuminates Ketu's mystical path. Success in Vedantic studies, meditation retreats, and spiritual teaching. The native gains profound philosophical understanding. Pilgrimage to sacred sites, connection with enlightened teachers. Children may pursue spiritual or academic paths. Material detachment accompanies spiritual enrichment."
    text_hindi: "केतु-गुरु अन्तर्दशा: आध्यात्मिक ज्ञान और मोक्षोन्मुख विद्या। केतु महादशा में सर्वाधिक अनुकूल उपकाल। गुरु का मार्गदर्शन केतु के रहस्यमय पथ को प्रकाशित करता है। वेदान्त अध्ययन, ध्यान शिविर और आध्यात्मिक शिक्षण में सफलता। जातक गहन दार्शनिक समझ प्राप्त करता है। पवित्र स्थानों की तीर्थयात्रा, प्रबुद्ध गुरुओं से सम्पर्क। सन्तान आध्यात्मिक या शैक्षिक मार्ग अपना सकती है। आध्यात्मिक समृद्धि के साथ भौतिक वैराग्य।"
    rule_type: dasha

  - verse: 44
    topic: antardasha_effects
    planets: [Ketu, Venus]
    houses: []
    text_sanskrit: "Ketu Mahadasha Shukra Antardasha"
    text_english: "Ketu-Venus Antardasha: Tension between renunciation and desire. The native oscillates between spiritual detachment and material attraction. Unusual or unconventional romantic experiences. Gains through occult arts, tantric practices combined with artistic expression. Risk of marital discord, dissatisfaction with luxury, and confusion about life direction. If well-placed, gives artistic expression of spiritual themes — sacred music, devotional poetry, and temple architecture."
    text_hindi: "केतु-शुक्र अन्तर्दशा: त्याग और इच्छा के बीच तनाव। जातक आध्यात्मिक वैराग्य और भौतिक आकर्षण के बीच डोलता है। असामान्य या अपारम्परिक प्रेम अनुभव। गुप्त कला, कलात्मक अभिव्यक्ति सहित तान्त्रिक साधना से लाभ। वैवाहिक कलह, विलास से असन्तोष और जीवन दिशा में भ्रम का जोखिम। शुभ स्थिति में आध्यात्मिक विषयों की कलात्मक अभिव्यक्ति — पवित्र संगीत, भक्ति काव्य और मन्दिर वास्तुकला देता है।"
    rule_type: dasha

  - verse: 45
    topic: antardasha_effects
    planets: [Ketu, Saturn]
    houses: []
    text_sanskrit: "Ketu Mahadasha Shani Antardasha"
    text_english: "Ketu-Saturn Antardasha: Deep karmic reckoning and spiritual austerity. One of the most challenging sub-periods. The native faces isolation, chronic ailments, joint pain combined with mysterious illnesses, and extreme detachment. Past karmas ripen with full force. However, for evolved souls, this period grants final liberation through suffering — the native transcends worldly bondage through intense tapas (austerity). Monastic life, forest retreats, and complete surrender to the divine are indicated."
    text_hindi: "केतु-शनि अन्तर्दशा: गहन कर्म लेखा-जोखा और आध्यात्मिक तपस्या। सबसे चुनौतीपूर्ण उपकालों में से एक। जातक एकाकीपन, दीर्घकालिक रोग, जोड़ों के दर्द सहित रहस्यमय रोग और अत्यधिक वैराग्य का सामना करता है। पूर्व कर्म पूर्ण शक्ति से पकते हैं। किन्तु विकसित आत्माओं को यह काल कष्ट के माध्यम से अन्तिम मुक्ति प्रदान करता है — जातक तीव्र तपस्या से सांसारिक बन्धन पार करता है। सन्न्यास जीवन, वन आश्रम और ईश्वर को पूर्ण समर्पण संकेतित है।"
    rule_type: dasha
