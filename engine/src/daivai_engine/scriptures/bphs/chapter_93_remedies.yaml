book: BPHS
chapter: 93
title: "Remedial Measures — Mantras, Daan, Fasting, Gemstones, and Behavioural Remedies"
description: "Comprehensive remedial measures from BPHS chapters 93-97 covering Mantra prescriptions, donations (Daan), fasting (Vrata), gemstone wearing rules, and behavioural remedies for each planet."
rules:
  # === MANTRA PRESCRIPTIONS PER PLANET ===
  - verse: 1
    topic: mantra_remedy
    planets: [Sun]
    houses: []
    text_sanskrit: "Om Hraam Hreem Hraum Sah Suryaya Namaha"
    text_english: "Sun Mantra remedy: Chant the Surya Beej Mantra 'Om Hraam Hreem Hraum Sah Suryaya Namaha' 7000 times in 40 days (one Mandala) starting on a Sunday during Shukla Paksha at sunrise. Use a Sphatik (crystal) or Rudraksha mala. Face east. The Aditya Hridaya Stotra may be chanted daily as a supplementary remedy. Gayatri Mantra (Om Bhur Bhuva Swaha...) 108 times daily also strengthens the Sun."
    text_hindi: "सूर्य मन्त्र उपाय: सूर्य बीज मन्त्र 'ओम ह्रां ह्रीं ह्रौं सः सूर्याय नमः' 40 दिन (एक मण्डल) में 7000 बार जपें, शुक्ल पक्ष के रविवार से सूर्योदय के समय आरम्भ करें। स्फटिक या रुद्राक्ष की माला प्रयोग करें। पूर्व दिशा की ओर मुख करें। आदित्य हृदय स्तोत्र प्रतिदिन पूरक उपाय के रूप में जप सकते हैं। गायत्री मन्त्र (ओम भूर्भुवः स्वः...) प्रतिदिन 108 बार भी सूर्य को बलवान करता है।"
    rule_type: remedy

  - verse: 2
    topic: mantra_remedy
    planets: [Moon]
    houses: []
    text_sanskrit: "Om Shraam Shreem Shraum Sah Chandramase Namaha"
    text_english: "Moon Mantra remedy: Chant the Chandra Beej Mantra 'Om Shraam Shreem Shraum Sah Chandramase Namaha' 11000 times in 40 days starting on a Monday during Shukla Paksha in the evening. Use a Sphatik or Pearl mala. Face north-west. Additionally, chanting 'Om Namah Shivaya' 108 times daily calms the mind and strengthens a weak Moon."
    text_hindi: "चन्द्र मन्त्र उपाय: चन्द्र बीज मन्त्र 'ओम श्रां श्रीं श्रौं सः चन्द्रमसे नमः' 40 दिन में 11000 बार जपें, शुक्ल पक्ष के सोमवार से सन्ध्या काल में आरम्भ करें। स्फटिक या मोती की माला प्रयोग करें। वायव्य दिशा की ओर मुख करें। इसके अतिरिक्त 'ओम नमः शिवाय' प्रतिदिन 108 बार मन को शान्त और दुर्बल चन्द्रमा को बलवान करता है।"
    rule_type: remedy

  - verse: 3
    topic: mantra_remedy
    planets: [Mars]
    houses: []
    text_sanskrit: "Om Kraam Kreem Kraum Sah Bhaumaya Namaha"
    text_english: "Mars Mantra remedy: Chant the Mangal Beej Mantra 'Om Kraam Kreem Kraum Sah Bhaumaya Namaha' 10000 times in 40 days starting on a Tuesday during Shukla Paksha. Use a Red Coral or Rudraksha mala. Face south. Hanuman Chalisa recited on Tuesdays and Saturdays is a powerful supplementary remedy for Mars affliction."
    text_hindi: "मंगल मन्त्र उपाय: मंगल बीज मन्त्र 'ओम क्रां क्रीं क्रौं सः भौमाय नमः' 40 दिन में 10000 बार जपें, शुक्ल पक्ष के मंगलवार से आरम्भ करें। मूँगा या रुद्राक्ष की माला प्रयोग करें। दक्षिण दिशा की ओर मुख करें। मंगलवार और शनिवार को हनुमान चालीसा का पाठ मंगल पीड़ा का शक्तिशाली पूरक उपाय है।"
    rule_type: remedy

  - verse: 4
    topic: mantra_remedy
    planets: [Mercury]
    houses: []
    text_sanskrit: "Om Braam Breem Braum Sah Budhaya Namaha"
    text_english: "Mercury Mantra remedy: Chant the Budha Beej Mantra 'Om Braam Breem Braum Sah Budhaya Namaha' 9000 times in 40 days starting on a Wednesday during Shukla Paksha. Use a Sphatik or Tulsi mala. Face north. Vishnu Sahasranama on Wednesdays is a powerful supplementary remedy for a weak or afflicted Mercury."
    text_hindi: "बुध मन्त्र उपाय: बुध बीज मन्त्र 'ओम ब्रां ब्रीं ब्रौं सः बुधाय नमः' 40 दिन में 9000 बार जपें, शुक्ल पक्ष के बुधवार से आरम्भ करें। स्फटिक या तुलसी की माला प्रयोग करें। उत्तर दिशा की ओर मुख करें। बुधवार को विष्णु सहस्रनाम दुर्बल या पीड़ित बुध का शक्तिशाली पूरक उपाय है।"
    rule_type: remedy

  - verse: 5
    topic: mantra_remedy
    planets: [Jupiter]
    houses: []
    text_sanskrit: "Om Graam Greem Graum Sah Gurave Namaha"
    text_english: "Jupiter Mantra remedy: Chant the Guru Beej Mantra 'Om Graam Greem Graum Sah Gurave Namaha' 19000 times in 40 days starting on a Thursday during Shukla Paksha. Use a Turmeric-coloured or Rudraksha mala. Face north-east. Dakshinamurthy Stotra and Guru Gita are powerful supplementary chants for Jupiter."
    text_hindi: "गुरु मन्त्र उपाय: गुरु बीज मन्त्र 'ओम ग्रां ग्रीं ग्रौं सः गुरवे नमः' 40 दिन में 19000 बार जपें, शुक्ल पक्ष के गुरुवार से आरम्भ करें। हल्दी रंग की या रुद्राक्ष की माला प्रयोग करें। ईशान दिशा (उत्तर-पूर्व) की ओर मुख करें। दक्षिणामूर्ति स्तोत्र और गुरु गीता गुरु के शक्तिशाली पूरक जप हैं।"
    rule_type: remedy

  - verse: 6
    topic: mantra_remedy
    planets: [Venus]
    houses: []
    text_sanskrit: "Om Draam Dreem Draum Sah Shukraya Namaha"
    text_english: "Venus Mantra remedy: Chant the Shukra Beej Mantra 'Om Draam Dreem Draum Sah Shukraya Namaha' 16000 times in 40 days starting on a Friday during Shukla Paksha. Use a Sphatik or Lotus-seed mala. Face south-east. Shri Suktam and Lakshmi Ashtottara are powerful supplementary chants for strengthening Venus."
    text_hindi: "शुक्र मन्त्र उपाय: शुक्र बीज मन्त्र 'ओम द्रां द्रीं द्रौं सः शुक्राय नमः' 40 दिन में 16000 बार जपें, शुक्ल पक्ष के शुक्रवार से आरम्भ करें। स्फटिक या कमलगट्टे की माला प्रयोग करें। आग्नेय दिशा (दक्षिण-पूर्व) की ओर मुख करें। श्री सूक्तम और लक्ष्मी अष्टोत्तर शुक्र को बलवान करने के शक्तिशाली पूरक जप हैं।"
    rule_type: remedy

  - verse: 7
    topic: mantra_remedy
    planets: [Saturn]
    houses: []
    text_sanskrit: "Om Praam Preem Praum Sah Shanaischaraya Namaha"
    text_english: "Saturn Mantra remedy: Chant the Shani Beej Mantra 'Om Praam Preem Praum Sah Shanaischaraya Namaha' 23000 times in 40 days starting on a Saturday during Krishna Paksha at dusk. Use an iron or Rudraksha mala. Face west. Shani Stotra by Dasharatha and Shani Mahatmya are powerful supplementary remedies during Sade-Sati and Dhaiya."
    text_hindi: "शनि मन्त्र उपाय: शनि बीज मन्त्र 'ओम प्रां प्रीं प्रौं सः शनैश्चराय नमः' 40 दिन में 23000 बार जपें, कृष्ण पक्ष के शनिवार से सन्ध्या काल में आरम्भ करें। लोहे या रुद्राक्ष की माला प्रयोग करें। पश्चिम दिशा की ओर मुख करें। दशरथ कृत शनि स्तोत्र और शनि महात्म्य साढ़ेसाती और ढैय्या में शक्तिशाली पूरक उपाय हैं।"
    rule_type: remedy

  - verse: 8
    topic: mantra_remedy
    planets: [Rahu]
    houses: []
    text_sanskrit: "Om Bhraam Bhreem Bhraum Sah Rahave Namaha"
    text_english: "Rahu Mantra remedy: Chant the Rahu Beej Mantra 'Om Bhraam Bhreem Bhraum Sah Rahave Namaha' 18000 times in 40 days starting on a Saturday or Wednesday during Krishna Paksha. Use a Sandalwood or Rudraksha mala. Face south-west. Durga Saptashati (Devi Mahatmya) is the most powerful supplementary remedy for severe Rahu affliction."
    text_hindi: "राहु मन्त्र उपाय: राहु बीज मन्त्र 'ओम भ्रां भ्रीं भ्रौं सः राहवे नमः' 40 दिन में 18000 बार जपें, कृष्ण पक्ष के शनिवार या बुधवार से आरम्भ करें। चन्दन या रुद्राक्ष की माला प्रयोग करें। नैऋत्य दिशा (दक्षिण-पश्चिम) की ओर मुख करें। दुर्गा सप्तशती (देवी माहात्म्य) गम्भीर राहु पीड़ा का सबसे शक्तिशाली पूरक उपाय है।"
    rule_type: remedy

  - verse: 9
    topic: mantra_remedy
    planets: [Ketu]
    houses: []
    text_sanskrit: "Om Sraam Sreem Sraum Sah Ketave Namaha"
    text_english: "Ketu Mantra remedy: Chant the Ketu Beej Mantra 'Om Sraam Sreem Sraum Sah Ketave Namaha' 17000 times in 40 days starting on a Tuesday or Saturday during Krishna Paksha. Use a Rudraksha mala (preferably 9-Mukhi). Face south-west. Ganesh Atharvashirsha and Sankat Nashan Ganesh Stotra are powerful supplementary remedies for Ketu."
    text_hindi: "केतु मन्त्र उपाय: केतु बीज मन्त्र 'ओम स्रां स्रीं स्रौं सः केतवे नमः' 40 दिन में 17000 बार जपें, कृष्ण पक्ष के मंगलवार या शनिवार से आरम्भ करें। रुद्राक्ष की माला (9 मुखी श्रेष्ठ) प्रयोग करें। नैऋत्य दिशा (दक्षिण-पश्चिम) की ओर मुख करें। गणेश अथर्वशीर्ष और संकट नाशन गणेश स्तोत्र केतु के शक्तिशाली पूरक उपाय हैं।"
    rule_type: remedy

  # === DAAN (DONATION) PER PLANET ===
  - verse: 10
    topic: daan_remedy
    planets: [Sun]
    houses: []
    text_sanskrit: "Surya Daan Vidhanam"
    text_english: "Sun Daan (donation) remedy: Donate wheat (gehun), jaggery (gur), red cloth, copper vessel, red flowers, and ruby or garnet to a Brahmin or temple on Sundays during sunrise. The donation should be made with the Sankalpa that it is for Surya Graha Shanti. Feeding a red or brown cow with wheat and jaggery is also effective."
    text_hindi: "सूर्य दान उपाय: रविवार को सूर्योदय के समय ब्राह्मण या मन्दिर को गेहूँ, गुड़, लाल वस्त्र, ताम्बे का बर्तन, लाल पुष्प और माणिक्य या गोमेद दान करें। दान सूर्य ग्रह शान्ति के संकल्प के साथ करें। लाल या भूरी गाय को गेहूँ और गुड़ खिलाना भी प्रभावी है।"
    rule_type: remedy

  - verse: 11
    topic: daan_remedy
    planets: [Moon]
    houses: []
    text_sanskrit: "Chandra Daan Vidhanam"
    text_english: "Moon Daan remedy: Donate rice (chawal), white cloth, silver, curd (dahi), white flowers, camphor, and pearl to a Brahmin or needy person on Mondays during the evening. White sugar, milk, and conch shell (shankh) are additional items. Feeding white cows with rice and sugar strengthens a weak Moon."
    text_hindi: "चन्द्र दान उपाय: सोमवार को सन्ध्या काल में ब्राह्मण या जरूरतमन्द को चावल, श्वेत वस्त्र, चाँदी, दही, श्वेत पुष्प, कपूर और मोती दान करें। सफ़ेद शक्कर, दूध और शंख अतिरिक्त दान सामग्री हैं। श्वेत गाय को चावल और शक्कर खिलाना दुर्बल चन्द्रमा को बलवान करता है।"
    rule_type: remedy

  - verse: 12
    topic: daan_remedy
    planets: [Mars]
    houses: []
    text_sanskrit: "Kuja Daan Vidhanam"
    text_english: "Mars Daan remedy: Donate red lentils (masoor dal), red cloth, copper, jaggery, red coral, and weapons (symbolically, a small knife) to a Brahmin on Tuesdays. Additionally, donate blood if physically fit. Offering sindoor and red flowers at a Hanuman temple is a powerful Mars remedy."
    text_hindi: "मंगल दान उपाय: मंगलवार को ब्राह्मण को मसूर दाल, लाल वस्त्र, ताम्बा, गुड़, मूँगा और शस्त्र (प्रतीकात्मक रूप में छोटा चाकू) दान करें। इसके अतिरिक्त शारीरिक रूप से स्वस्थ हों तो रक्तदान करें। हनुमान मन्दिर में सिन्दूर और लाल पुष्प अर्पित करना शक्तिशाली मंगल उपाय है।"
    rule_type: remedy

  - verse: 13
    topic: daan_remedy
    planets: [Mercury]
    houses: []
    text_sanskrit: "Budha Daan Vidhanam"
    text_english: "Mercury Daan remedy: Donate green moong dal, green cloth, green vegetables, emerald or peridot, bronze vessel, and camphor to a Brahmin or learned person on Wednesdays. Feeding green grass to cows and distributing books and writing materials to students are excellent Mercury remedies."
    text_hindi: "बुध दान उपाय: बुधवार को ब्राह्मण या विद्वान को हरी मूँग दाल, हरा वस्त्र, हरी सब्जियाँ, पन्ना या पेरिडॉट, कांस्य बर्तन और कपूर दान करें। गायों को हरा चारा खिलाना और विद्यार्थियों को पुस्तकें और लेखन सामग्री वितरित करना उत्कृष्ट बुध उपाय हैं।"
    rule_type: remedy

  - verse: 14
    topic: daan_remedy
    planets: [Jupiter]
    houses: []
    text_sanskrit: "Guru Daan Vidhanam"
    text_english: "Jupiter Daan remedy: Donate chana dal (Bengal gram), turmeric (haldi), yellow cloth, gold, yellow sapphire or topaz, bananas, and sweets to a Brahmin, temple, or guru on Thursdays. Feeding Brahmins with a full meal (Brahmin Bhoj) on Thursdays is the most auspicious Guru Daan. Donating religious books and scriptures strengthens Jupiter greatly."
    text_hindi: "गुरु दान उपाय: गुरुवार को ब्राह्मण, मन्दिर या गुरु को चना दाल, हल्दी, पीला वस्त्र, स्वर्ण, पुखराज या पुष्कराज, केले और मिठाई दान करें। गुरुवार को ब्राह्मणों को पूर्ण भोजन (ब्राह्मण भोज) कराना सबसे शुभ गुरु दान है। धार्मिक पुस्तकें और शास्त्र दान करना गुरु को अत्यन्त बलवान करता है।"
    rule_type: remedy

  - verse: 15
    topic: daan_remedy
    planets: [Venus]
    houses: []
    text_sanskrit: "Shukra Daan Vidhanam"
    text_english: "Venus Daan remedy: Donate white rice, white sugar, white cloth, ghee, camphor, perfume, diamond or white zircon, silver ornaments, and silk to a Brahmin or woman on Fridays. Donating clothes and cosmetics to married women (Suhagins) is an especially effective Venus remedy. Offering white flowers and scented items at a Lakshmi temple strengthens Venus."
    text_hindi: "शुक्र दान उपाय: शुक्रवार को ब्राह्मण या स्त्री को श्वेत चावल, सफ़ेद शक्कर, श्वेत वस्त्र, घी, कपूर, इत्र, हीरा या श्वेत जरकन, चाँदी के आभूषण और रेशम दान करें। सुहागिन स्त्रियों को वस्त्र और श्रृंगार सामग्री दान करना विशेष रूप से प्रभावी शुक्र उपाय है। लक्ष्मी मन्दिर में श्वेत पुष्प और सुगन्धित वस्तुएँ अर्पित करना शुक्र को बलवान करता है।"
    rule_type: remedy

  - verse: 16
    topic: daan_remedy
    planets: [Saturn]
    houses: []
    text_sanskrit: "Shani Daan Vidhanam"
    text_english: "Saturn Daan remedy: Donate black sesame (til), mustard oil, iron articles, blue or black cloth, urad dal (black gram), blue sapphire or amethyst, and leather shoes to the needy or a Brahmin on Saturdays. Feeding crows and serving the poor, handicapped, and elderly are the most powerful Saturn remedies. Donating blankets in winter is especially auspicious."
    text_hindi: "शनि दान उपाय: शनिवार को जरूरतमन्दों या ब्राह्मण को काला तिल, सरसों का तेल, लोहे की वस्तुएँ, नीला या काला वस्त्र, उड़द दाल, नीलम या जमुनिया और चमड़े के जूते दान करें। कौओं को भोजन कराना और गरीबों, विकलांगों और वृद्धों की सेवा सबसे शक्तिशाली शनि उपाय हैं। शीतकाल में कम्बल दान करना विशेष रूप से शुभ है।"
    rule_type: remedy

  - verse: 17
    topic: daan_remedy
    planets: [Rahu]
    houses: []
    text_sanskrit: "Rahu Daan Vidhanam"
    text_english: "Rahu Daan remedy: Donate black sesame, coconut, blue cloth, blankets, iron, and hessonite or gomed to a Brahmin on Saturdays or during Rahu Kaal (symbolically confronting Rahu's energy). Throwing coconut in flowing water and feeding fish are traditional Rahu remedies. Donating to sweepers and outcastes is especially effective for Rahu."
    text_hindi: "राहु दान उपाय: शनिवार या राहु काल में (प्रतीकात्मक रूप में राहु की ऊर्जा का सामना) ब्राह्मण को काला तिल, नारियल, नीला वस्त्र, कम्बल, लोहा और गोमेद दान करें। बहते जल में नारियल प्रवाहित करना और मछलियों को खिलाना परम्परागत राहु उपाय हैं। सफ़ाई कर्मियों और वंचितों को दान करना राहु के लिए विशेष रूप से प्रभावी है।"
    rule_type: remedy

  - verse: 18
    topic: daan_remedy
    planets: [Ketu]
    houses: []
    text_sanskrit: "Ketu Daan Vidhanam"
    text_english: "Ketu Daan remedy: Donate a seven-grain mix (Saptadhanya — wheat, rice, moong, chana, urad, masoor, barley), blankets of grey or brown colour, sesame, and cat's eye stone to a Brahmin on Tuesdays or Saturdays. Feeding stray dogs is the most accessible and effective Ketu remedy. Donating to ascetics and renunciants pleases Ketu."
    text_hindi: "केतु दान उपाय: मंगलवार या शनिवार को ब्राह्मण को सप्तधान्य मिश्रण (गेहूँ, चावल, मूँग, चना, उड़द, मसूर, जौ), स्लेटी या भूरे रंग के कम्बल, तिल और लहसुनिया दान करें। आवारा कुत्तों को खिलाना सबसे सुलभ और प्रभावी केतु उपाय है। सन्न्यासियों और वैरागियों को दान करना केतु को प्रसन्न करता है।"
    rule_type: remedy

  # === FASTING RULES PER PLANET ===
  - verse: 19
    topic: vrata_remedy
    planets: [Sun]
    houses: []
    text_sanskrit: "Surya Vrata Vidhanam"
    text_english: "Sun fasting remedy: Observe a fast on Sundays (Ravivar Vrata). Consume only one meal before sunset, consisting of wheat-based food. Avoid salt during the fast. Offer arghya to the Sun at sunrise and break the fast the next morning after sunrise. Continue for at least 12 Sundays or a full year for maximum benefit."
    text_hindi: "सूर्य व्रत उपाय: रविवार का व्रत रखें (रविवार व्रत)। सूर्यास्त से पूर्व केवल एक भोजन करें, गेहूँ आधारित। व्रत में नमक वर्जित। सूर्योदय के समय सूर्य को अर्घ्य दें और अगले दिन सूर्योदय के बाद व्रत खोलें। पूर्ण लाभ हेतु कम से कम 12 रविवार या एक वर्ष तक जारी रखें।"
    rule_type: remedy

  - verse: 20
    topic: vrata_remedy
    planets: [Moon]
    houses: []
    text_sanskrit: "Chandra Vrata Vidhanam"
    text_english: "Moon fasting remedy: Observe a fast on Mondays (Somvar Vrata). Consume only milk, white foods, or fruits. The 16 Somvar Vrata is especially powerful for marriage and mental peace. Offer milk to Shivling and break the fast in the evening after seeing the Moon. Purnima (full moon) Vrata strengthens the Moon significantly."
    text_hindi: "चन्द्र व्रत उपाय: सोमवार का व्रत रखें (सोमवार व्रत)। केवल दूध, श्वेत भोजन या फल ग्रहण करें। 16 सोमवार व्रत विवाह और मानसिक शान्ति के लिए विशेष रूप से शक्तिशाली है। शिवलिंग पर दूध अर्पित करें और सन्ध्या में चन्द्रमा दर्शन के बाद व्रत खोलें। पूर्णिमा व्रत चन्द्रमा को अत्यन्त बलवान करता है।"
    rule_type: remedy

  - verse: 21
    topic: vrata_remedy
    planets: [Mars]
    houses: []
    text_sanskrit: "Mangala Vrata Vidhanam"
    text_english: "Mars fasting remedy: Observe a fast on Tuesdays (Mangalvar Vrata). Consume only red-coloured food items — red lentils (masoor), jaggery, or pomegranate. Offer sindoor at Hanuman temple before breaking the fast. Mangal Gauri Vrata (for women) on Tuesdays during Shravana month is especially potent for marital happiness and Mangal Dosha remediation."
    text_hindi: "मंगल व्रत उपाय: मंगलवार का व्रत रखें (मंगलवार व्रत)। केवल लाल रंग के खाद्य पदार्थ — मसूर, गुड़ या अनार — ग्रहण करें। व्रत खोलने से पहले हनुमान मन्दिर में सिन्दूर अर्पित करें। श्रावण मास में मंगलवार को मंगलगौरी व्रत (स्त्रियों के लिए) वैवाहिक सुख और मंगल दोष निवारण के लिए विशेष प्रभावी है।"
    rule_type: remedy

  - verse: 22
    topic: vrata_remedy
    planets: [Mercury]
    houses: []
    text_sanskrit: "Budha Vrata Vidhanam"
    text_english: "Mercury fasting remedy: Observe a fast on Wednesdays (Budhvar Vrata). Consume only green items — moong dal, green vegetables, or fruits. Visit a Vishnu temple and offer green items. Worship Lord Vishnu or Goddess Saraswati during the fast. Continue for 21 Wednesdays for full effect."
    text_hindi: "बुध व्रत उपाय: बुधवार का व्रत रखें (बुधवार व्रत)। केवल हरी वस्तुएँ — मूँग दाल, हरी सब्जियाँ या फल — ग्रहण करें। विष्णु मन्दिर जाकर हरी वस्तुएँ अर्पित करें। व्रत में भगवान विष्णु या सरस्वती देवी की पूजा करें। पूर्ण प्रभाव हेतु 21 बुधवार तक जारी रखें।"
    rule_type: remedy

  - verse: 23
    topic: vrata_remedy
    planets: [Jupiter]
    houses: []
    text_sanskrit: "Guru Vrata Vidhanam"
    text_english: "Jupiter fasting remedy: Observe a fast on Thursdays (Guruvar or Brihaspativar Vrata). Consume only chana dal, yellow fruits like bananas, or gram-based food. Wear yellow clothes during the fast. Offer turmeric, bananas, and yellow flowers at a Vishnu or Brihaspati temple. The 16 Guruvar Vrata is especially powerful for wealth and progeny."
    text_hindi: "गुरु व्रत उपाय: गुरुवार का व्रत रखें (गुरुवार या बृहस्पतिवार व्रत)। केवल चना दाल, केले जैसे पीले फल या चने आधारित भोजन ग्रहण करें। व्रत में पीले वस्त्र पहनें। विष्णु या बृहस्पति मन्दिर में हल्दी, केले और पीले पुष्प अर्पित करें। 16 गुरुवार व्रत धन और सन्तान प्राप्ति के लिए विशेष शक्तिशाली है।"
    rule_type: remedy

  - verse: 24
    topic: vrata_remedy
    planets: [Venus]
    houses: []
    text_sanskrit: "Shukra Vrata Vidhanam"
    text_english: "Venus fasting remedy: Observe a fast on Fridays (Shukravar Vrata). Consume only white food items — rice, milk, white sweets, or kheer. Worship Goddess Lakshmi or Santoshi Ma. Offer white flowers and camphor. The Santoshi Ma Vrata on 16 Fridays is widely practised for marital harmony and fulfilment of desires."
    text_hindi: "शुक्र व्रत उपाय: शुक्रवार का व्रत रखें (शुक्रवार व्रत)। केवल श्वेत खाद्य पदार्थ — चावल, दूध, सफ़ेद मिठाई या खीर — ग्रहण करें। लक्ष्मी देवी या सन्तोषी माता की पूजा करें। श्वेत पुष्प और कपूर अर्पित करें। 16 शुक्रवार का सन्तोषी माता व्रत वैवाहिक सामंजस्य और मनोकामना पूर्ति के लिए व्यापक रूप से प्रचलित है।"
    rule_type: remedy

  - verse: 25
    topic: vrata_remedy
    planets: [Saturn]
    houses: []
    text_sanskrit: "Shani Vrata Vidhanam"
    text_english: "Saturn fasting remedy: Observe a fast on Saturdays (Shanivar Vrata). Consume only urad dal, sesame-based items, or black-coloured food. Offer mustard oil and black sesame at a Shani temple. Light a sesame oil lamp under a peepal tree in the evening. The Shani Vrata is essential during Sade-Sati (7.5 year transit) and Shani Dhaiya (2.5 year transit)."
    text_hindi: "शनि व्रत उपाय: शनिवार का व्रत रखें (शनिवार व्रत)। केवल उड़द दाल, तिल आधारित या काले रंग के खाद्य पदार्थ ग्रहण करें। शनि मन्दिर में सरसों का तेल और काला तिल अर्पित करें। सन्ध्या में पीपल के वृक्ष के नीचे तिल के तेल का दीपक जलाएँ। शनि व्रत साढ़ेसाती (7.5 वर्ष गोचर) और शनि ढैय्या (2.5 वर्ष गोचर) में अनिवार्य है।"
    rule_type: remedy

  # === GEMSTONE WEARING RULES ===
  - verse: 26
    topic: gemstone_rule
    planets: []
    houses: []
    text_sanskrit: "Ratna Dharana Samanya Niyamaha"
    text_english: "General gemstone wearing rules: (1) Gemstones must only be worn for functional benefic planets — lords of Kendras (1,4,7,10), Trikonas (1,5,9), and Yogakarakas. (2) Never wear the gemstone of the lord of 6th, 8th, or 12th house. (3) A 3-day trial is mandatory before permanent wearing of Saturn's (Neelam) and Ketu's (Lehsuniya) gemstones. (4) All gemstones should be natural, untreated, and without visible cracks or inclusions."
    text_hindi: "रत्न धारण सामान्य नियम: (1) रत्न केवल कार्यात्मक शुभ ग्रहों — केन्द्र (1,4,7,10), त्रिकोण (1,5,9) और योगकारक स्वामियों — के लिए धारण करें। (2) 6, 8 या 12वें भाव स्वामी का रत्न कभी न पहनें। (3) शनि (नीलम) और केतु (लहसुनिया) के रत्न स्थायी धारण से पूर्व 3 दिन का परीक्षण अनिवार्य। (4) सभी रत्न प्राकृतिक, अनुपचारित और दृश्य दरार या समावेशन रहित हों।"
    rule_type: remedy

  - verse: 27
    topic: gemstone_rule
    planets: []
    houses: []
    text_sanskrit: "Ratna Dharana Kala Vidhanam"
    text_english: "Gemstone consecration and wearing timing: (1) Wear gemstones during Shukla Paksha, ideally on the planet's own weekday and Hora. (2) Energise the gemstone by washing in raw milk and Ganga water, then placing on the deity's idol while chanting the planet's Beej Mantra 108 times. (3) Wear within 1-2 hours of sunrise on the chosen day. (4) Minimum wearing period is 40 days for initial effects; full cycle is 43 days to 1 year."
    text_hindi: "रत्न संस्कार और धारण समय: (1) शुक्ल पक्ष में, ग्रह के अपने वार और होरा में रत्न धारण करें। (2) रत्न को कच्चे दूध और गंगा जल से धोकर, देवता की मूर्ति पर रखकर ग्रह के बीज मन्त्र का 108 बार जप करके ऊर्जावान करें। (3) चुने हुए दिन सूर्योदय के 1-2 घण्टे भीतर धारण करें। (4) प्रारम्भिक प्रभाव हेतु न्यूनतम 40 दिन; पूर्ण चक्र 43 दिन से 1 वर्ष।"
    rule_type: remedy

  - verse: 28
    topic: gemstone_rule
    planets: []
    houses: []
    text_sanskrit: "Ratna Virodha Niyamaha"
    text_english: "Gemstone conflict rules — incompatible gemstones that must never be worn together: (1) Ruby (Sun) conflicts with Blue Sapphire (Saturn), Hessonite (Rahu), and Cat's Eye (Ketu). (2) Pearl (Moon) conflicts with Hessonite (Rahu) and Cat's Eye (Ketu). (3) Red Coral (Mars) conflicts with Diamond (Venus), Emerald (Mercury), Blue Sapphire (Saturn). (4) Yellow Sapphire (Jupiter) conflicts with Diamond (Venus) and Emerald (Mercury). Always assess natural friendship before combining gemstones."
    text_hindi: "रत्न विरोध नियम — एक साथ कभी न धारण किये जाने वाले असंगत रत्न: (1) माणिक्य (सूर्य) का नीलम (शनि), गोमेद (राहु) और लहसुनिया (केतु) से विरोध। (2) मोती (चन्द्र) का गोमेद (राहु) और लहसुनिया (केतु) से विरोध। (3) मूँगा (मंगल) का हीरा (शुक्र), पन्ना (बुध), नीलम (शनि) से विरोध। (4) पुखराज (गुरु) का हीरा (शुक्र) और पन्ना (बुध) से विरोध। रत्न संयोजन से पहले सदैव नैसर्गिक मैत्री का आकलन करें।"
    rule_type: remedy

  # === BEHAVIOURAL REMEDIES ===
  - verse: 29
    topic: behavioural_remedy
    planets: []
    houses: []
    text_sanskrit: "Achara Upaya Samanya Niyamaha"
    text_english: "General behavioural remedy principles: (1) Behavioural remedies (Achara Upaya) are the safest and most universally effective remedies — they can never cause harm. (2) They work by aligning one's conduct with the positive significations of the afflicted planet. (3) Consistency is key — occasional efforts are far less effective than daily practice. (4) Behavioural remedies amplify the effect of Mantras, Daan, and Gemstones. (5) They are especially effective when the native genuinely transforms their attitude, not merely performs external actions."
    text_hindi: "आचार उपाय सामान्य नियम: (1) आचार उपाय सबसे सुरक्षित और सार्वभौमिक रूप से प्रभावी उपाय हैं — ये कभी हानि नहीं कर सकते। (2) ये पीड़ित ग्रह के शुभ कारकत्व के अनुसार आचरण करने से कार्य करते हैं। (3) निरन्तरता कुंजी है — कभी-कभार का प्रयास दैनिक अभ्यास से कहीं कम प्रभावी है। (4) आचार उपाय मन्त्र, दान और रत्नों के प्रभाव को बढ़ाते हैं। (5) ये विशेष रूप से तब प्रभावी हैं जब जातक वास्तव में दृष्टिकोण बदले, केवल बाह्य क्रिया न करे।"
    rule_type: remedy

  - verse: 30
    topic: behavioural_remedy
    planets: [Sun, Moon, Mars, Mercury, Jupiter, Venus, Saturn, Rahu, Ketu]
    houses: []
    text_sanskrit: "Navagraha Achara Upaya Sangraha"
    text_english: "Planet-wise behavioural remedies summary: Sun — Respect father and authority, wake at sunrise, develop self-discipline and leadership. Moon — Serve and honour mother, practice emotional regulation, help women and children, cultivate compassion. Mars — Channel energy into exercise and sports, serve siblings, practice courage without aggression, donate blood. Mercury — Pursue education and learning, develop communication skills, help students, practice honesty in speech and trade. Jupiter — Respect teachers and elders, study scriptures, teach others, practise generosity and righteousness. Venus — Respect spouse and women, cultivate artistic talents, maintain personal hygiene and aesthetics, practice moderation in pleasures. Saturn — Serve the poor and underprivileged, respect servants and labourers, practise patience and discipline, care for the elderly and disabled. Rahu — Avoid deception and shortcuts, maintain transparency, stay grounded despite success, help foreigners and outcasts. Ketu — Practice meditation and spirituality, serve animals (especially dogs), develop detachment, visit pilgrimage sites."
    text_hindi: "ग्रहवार आचार उपाय सारांश: सूर्य — पिता और अधिकारियों का सम्मान, सूर्योदय पर जागें, आत्मानुशासन और नेतृत्व विकसित करें। चन्द्र — माता की सेवा और सम्मान, भावनात्मक संयम, स्त्रियों और बच्चों की सहायता, करुणा का विकास। मंगल — ऊर्जा को व्यायाम और खेल में लगाएँ, भाई-बहनों की सेवा, आक्रामकता बिना साहस, रक्तदान। बुध — शिक्षा और ज्ञान का अनुसरण, संवाद कौशल विकास, विद्यार्थियों की सहायता, वाणी और व्यापार में ईमानदारी। गुरु — गुरुजनों और बड़ों का सम्मान, शास्त्र अध्ययन, अन्यों को शिक्षा, उदारता और धर्मपरायणता। शुक्र — जीवनसाथी और स्त्रियों का सम्मान, कलात्मक प्रतिभा विकास, व्यक्तिगत स्वच्छता और सौन्दर्य, भोगों में संयम। शनि — गरीबों और वंचितों की सेवा, सेवकों और श्रमिकों का सम्मान, धैर्य और अनुशासन, वृद्धों और विकलांगों की देखभाल। राहु — छल और शॉर्टकट से बचें, पारदर्शिता बनाएँ, सफलता में भी विनम्र रहें, विदेशियों और वंचितों की सहायता। केतु — ध्यान और आध्यात्मिकता का अभ्यास, पशु सेवा (विशेषकर कुत्ते), वैराग्य विकास, तीर्थ यात्रा।"
    rule_type: remedy
