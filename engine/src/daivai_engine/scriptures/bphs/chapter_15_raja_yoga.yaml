book: BPHS
chapter: 15
title: "Raja Yoga and Dhana Yoga Formations"
rules:
  # === RAJA YOGA FORMATIONS (Trikona + Kendra Lord Conjunctions) ===

  - verse: 1
    topic: raja_yoga
    planets: []
    houses: [9, 10]
    text_sanskrit: "Dharmakarmadhipati Yoga — Navamadashama Adipathi Sambandha"
    text_english: "Dharmakarmadhipati Raja Yoga: The lords of the 9th (dharma) and 10th (karma) houses conjunct, aspect each other, or exchange signs. This is the most powerful Raja Yoga. The native attains the highest position in profession, earns fame, commands authority, and is blessed by fortune and righteous action working in unison."
    text_hindi: "धर्मकर्माधिपति राजयोग: 9वें (धर्म) और 10वें (कर्म) भाव के स्वामी युति, परस्पर दृष्टि या राशि परिवर्तन में हों। यह सर्वाधिक शक्तिशाली राजयोग है। जातक व्यवसाय में सर्वोच्च पद प्राप्त करता है, यश अर्जित करता है, अधिकार सम्पन्न होता है, और भाग्य तथा धर्मकर्म की एकता से कृपा प्राप्त करता है।"
    rule_type: yoga

  - verse: 2
    topic: raja_yoga
    planets: []
    houses: [1, 5]
    text_sanskrit: "Lagnesh Panchamesh Yoga"
    text_english: "Raja Yoga of 1st and 5th lords: The Lagna lord and the 5th lord conjunct or mutually aspect each other. Gives intelligence applied to personal ambition, fame through creative or intellectual pursuits, political success, and favour from rulers. The native's merit (Purva Punya) directly supports self-advancement."
    text_hindi: "लग्नेश-पंचमेश राजयोग: लग्न स्वामी और 5वें भाव का स्वामी युति या परस्पर दृष्टि में हों। व्यक्तिगत महत्वाकांक्षा में बुद्धि का प्रयोग, सृजनात्मक या बौद्धिक कार्यों से यश, राजनीतिक सफलता और शासकों की कृपा देता है। जातक का पूर्व पुण्य सीधे आत्मउन्नति में सहायक होता है।"
    rule_type: yoga

  - verse: 3
    topic: raja_yoga
    planets: []
    houses: [1, 9]
    text_sanskrit: "Lagnesh Bhagyesh Yoga"
    text_english: "Raja Yoga of 1st and 9th lords: The Lagna lord and 9th lord conjunct or form a mutual relationship. Gives fortune favouring the native directly, foreign travel bringing prosperity, blessings of the father and guru, religious inclination leading to high status, and destiny aligning with personal effort."
    text_hindi: "लग्नेश-भाग्येश राजयोग: लग्न स्वामी और 9वें भाव का स्वामी युति या परस्पर सम्बन्ध में हों। भाग्य सीधे जातक का साथ देता है, विदेश यात्रा से समृद्धि, पिता और गुरु का आशीर्वाद, धार्मिक प्रवृत्ति से उच्च पद, और भाग्य तथा पुरुषार्थ का सामंजस्य होता है।"
    rule_type: yoga

  - verse: 4
    topic: raja_yoga
    planets: []
    houses: [4, 5]
    text_sanskrit: "Sukhesh Panchamesh Yoga"
    text_english: "Raja Yoga of 4th and 5th lords: The lords of the 4th (sukha) and 5th (putra/purva punya) houses conjunct or exchange. Gives happiness through children, academic excellence, property through merit, comfort in educational institutions, and political authority rooted in public welfare."
    text_hindi: "सुखेश-पंचमेश राजयोग: 4थे (सुख) और 5वें (पुत्र/पूर्व पुण्य) भाव के स्वामी युति या परिवर्तन में हों। सन्तान से सुख, शैक्षिक उत्कृष्टता, योग्यता से सम्पत्ति, शिक्षण संस्थानों में सुविधा और जनकल्याण पर आधारित राजनीतिक अधिकार देता है।"
    rule_type: yoga

  - verse: 5
    topic: raja_yoga
    planets: []
    houses: [4, 9]
    text_sanskrit: "Sukhesh Bhagyesh Yoga"
    text_english: "Raja Yoga of 4th and 9th lords: The lords of the 4th and 9th houses in conjunction or mutual aspect. Gives landed property, vehicles, domestic happiness supported by fortune, ancestral wealth, prestigious residence, and success in homeland. The native enjoys comfort in native land through destined fortune."
    text_hindi: "सुखेश-भाग्येश राजयोग: 4थे और 9वें भाव के स्वामी युति या परस्पर दृष्टि में हों। भूसम्पत्ति, वाहन, भाग्य से सम्पन्न गृह सुख, पैतृक सम्पदा, प्रतिष्ठित निवास और स्वदेश में सफलता देता है। जातक भाग्य योग से मातृभूमि में सुख भोगता है।"
    rule_type: yoga

  - verse: 6
    topic: raja_yoga
    planets: []
    houses: [5, 10]
    text_sanskrit: "Panchamesh Dashamesh Yoga"
    text_english: "Raja Yoga of 5th and 10th lords: The lords of the 5th and 10th houses conjunct or aspect each other. Gives authority earned through intelligence, success in governance and administration, children who attain high positions, fame through creative professional achievements, and royal patronage."
    text_hindi: "पंचमेश-दशमेश राजयोग: 5वें और 10वें भाव के स्वामी युति या परस्पर दृष्टि में हों। बुद्धि से अर्जित अधिकार, शासन और प्रशासन में सफलता, उच्च पदस्थ सन्तान, सृजनात्मक व्यावसायिक उपलब्धियों से यश और राज संरक्षण देता है।"
    rule_type: yoga

  - verse: 7
    topic: raja_yoga
    planets: []
    houses: [7, 9]
    text_sanskrit: "Saptamesh Bhagyesh Yoga"
    text_english: "Raja Yoga of 7th and 9th lords: The lords of the 7th and 9th houses conjunct or in mutual relationship. Gives a fortunate marriage, prosperity through spouse and partnerships, foreign business success, rise in status after marriage, and dharmic union. Business partnerships bring both wealth and prestige."
    text_hindi: "सप्तमेश-भाग्येश राजयोग: 7वें और 9वें भाव के स्वामी युति या परस्पर सम्बन्ध में हों। भाग्यशाली विवाह, जीवनसाथी और साझेदारी से समृद्धि, विदेशी व्यापार सफलता, विवाह के बाद पद वृद्धि और धार्मिक विवाह देता है। व्यापारिक साझेदारी धन और प्रतिष्ठा दोनों लाती है।"
    rule_type: yoga

  - verse: 8
    topic: raja_yoga
    planets: []
    houses: [7, 10]
    text_sanskrit: "Saptamesh Dashamesh Yoga"
    text_english: "Raja Yoga of 7th and 10th lords: The lords of the 7th and 10th houses conjunct or exchange. Gives professional success through partnerships, rise in career after marriage, authority in trade and commerce, diplomatic skills leading to high position, and fame through public dealings."
    text_hindi: "सप्तमेश-दशमेश राजयोग: 7वें और 10वें भाव के स्वामी युति या परिवर्तन में हों। साझेदारी से व्यावसायिक सफलता, विवाह के बाद करियर में उन्नति, व्यापार-वाणिज्य में अधिकार, कूटनीतिक कौशल से उच्च पद और जन-व्यवहार से ख्याति देता है।"
    rule_type: yoga

  - verse: 9
    topic: raja_yoga
    planets: []
    houses: [1, 4, 5, 7, 9, 10]
    text_sanskrit: "Bahuvarga Raja Yoga"
    text_english: "Multiple Raja Yoga: When three or more Kendra and Trikona lords are mutually connected through conjunction, aspect, or exchange, an exceptionally powerful Raja Yoga forms. The native rises to supreme authority — equivalent to a king or head of state. Rarer and more potent than single-pair Raja Yogas."
    text_hindi: "बहुवर्ग राजयोग: जब तीन या अधिक केन्द्र और त्रिकोण स्वामी युति, दृष्टि या परिवर्तन से परस्पर सम्बन्धित हों, तो अत्यन्त शक्तिशाली राजयोग बनता है। जातक सर्वोच्च अधिकार प्राप्त करता है — राजा या राष्ट्राध्यक्ष के समान। एकल-युग्म राजयोगों से दुर्लभ और अधिक प्रभावी।"
    rule_type: yoga

  - verse: 10
    topic: raja_yoga
    planets: [Jupiter, Venus]
    houses: [1, 4, 7, 10]
    text_sanskrit: "Guru Shukra Kendra Yoga"
    text_english: "Raja Yoga of Jupiter and Venus in Kendras: When Jupiter and Venus are both placed in Kendra houses, especially if one or both own a Trikona, a powerful Raja Yoga forms. Gives abundant wealth with wisdom, balanced enjoyment of material and spiritual life, respect in society, and patronage from the learned and the wealthy alike."
    text_hindi: "गुरु-शुक्र केन्द्र योग: जब गुरु और शुक्र दोनों केन्द्र भावों में स्थित हों, विशेषतः यदि एक या दोनों त्रिकोण के स्वामी हों, तो शक्तिशाली राजयोग बनता है। ज्ञान सहित प्रचुर धन, भौतिक और आध्यात्मिक जीवन का सन्तुलित भोग, समाज में सम्मान, और विद्वानों व धनवानों दोनों से संरक्षण देता है।"
    rule_type: yoga

  # === DHANA YOGA FORMATIONS ===

  - verse: 11
    topic: dhana_yoga
    planets: []
    houses: [2, 11]
    text_sanskrit: "Dvitiya Ekadasha Adipathi Yoga"
    text_english: "Dhana Yoga of 2nd and 11th lords: The lords of the 2nd (accumulated wealth) and 11th (gains/income) houses conjunct, exchange, or aspect each other. Gives steady income leading to wealth accumulation, multiple sources of revenue, and financial security. The native earns well and saves well."
    text_hindi: "द्वितीय-एकादश अधिपति योग: 2रे (संचित धन) और 11वें (लाभ/आय) भाव के स्वामी युति, परिवर्तन या परस्पर दृष्टि में हों। स्थिर आय से धन संचय, अनेक आय स्रोत और आर्थिक सुरक्षा देता है। जातक अच्छा कमाता और अच्छा बचाता है।"
    rule_type: yoga

  - verse: 12
    topic: dhana_yoga
    planets: []
    houses: [5, 9]
    text_sanskrit: "Pancham Navama Adipathi Dhana Yoga"
    text_english: "Dhana Yoga of 5th and 9th lords: The lords of the 5th (Purva Punya) and 9th (Bhagya) houses conjunct or are mutually connected. Called Lakshmi Yoga by some authorities. Gives wealth through past-life merit, speculative gains, inheritance from father's side, prosperity through righteous means, and fortune favouring children's success."
    text_hindi: "पंचम-नवम अधिपति धनयोग: 5वें (पूर्व पुण्य) और 9वें (भाग्य) भाव के स्वामी युति या परस्पर सम्बन्धित हों। कुछ आचार्य इसे लक्ष्मी योग कहते हैं। पूर्वजन्म के पुण्य से धन, सट्टे से लाभ, पितृपक्ष से विरासत, धार्मिक साधनों से समृद्धि और सन्तान की सफलता में भाग्य का साथ देता है।"
    rule_type: yoga

  - verse: 13
    topic: dhana_yoga
    planets: []
    houses: [2, 5, 9, 11]
    text_sanskrit: "Chaturgraha Dhana Yoga"
    text_english: "Grand Dhana Yoga: When the lords of the 2nd, 5th, 9th, and 11th houses are all interconnected through conjunction, mutual aspect, or exchange, an exceptionally powerful Dhana Yoga forms. Gives enormous wealth — the native amasses a fortune comparable to a treasury. Multiple streams of income, inherited wealth, and speculative success all converge."
    text_hindi: "चतुर्ग्रह धनयोग: जब 2रे, 5वें, 9वें और 11वें भावों के स्वामी सभी युति, परस्पर दृष्टि या परिवर्तन से जुड़े हों, तो अत्यन्त शक्तिशाली धनयोग बनता है। अपार धन देता है — जातक कोषागार के समान सम्पत्ति एकत्र करता है। अनेक आय स्रोत, पैतृक सम्पत्ति और सट्टे की सफलता सब मिलती है।"
    rule_type: yoga

  - verse: 14
    topic: dhana_yoga
    planets: [Jupiter]
    houses: [2, 5, 9, 11]
    text_sanskrit: "Guru Dhana Yoga"
    text_english: "Jupiter's Dhana Yoga: Jupiter placed in or aspecting the 2nd, 5th, 9th, or 11th house while being the lord of one of these houses. Jupiter's aspect on wealth houses is highly auspicious for accumulation. Gives wealth through teaching, counselling, law, religion, or finance. The native earns through wisdom and ethical means."
    text_hindi: "गुरु धनयोग: गुरु 2रे, 5वें, 9वें या 11वें भाव में स्थित या इनको देखता हो और इनमें से किसी का स्वामी भी हो। गुरु की धन भावों पर दृष्टि संचय के लिए अत्यन्त शुभ है। शिक्षण, परामर्श, विधि, धर्म या वित्त से धन देता है। जातक ज्ञान और नैतिक साधनों से कमाता है।"
    rule_type: yoga

  - verse: 15
    topic: dhana_yoga
    planets: []
    houses: [1, 2, 11]
    text_sanskrit: "Lagnesh Dhana Yoga"
    text_english: "Lagna Lord Dhana Yoga: The Lagna lord conjunct with the 2nd or 11th lord, or placed in the 2nd or 11th house. The native earns through personal effort and self-initiative. Wealth is self-made rather than inherited. The stronger the Lagna lord, the greater the earning capacity through individual enterprise."
    text_hindi: "लग्नेश धनयोग: लग्न स्वामी 2रे या 11वें भाव के स्वामी से युक्त हो, या 2रे या 11वें भाव में स्थित हो। जातक व्यक्तिगत प्रयास और स्वपहल से कमाता है। धन विरासत के बजाय स्वअर्जित होता है। लग्न स्वामी जितना बलवान, व्यक्तिगत उद्यम से उतनी अधिक कमाने की क्षमता।"
    rule_type: yoga

  - verse: 16
    topic: dhana_yoga
    planets: []
    houses: [2, 9]
    text_sanskrit: "Dvitiyesh Bhagyesh Dhana Yoga"
    text_english: "Dhana Yoga of 2nd and 9th lords: The lords of the 2nd and 9th houses conjunct or exchange. Wealth comes through fortune, father's blessings, long-distance trade, religious or charitable work, and higher learning. The native accumulates wealth that is destined — it comes with relative ease and through righteous channels."
    text_hindi: "द्वितीयेश-भाग्येश धनयोग: 2रे और 9वें भाव के स्वामी युति या परिवर्तन में हों। भाग्य, पिता का आशीर्वाद, दूरदेशीय व्यापार, धार्मिक या परोपकारी कार्य और उच्च शिक्षा से धन आता है। जातक भाग्य से निर्धारित धन संचित करता है — यह सरलता से और धार्मिक मार्गों से आता है।"
    rule_type: yoga

  # === VIPREET RAJA YOGA ===

  - verse: 17
    topic: vipreet_raja_yoga
    planets: []
    houses: [6, 8]
    text_sanskrit: "Harsha Yoga — Shashtesh Ashtame"
    text_english: "Harsha Yoga (Vipreet Raja Yoga): The lord of the 6th house placed in the 8th house. The native overcomes enemies through their own destruction, gains from insurance and legacies, wins lawsuits unexpectedly, and transforms obstacles into opportunities. Enemies destroy themselves without the native's direct involvement."
    text_hindi: "हर्ष योग (विपरीत राजयोग): 6ठे भाव का स्वामी 8वें भाव में स्थित हो। जातक शत्रुओं की स्वयं की विनाश से उन पर विजय प्राप्त करता है, बीमा और विरासत से लाभ, अप्रत्याशित रूप से मुकदमे जीतता है, और बाधाओं को अवसरों में बदलता है। शत्रु जातक की प्रत्यक्ष सहभागिता के बिना स्वयं नष्ट होते हैं।"
    rule_type: yoga

  - verse: 18
    topic: vipreet_raja_yoga
    planets: []
    houses: [6, 12]
    text_sanskrit: "Harsha Yoga Variant — Shashtesh Dvadasha"
    text_english: "Harsha Yoga variant: The lord of the 6th house placed in the 12th house. Enemies are banished or sent away, debts dissolve through settlement or write-off, diseases are cured through foreign or alternative medicine, and legal troubles end through out-of-court resolution. The native escapes adversity through expenditure or foreign connections."
    text_hindi: "हर्ष योग प्रभेद: 6ठे भाव का स्वामी 12वें भाव में स्थित हो। शत्रु निर्वासित या दूर भेजे जाते हैं, ऋण समझौते या माफी से समाप्त होते हैं, विदेशी या वैकल्पिक चिकित्सा से रोग ठीक होते हैं, और कानूनी परेशानी अदालत के बाहर समझौते से समाप्त होती है। जातक व्यय या विदेशी सम्पर्क से विपत्ति से बचता है।"
    rule_type: yoga

  - verse: 19
    topic: vipreet_raja_yoga
    planets: []
    houses: [8, 6]
    text_sanskrit: "Sarala Yoga — Ashtamesh Shashthe"
    text_english: "Sarala Yoga (Vipreet Raja Yoga): The lord of the 8th house placed in the 6th house. Gives victory in crisis situations, survival through dangerous circumstances, gains through settling others' disputes, success in occult healing, and overcoming chronic enemies through transformation. The native thrives in competitive and adversarial environments."
    text_hindi: "सरल योग (विपरीत राजयोग): 8वें भाव का स्वामी 6ठे भाव में स्थित हो। संकट स्थितियों में विजय, खतरनाक परिस्थितियों में बचाव, दूसरों के विवाद सुलझाने से लाभ, तान्त्रिक चिकित्सा में सफलता और परिवर्तन से दीर्घकालिक शत्रुओं पर विजय देता है। जातक प्रतिस्पर्धी और विरोधी वातावरण में फलता-फूलता है।"
    rule_type: yoga

  - verse: 20
    topic: vipreet_raja_yoga
    planets: []
    houses: [8, 12]
    text_sanskrit: "Sarala Yoga Variant — Ashtamesh Dvadashe"
    text_english: "Sarala Yoga variant: The lord of the 8th house placed in the 12th house. Dangers dissipate through expenditure or foreign relocation, chronic threats resolve through spiritual practice, sudden upheavals lead to liberation, and the native escapes accidents or crises through seemingly miraculous means. Hidden enemies neutralize each other."
