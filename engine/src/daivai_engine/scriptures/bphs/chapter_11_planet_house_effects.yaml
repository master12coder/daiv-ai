book: BPHS
chapter: 11
title: "Effects of Planets in Houses"
description: "Brihat Parashara Hora Shastra chapters 11-12 describe the effects of each planet placed in each of the 12 houses from the ascendant."

rules:
  # ============================================================
  # SUN IN HOUSES (verses 1-12)
  # ============================================================
  - verse: 1
    topic: sun_in_houses
    planets: [Sun]
    houses: [1]
    text_sanskrit: ""
    text_english: "Sun in 1st house: The native is courageous, has a strong physique, leadership qualities, good health but prone to bilious disorders. If well-aspected, gives government favor and authority. The person is self-confident, dignified, and has a commanding personality."
    text_hindi: "सूर्य प्रथम भाव में: जातक साहसी, बलवान शरीर, नेतृत्व गुण, अच्छा स्वास्थ्य किन्तु पित्त विकार की सम्भावना। शुभ दृष्टि हो तो राजकीय कृपा और अधिकार प्राप्त होता है। व्यक्ति आत्मविश्वासी, गरिमापूर्ण और प्रभावशाली व्यक्तित्व वाला होता है।"
    rule_type: planet_house

  - verse: 2
    topic: sun_in_houses
    planets: [Sun]
    houses: [2]
    text_sanskrit: ""
    text_english: "Sun in 2nd house: The native may face obstacles in accumulating wealth and may have strained family relations. Speech may be harsh or authoritative. If well-placed, the person earns through government or authority and has a powerful voice."
    text_hindi: "सूर्य द्वितीय भाव में: धन संचय में बाधा और पारिवारिक सम्बन्धों में तनाव हो सकता है। वाणी कठोर या आधिकारिक होती है। शुभ स्थिति में सरकार या अधिकार से धनोपार्जन और प्रभावशाली वाणी होती है।"
    rule_type: planet_house

  - verse: 3
    topic: sun_in_houses
    planets: [Sun]
    houses: [3]
    text_sanskrit: ""
    text_english: "Sun in 3rd house: The native is brave, valorous, and victorious over enemies. Relations with younger siblings may be strained. The person has strong willpower, is inclined toward communication and short travels, and possesses physical courage."
    text_hindi: "सूर्य तृतीय भाव में: जातक वीर, पराक्रमी और शत्रुओं पर विजयी होता है। छोटे भाई-बहनों से सम्बन्ध तनावपूर्ण हो सकते हैं। व्यक्ति दृढ़ इच्छाशक्ति वाला, संवाद में रुचि रखने वाला और शारीरिक साहस वाला होता है।"
    rule_type: planet_house

  - verse: 4
    topic: sun_in_houses
    planets: [Sun]
    houses: [4]
    text_sanskrit: ""
    text_english: "Sun in 4th house: The native may lack domestic happiness and peace of mind. Relations with mother may be difficult. Loss of landed property or vehicles is possible. If strong, the person may own government properties or hold authority in homeland."
    text_hindi: "सूर्य चतुर्थ भाव में: गृह सुख और मानसिक शान्ति में कमी हो सकती है। माता से सम्बन्ध कठिन हो सकते हैं। भूमि या वाहन हानि सम्भव है। बलवान हो तो सरकारी सम्पत्ति या मातृभूमि में अधिकार प्राप्त होता है।"
    rule_type: planet_house

  - verse: 5
    topic: sun_in_houses
    planets: [Sun]
    houses: [5]
    text_sanskrit: ""
    text_english: "Sun in 5th house: The native may have few children or difficulties related to progeny. Intelligence is sharp and inclined toward politics or speculation. If well-placed, gives fame through creative pursuits, government positions, and strong mantra siddhi."
    text_hindi: "सूर्य पञ्चम भाव में: सन्तान कम या सन्तान सम्बन्धी कठिनाइयाँ हो सकती हैं। बुद्धि तीक्ष्ण और राजनीति या सट्टे की ओर झुकाव। शुभ स्थिति में सृजनात्मक कार्यों, सरकारी पदों से यश और मन्त्र सिद्धि प्राप्त होती है।"
    rule_type: planet_house

  - verse: 6
    topic: sun_in_houses
    planets: [Sun]
    houses: [6]
    text_sanskrit: ""
    text_english: "Sun in 6th house: The native is victorious over enemies, has good digestive fire, and can overcome diseases. Excellent for government service and competitive examinations. The person is industrious and can rise through service, though may suffer from acidity or heart-related issues."
    text_hindi: "सूर्य षष्ठ भाव में: जातक शत्रुओं पर विजयी, अच्छी जठराग्नि और रोग निवारण में सक्षम होता है। सरकारी सेवा और प्रतियोगी परीक्षाओं के लिए उत्तम। व्यक्ति परिश्रमी है किन्तु अम्लता या हृदय सम्बन्धी समस्या हो सकती है।"
    rule_type: planet_house

  - verse: 7
    topic: sun_in_houses
    planets: [Sun]
    houses: [7]
    text_sanskrit: ""
    text_english: "Sun in 7th house: The native may experience delays or difficulties in marriage. The spouse may be dominating or from a respectable family. Partnership ventures may face ego clashes. If strong, gives a spouse connected to authority or government."
    text_hindi: "सूर्य सप्तम भाव में: विवाह में विलम्ब या कठिनाइयाँ हो सकती हैं। जीवनसाथी प्रभावशाली या सम्मानित परिवार से हो सकता है। साझेदारी में अहंकार टकराव सम्भव। बलवान हो तो अधिकार या सरकार से जुड़ा जीवनसाथी मिलता है।"
    rule_type: planet_house

  - verse: 8
    topic: sun_in_houses
    planets: [Sun]
    houses: [8]
    text_sanskrit: ""
    text_english: "Sun in 8th house: The native may have a shorter lifespan or chronic health issues, especially related to eyes and bones. Inheritance may be problematic. However, interest in occult sciences is strong. If well-aspected, gives longevity through medical interventions and government insurance."
    text_hindi: "सूर्य अष्टम भाव में: अल्पायु या दीर्घकालिक स्वास्थ्य समस्याएँ, विशेषकर नेत्र और अस्थि सम्बन्धी। विरासत में समस्या हो सकती है। गूढ़ विद्याओं में रुचि प्रबल। शुभ दृष्टि में चिकित्सा और सरकारी बीमा से दीर्घायु।"
    rule_type: planet_house

  - verse: 9
    topic: sun_in_houses
    planets: [Sun]
    houses: [9]
    text_sanskrit: ""
    text_english: "Sun in 9th house: The native is religious, righteous, and fortunate. Relations with father may be strained or father may be authoritative. Inclined toward dharma, pilgrimage, and higher learning. If strong, the person gains government favor, becomes a leader in spiritual matters."
    text_hindi: "सूर्य नवम भाव में: जातक धार्मिक, धर्मपरायण और भाग्यशाली होता है। पिता से सम्बन्ध तनावपूर्ण या पिता प्रभावशाली हो सकते हैं। धर्म, तीर्थयात्रा और उच्च शिक्षा में रुचि। बलवान हो तो राजकीय कृपा और आध्यात्मिक नेतृत्व प्राप्त होता है।"
    rule_type: planet_house

  - verse: 10
    topic: sun_in_houses
    planets: [Sun]
    houses: [10]
    text_sanskrit: ""
    text_english: "Sun in 10th house: This is an excellent placement giving authority, fame, and success in career. The native holds high positions, gains government favor, and is respected in society. Strong leadership abilities and a powerful public image. One of the best placements for worldly success."
    text_hindi: "सूर्य दशम भाव में: यह उत्तम स्थिति है जो अधिकार, यश और कार्यक्षेत्र में सफलता देती है। जातक उच्च पद प्राप्त करता है, राजकीय कृपा और समाज में सम्मान पाता है। प्रबल नेतृत्व क्षमता और शक्तिशाली सार्वजनिक छवि। लौकिक सफलता के लिए सर्वोत्तम स्थितियों में से एक।"
    rule_type: planet_house

  - verse: 11
    topic: sun_in_houses
    planets: [Sun]
    houses: [11]
    text_sanskrit: ""
    text_english: "Sun in 11th house: The native gains wealth through government or authoritative sources. Fulfillment of desires and ambitions is indicated. The person has influential friends and elder siblings may be in powerful positions. Income is steady and comes from respectable sources."
    text_hindi: "सूर्य एकादश भाव में: सरकारी या आधिकारिक स्रोतों से धन लाभ। इच्छाओं और आकांक्षाओं की पूर्ति। प्रभावशाली मित्र और बड़े भाई-बहन शक्तिशाली पदों पर हो सकते हैं। आय स्थिर और सम्मानजनक स्रोतों से होती है।"
    rule_type: planet_house

  - verse: 12
    topic: sun_in_houses
    planets: [Sun]
    houses: [12]
    text_sanskrit: ""
    text_english: "Sun in 12th house: The native may face loss of vitality, weak eyesight, and expenditure on government-related matters. Foreign travels are possible. The person may lack self-confidence but gains spiritual inclination. If strong, success in foreign lands or government hospitals."
    text_hindi: "सूर्य द्वादश भाव में: जीवन शक्ति में कमी, दृष्टि दुर्बलता और सरकारी मामलों पर व्यय। विदेश यात्रा सम्भव। आत्मविश्वास की कमी किन्तु आध्यात्मिक रुझान। बलवान हो तो विदेश या सरकारी चिकित्सालयों में सफलता।"
    rule_type: planet_house

  # ============================================================
  # MOON IN HOUSES (verses 13-24)
  # ============================================================
  - verse: 13
    topic: moon_in_houses
    planets: [Moon]
    houses: [1]
    text_sanskrit: ""
    text_english: "Moon in 1st house: The native is beautiful, charming, and has a pleasant personality. The mind is receptive and emotional. If waxing Moon, gives good health, popularity, and a caring nature. If waning, the person may be restless and prone to mental fluctuations."
    text_hindi: "चन्द्रमा प्रथम भाव में: जातक सुन्दर, आकर्षक और मनमोहक व्यक्तित्व वाला होता है। मन ग्रहणशील और भावुक। शुक्ल पक्ष का चन्द्रमा हो तो अच्छा स्वास्थ्य, लोकप्रियता और करुणामय स्वभाव। क्षीण हो तो अस्थिरता और मानसिक उतार-चढ़ाव।"
    rule_type: planet_house

  - verse: 14
    topic: moon_in_houses
    planets: [Moon]
    houses: [2]
    text_sanskrit: ""
    text_english: "Moon in 2nd house: The native has a sweet and melodious voice, gains wealth through public dealings or liquids-related business. The family life is generally happy. If strong, the person is well-nourished, eloquent, and possesses beautiful eyes and face."
    text_hindi: "चन्द्रमा द्वितीय भाव में: जातक की वाणी मधुर और सुरीली होती है, जनसम्पर्क या तरल पदार्थों के व्यापार से धन लाभ। पारिवारिक जीवन सामान्यतः सुखी। बलवान हो तो व्यक्ति सुपोषित, वाक्पटु और सुन्दर नेत्र व मुख वाला होता है।"
    rule_type: planet_house

  - verse: 15
    topic: moon_in_houses
    planets: [Moon]
    houses: [3]
    text_sanskrit: ""
    text_english: "Moon in 3rd house: The native is mentally brave but may be fickle-minded. Relations with siblings fluctuate. Fond of short travels and changes. The person has good imagination and communication skills but may lack sustained effort."
    text_hindi: "चन्द्रमा तृतीय भाव में: जातक मानसिक रूप से साहसी किन्तु चंचल मन वाला हो सकता है। भाई-बहनों से सम्बन्ध अस्थिर। लघु यात्रा और परिवर्तन में रुचि। अच्छी कल्पनाशक्ति और संवाद कौशल किन्तु निरन्तर प्रयास में कमी।"
    rule_type: planet_house

  - verse: 16
    topic: moon_in_houses
    planets: [Moon]
    houses: [4]
    text_sanskrit: ""
    text_english: "Moon in 4th house: This is an excellent placement as Moon is strong in the 4th house (Digbala). The native enjoys domestic happiness, owns properties and vehicles, has a loving mother, and is emotionally content. Popular among people and blessed with comforts."
    text_hindi: "चन्द्रमा चतुर्थ भाव में: यह उत्तम स्थिति है क्योंकि चन्द्रमा चतुर्थ में दिग्बली होता है। जातक गृह सुख भोगता है, सम्पत्ति और वाहन का स्वामी, स्नेहमयी माता और भावनात्मक सन्तुष्टि। जनप्रिय और सुख-सुविधाओं से सम्पन्न।"
    rule_type: planet_house

  - verse: 17
    topic: moon_in_houses
    planets: [Moon]
    houses: [5]
    text_sanskrit: ""
    text_english: "Moon in 5th house: The native is intelligent, emotionally attached to children, and has good intuition. Fond of arts, music, and creative pursuits. If strong, blesses with good progeny. The mind is fertile and imagination is vivid. Success in speculative ventures is possible."
    text_hindi: "चन्द्रमा पञ्चम भाव में: जातक बुद्धिमान, सन्तान से भावनात्मक लगाव और अच्छी अन्तर्दृष्टि वाला। कला, संगीत और सृजनात्मक कार्यों में रुचि। बलवान हो तो उत्तम सन्तान सुख। उर्वर मन और सजीव कल्पना। सट्टे में सफलता सम्भव।"
    rule_type: planet_house

  - verse: 18
    topic: moon_in_houses
    planets: [Moon]
    houses: [6]
    text_sanskrit: ""
    text_english: "Moon in 6th house: The native may suffer from stomach ailments, emotional disturbances, and conflicts with maternal relatives. Enemies may cause mental stress. If afflicted, prone to depression and anxiety. Service-oriented work suits well but health needs attention."
    text_hindi: "चन्द्रमा षष्ठ भाव में: उदर रोग, भावनात्मक अशान्ति और मातृपक्ष के सम्बन्धियों से विवाद। शत्रु मानसिक तनाव दे सकते हैं। पीड़ित हो तो अवसाद और चिन्ता की प्रवृत्ति। सेवा कार्य उपयुक्त किन्तु स्वास्थ्य पर ध्यान आवश्यक।"
    rule_type: planet_house

  - verse: 19
    topic: moon_in_houses
    planets: [Moon]
    houses: [7]
    text_sanskrit: ""
    text_english: "Moon in 7th house: The native gets a beautiful, fair, and emotionally supportive spouse. Marriage is important for emotional fulfillment. The person is charming in partnerships and public dealings. If afflicted, the spouse may be moody or there may be multiple relationships."
    text_hindi: "चन्द्रमा सप्तम भाव में: जातक को सुन्दर, गोरा और भावनात्मक रूप से सहायक जीवनसाथी मिलता है। भावनात्मक पूर्ति के लिए विवाह महत्वपूर्ण। साझेदारी और जनसम्पर्क में आकर्षक। पीड़ित हो तो जीवनसाथी मूडी या बहु सम्बन्ध सम्भव।"
    rule_type: planet_house

  - verse: 20
    topic: moon_in_houses
    planets: [Moon]
    houses: [8]
    text_sanskrit: ""
    text_english: "Moon in 8th house: The native may have a short lifespan or chronic health issues. Mental anxiety and fear of the unknown are common. Interest in occult and mysticism is strong. If afflicted, emotional trauma and sudden upheavals. Inheritance from maternal side is possible."
    text_hindi: "चन्द्रमा अष्टम भाव में: अल्पायु या दीर्घकालिक स्वास्थ्य समस्याएँ। मानसिक चिन्ता और अज्ञात का भय। गूढ़ विद्या और रहस्यवाद में प्रबल रुचि। पीड़ित हो तो भावनात्मक आघात और अचानक उथल-पुथल। मातृपक्ष से विरासत सम्भव।"
    rule_type: planet_house

  - verse: 21
    topic: moon_in_houses
    planets: [Moon]
    houses: [9]
    text_sanskrit: ""
    text_english: "Moon in 9th house: The native is religious, devoted to mother and guru, and fortunate. Fond of pilgrimages and long journeys over water. The mind is philosophical and inclined toward higher learning. If strong, the person is blessed with divine grace and a virtuous mother."
    text_hindi: "चन्द्रमा नवम भाव में: जातक धार्मिक, माता और गुरु के प्रति समर्पित और भाग्यशाली। तीर्थयात्रा और जलमार्ग से लम्बी यात्रा में रुचि। दार्शनिक मन और उच्च शिक्षा में रुझान। बलवान हो तो दैवी कृपा और सद्गुणी माता का आशीर्वाद।"
    rule_type: planet_house

  - verse: 22
    topic: moon_in_houses
    planets: [Moon]
    houses: [10]
    text_sanskrit: ""
    text_english: "Moon in 10th house: The native is successful in career, popular among masses, and gains through public dealings. Work related to liquids, nursing, hospitality, or public welfare suits well. The person is adaptable in profession and may change careers frequently."
    text_hindi: "चन्द्रमा दशम भाव में: जातक कार्यक्षेत्र में सफल, जनता में लोकप्रिय और जनसम्पर्क से लाभ। तरल पदार्थ, परिचर्या, आतिथ्य या जनकल्याण से सम्बन्धित कार्य उपयुक्त। व्यवसाय में अनुकूलनशील और बार-बार व्यवसाय परिवर्तन सम्भव।"
    rule_type: planet_house

  - verse: 23
    topic: moon_in_houses
    planets: [Moon]
    houses: [11]
    text_sanskrit: ""
    text_english: "Moon in 11th house: The native gains wealth easily, has many friends, and fulfillment of desires. Income comes through public dealings, women, or liquid-related enterprises. Elder siblings are supportive. This is one of the best placements for material prosperity."
    text_hindi: "चन्द्रमा एकादश भाव में: धन सहजता से प्राप्त होता है, अनेक मित्र और इच्छापूर्ति। जनसम्पर्क, महिलाओं या तरल पदार्थों के उद्यम से आय। बड़े भाई-बहन सहायक। भौतिक समृद्धि के लिए सर्वोत्तम स्थितियों में से एक।"
    rule_type: planet_house

  - verse: 24
    topic: moon_in_houses
    planets: [Moon]
    houses: [12]
    text_sanskrit: ""
    text_english: "Moon in 12th house: The native may suffer from insomnia, eye troubles, and excessive expenditure. Fond of solitude and spiritual practices. Foreign residence is likely. If afflicted, mental disturbances and hospitalization. If strong, gains spiritual enlightenment and moksha."
