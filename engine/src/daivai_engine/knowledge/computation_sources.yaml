# ── STRENGTH & AVASTHAS ───────────────────────────────────────

ishta_kashta:
  source: "BPHS Ch.27"
  rule: "Ishta=sqrt(Uchcha*Cheshta), Kashta=sqrt((60-Uchcha)*(60-Cheshta)). Net=Ishta-Kashta."
  alternatives:
    - "Some texts use arithmetic mean instead of geometric (square root)"
  invalidation:
    - "Depends on accurate Shadbala Uchcha Bala and Cheshta Bala components"
  confidence: "high — formula is explicit in BPHS"

bhava_bala:
  source: "BPHS Ch.24"
  rule: "House strength from 3 components: Bhavadhipati (lord strength), Bhava Dig, Bhava Drishti"
  alternatives:
    - "Some texts add Bhava Paksha Bala as 4th component"
  invalidation:
    - "Depends on Shadbala accuracy for Bhavadhipati component"
  confidence: "high — BPHS Ch.24 is explicit"

deeptadi_avastha:
  source: "BPHS Ch.45 v1-10, Ch.3 v53-58 (Panchada Maitri)"
  rule: >
    9 states using PANCHADA (5-fold combined) friendship:
    Deepta(exalted), Swastha(own), Mudita(adhimitra), Shanta(mitra),
    Deena(sama/neutral), Vikala(combust), Dukhita(shatru),
    Khal(adhishatru), Kopa(debilitated).
    Panchada = Naisargika (natural, Ch.3 v53-56) + Tatkalika (temporary,
    Ch.3 v57-58). Temporary friend if sign lord is in 2,3,4,10,11,12 from planet.
  priority: "debilitation > combustion > exaltation > own > panchada friendship"
  cross_verification:
    note: "Verified against external Kundli software for Manish (13 Mar 1989)"
    matches: "Sun(Deena), Moon(Deepta), Mars(Shanta) — all match"
    differences:
      - planet: Mercury
        ours: "Shanta (mitra: Saturn is neutral+temp friend)"
        external: "Muditha"
        verdict: "Ours correct. Mercury-Saturn = NEUTRAL per BPHS Ch.3. External has wrong friendship table."
      - planet: Jupiter
        ours: "Deena (sama: Venus is enemy+temp friend)"
        external: "Shant"
        verdict: "Ours correct. Jupiter-Venus = ENEMY per BPHS Ch.3. External ignores natural enmity."
      - planet: Venus
        ours: "Vikala (combust, 5.7° from Sun)"
        external: "Shant"
        verdict: "Both valid. BPHS Ch.45 says combustion overrides. Some software ignores combustion in Deeptadi. We follow BPHS strictly."
      - planet: Saturn
        ours: "Dukhita (shatru: Jupiter is neutral+temp enemy)"
        external: "Swatha (own sign)"
        verdict: "External has a BUG. Saturn owns Capricorn(9) and Aquarius(10). Sagittarius(8) is Jupiter's sign, NOT Saturn's."
  alternatives:
    - "Some software uses only Naisargika (natural) without Tatkalika — simpler but less accurate"
    - "Some software ignores combustion in Deeptadi classification"
    - "Priority order of combustion vs sign-friendship debated across traditions"
  confidence: "high — BPHS Ch.45 + Ch.3 Panchada is the correct standard"

lajjitadi_avastha:
  source: "BPHS Ch.45 v11-20"
  rule: "6 states based on position and conjunction: Lajjita, Garvita, Kshudhita, Trushita, Mudita, Kshobhita"
  alternatives:
    - "Conjunction orb (same sign vs within degrees) varies by text"
  invalidation:
    - "Depends on accurate house and conjunction determination"
  confidence: "high — BPHS Ch.45 is explicit"

