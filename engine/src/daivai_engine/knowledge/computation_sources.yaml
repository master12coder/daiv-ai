  confidence: "high — core concept; specific rules have minor variations"

# ── DOSHAS ────────────────────────────────────────────────────

mangal_dosha:
  source: "BPHS, Muhurta Chintamani"
  rule: "Mars in houses 1/2/4/7/8/12 from Lagna"
  cancellations:
    - "Mars in own sign (Aries/Scorpio)"
