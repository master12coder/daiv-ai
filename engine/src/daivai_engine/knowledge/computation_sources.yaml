# ── GANDANTA ──────────────────────────────────────────────────

gandanta:
  source: "BPHS, Phaladeepika, widely used in muhurta"
  rule: "Last 3°20' of water sign to first 3°20' of fire sign"
  zones:
    - "Cancer/Leo: 116°40' to 123°20'"
