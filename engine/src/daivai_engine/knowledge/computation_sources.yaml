    - "Jupiter aspects Mars"
    - "Venus aspects Mars"
    - "Mars in Gemini/Virgo in 2nd house"
    - "Mars in Taurus/Libra in 12th house"
    - "Both partners have Mangal Dosha (mutual cancellation)"
