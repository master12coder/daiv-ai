# Planetary aspects in Vedic astrology
# Every planet has a standard 7th house aspect
# Some planets have additional special aspects

standard_aspect:
  description: "Every planet aspects the 7th house from its position"
  houses: [7]
  applicable_to: ["Sun", "Moon", "Mars", "Mercury", "Jupiter", "Venus", "Saturn", "Rahu", "Ketu"]

special_aspects:
  Mars:
    additional_aspects: [4, 8]
    total_aspects: [4, 7, 8]
    description: "Mars has special 4th and 8th house aspects in addition to 7th"
    notes: "Mars's 4th aspect represents its protective/defensive nature. 8th aspect represents its transformative power."

  Jupiter:
    additional_aspects: [5, 9]
    total_aspects: [5, 7, 9]
    description: "Jupiter has special 5th and 9th house aspects in addition to 7th"
    notes: "Jupiter's 5th aspect blesses children and creativity. 9th aspect enhances fortune and dharma."

  Saturn:
    additional_aspects: [3, 10]
    total_aspects: [3, 7, 10]
    description: "Saturn has special 3rd and 10th house aspects in addition to 7th"
    notes: "Saturn's 3rd aspect tests courage and effort. 10th aspect influences career and public image."

  Rahu:
    additional_aspects: [5, 9]
    total_aspects: [5, 7, 9]
    description: "Rahu has aspects similar to Jupiter (5th and 9th) in addition to 7th"
    notes: "Some traditions give Rahu only 7th aspect. Parashari tradition assigns 5/9 as well."

  Ketu:
    additional_aspects: [5, 9]
    total_aspects: [5, 7, 9]
    description: "Ketu has aspects similar to Jupiter in addition to 7th"
    notes: "Ketu's aspects are spiritually oriented — detachment and moksha themes."

aspect_effects:
  conjunction:
    orb: 0  # Same sign
    strength: "Strongest influence — planets merge energies"
  opposition:
    houses: 7
    strength: "Strong — tension or complementarity between houses"
  trine:
    houses: [5, 9]
    strength: "Harmonious — flowing support between houses"
  square:
    houses: [4, 10]
    strength: "Challenging — growth through friction"

mutual_aspects:
  description: "When two planets aspect each other, it creates a mutual connection (sambandha)"
  effect: "Mutual aspect between kendra and trikona lords = Raj Yoga formation"
  examples:
    - "Mars in 1st, Saturn in 7th = mutual 7th aspect"
    - "Jupiter in 1st, Saturn in 3rd = Jupiter aspects Saturn (5th), Saturn aspects Jupiter (3rd)"

# =============================================================================
# ASPECT STRENGTH PERCENTAGES (Drik Bala weights)
# Source: BPHS Chapter 23 — Kala Bala / Drik Bala computation
# =============================================================================
# Base rule: ALL planets cast 100% (Poorna Drishti) on the 7th house from them.
# Special planets cast graduated aspects on additional houses.
# All other house positions receive 0% (no aspect strength).
#
# Percentages represent fraction of full aspect strength:
#   100% = Poorna Drishti (full sight)
#    75% = Tritiya Drishti (three-quarter sight)
#    50% = Ardha Drishti (half sight)
#    25% = Pada Drishti (quarter sight)
# =============================================================================
aspect_strengths:

  # ── Standard 7th aspect (all planets) ──────────────────────────────────────
  standard:
    house_7: 100     # Poorna Drishti — all 9 planets
    description: "Every planet aspects the 7th house from its position at full strength"

  # ── Mars special aspects ───────────────────────────────────────────────────
  # Mars rules aggression, property (4th), and transformation (8th).
  Mars:
    house_4:  75     # Tritiya Drishti — three-quarter aspect
    house_7: 100     # Poorna Drishti — standard full aspect
    house_8: 100     # Poorna Drishti — special full aspect

  # ── Jupiter special aspects ────────────────────────────────────────────────
  # Jupiter rules wisdom (5th/progeny) and dharma/fortune (9th).
  Jupiter:
    house_5:  50     # Ardha Drishti — half aspect
    house_7: 100     # Poorna Drishti — standard full aspect
    house_9: 100     # Poorna Drishti — special full aspect

  # ── Saturn special aspects ─────────────────────────────────────────────────
  # Saturn tests courage/effort (3rd) and disciplines karma/career (10th).
  Saturn:
    house_3:  25     # Pada Drishti — quarter aspect
    house_7: 100     # Poorna Drishti — standard full aspect
    house_10: 100    # Poorna Drishti — special full aspect

  # ── Rahu special aspects (Parashari tradition) ─────────────────────────────
  # Rahu is given Jupiter-style aspects in the Parashari system.
  Rahu:
    house_5:  50
    house_7: 100
    house_9: 100

  # ── Ketu special aspects ───────────────────────────────────────────────────
  # Ketu mirrors Jupiter's aspects with a spiritually detaching quality.
  Ketu:
    house_5:  50
    house_7: 100
    house_9: 100

# Unified house-offset reference table
# Shows the maximum strength any planet can cast on each house position.
# (Actual strength depends on the specific planet aspecting.)
house_strength_reference:
  house_1:  0     # No aspect (conjunction is not an aspect in Parashari)
  house_2:  0     # No aspect
  house_3:  25    # Saturn only (Pada Drishti)
  house_4:  75    # Mars only (Tritiya Drishti)
  house_5:  50    # Jupiter / Rahu / Ketu (Ardha Drishti)
  house_6:  0     # No aspect
  house_7:  100   # All planets (Poorna Drishti)
  house_8:  100   # Mars only (Poorna Drishti)
  house_9:  100   # Jupiter / Rahu / Ketu (Poorna Drishti)
  house_10: 100   # Saturn only (Poorna Drishti)
  house_11: 0     # No aspect
  house_12: 0     # No aspect
