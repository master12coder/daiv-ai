# Gemstone Logic — Complete planetary gemstone data with contraindications

gemstones:
  Sun:
    primary:
      name_en: Ruby
      name_hi: "माणिक्य (Manikya)"
      substitute: Garnet
    finger: Ring finger
    hand: Right
    metal: Gold
    day: Sunday
    hora: "Sun hora (first hour after sunrise on Sunday)"
    mantra: "ओम् ह्रां ह्रीं ह्रौम् सः सूर्याय नमः"
    mantra_count: 7000
    weight_formula: "body_weight_kg / 10 in ratti (minimum 3 ratti)"

  Moon:
    primary:
      name_en: Pearl
      name_hi: "मोती (Moti)"
      substitute: Moonstone
    finger: Little finger
    hand: Right
    metal: Silver
    day: Monday
    hora: "Moon hora (first hour after sunrise on Monday)"
    mantra: "ओम् श्रां श्रीं श्रौम् सः चन्द्राय नमः"
    mantra_count: 11000
    weight_formula: "body_weight_kg / 10 in ratti (minimum 4 ratti)"

  Mars:
    primary:
      name_en: Red Coral
      name_hi: "मूंगा (Moonga)"
      substitute: Carnelian
    finger: Ring finger
    hand: Right
    metal: Gold or Copper
    day: Tuesday
    hora: "Mars hora (first hour after sunrise on Tuesday)"
    mantra: "ओम् क्रां क्रीं क्रौम् सः भौमाय नमः"
    mantra_count: 10000
    weight_formula: "body_weight_kg / 10 in ratti (minimum 6 ratti)"

  Mercury:
    primary:
      name_en: Emerald
      name_hi: "पन्ना (Panna)"
      substitute: Green Tourmaline
    finger: Little finger
    hand: Right
    metal: Gold
    day: Wednesday
    hora: "Mercury hora (first hour after sunrise on Wednesday)"
    mantra: "ओम् ब्रां ब्रीं ब्रौम् सः बुधाय नमः"
    mantra_count: 9000
    weight_formula: "body_weight_kg / 12 in ratti (minimum 3.5 ratti)"

  Jupiter:
    primary:
      name_en: Yellow Sapphire
      name_hi: "पुखराज (Pukhraj)"
      substitute: Yellow Topaz
    finger: Index finger
    hand: Right
    metal: Gold
    day: Thursday
    hora: "Jupiter hora (first hour after sunrise on Thursday)"
    mantra: "ओम् ग्रां ग्रीं ग्रौम् सः गुरुवे नमः"
    mantra_count: 19000
    weight_formula: "body_weight_kg / 10 in ratti (minimum 3 ratti)"

  Venus:
    primary:
      name_en: Diamond
      name_hi: "हीरा (Heera)"
      substitute: White Sapphire
    finger: Middle finger
    hand: Right
    metal: Platinum or Silver
    day: Friday
    hora: "Venus hora (first hour after sunrise on Friday)"
    mantra: "ओम् द्रां द्रीं द्रौम् सः शुक्राय नमः"
    mantra_count: 16000
    weight_formula: "minimum 0.5 carat (1 ratti)"

  Saturn:
    primary:
      name_en: Blue Sapphire
      name_hi: "नीलम (Neelam)"
      substitute: Amethyst
    finger: Middle finger
    hand: Right
    metal: Silver or Iron (Panchdhatu)
    day: Saturday
    hora: "Saturn hora (first hour after sunrise on Saturday)"
    mantra: "ओम् प्रां प्रीं प्रौम् सः शनैश्चराय नमः"
    mantra_count: 23000
    weight_formula: "body_weight_kg / 15 in ratti (minimum 4 ratti). ALWAYS trial for 3 days first."

  Rahu:
    primary:
      name_en: Hessonite
      name_hi: "गोमेद (Gomed)"
      substitute: Zircon
    finger: Middle finger
    hand: Right
    metal: Panchdhatu or Silver
    day: Saturday
    hora: "Rahu kaal timing on Saturday"
    mantra: "ओम् भ्रां भ्रीं भ्रौम् सः राहवे नमः"
    mantra_count: 18000
    weight_formula: "body_weight_kg / 10 in ratti (minimum 5 ratti)"

  Ketu:
    primary:
      name_en: Cat's Eye
      name_hi: "लहसुनिया (Lehsuniya)"
      substitute: Tiger's Eye
    finger: Ring finger
    hand: Right
    metal: Panchdhatu or Silver
    day: Tuesday
    hora: "Ketu kaal timing"
    mantra: "ओम् स्रां स्रीं स्रौम् सः केतवे नमः"
    mantra_count: 17000
    weight_formula: "body_weight_kg / 12 in ratti (minimum 3 ratti)"

decision_framework:
  always_safe:
    - "Lagnesh stone — always beneficial for the ascendant lord"
    - "Yogakaraka stone — planet owning kendra + trikona"
    - "Current beneficial Mahadasha lord stone"
  use_caution:
    - "Debilitated planet stone — may amplify weakness initially"
    - "Combust planet stone — effectiveness reduced"
    - "8th+9th mixed lord stone — test before wearing"
  never_wear:
    - "Pure 6th lord stone (unless also trikona lord)"
    - "Maraka planet stone during health-vulnerable dasha"
    - "Stones from shatru (enemy) planetary groups simultaneously"

contraindications:
  - "Never wear Ruby + Blue Sapphire (Sun enemy of Saturn)"
  - "Never wear Pearl + Hessonite (Moon enemy of Rahu)"
  - "Never wear Red Coral + Emerald (Mars enemy of Mercury) — debatable"
  - "Never wear Yellow Sapphire + Diamond (Jupiter enemy of Venus)"
  - "Never wear Yellow Sapphire + Emerald (Jupiter enemy of Mercury)"

planetary_friendships:
  friends:
    Sun: [Moon, Mars, Jupiter]
    Moon: [Sun, Mercury]
    Mars: [Sun, Moon, Jupiter]
    Mercury: [Sun, Venus]
    Jupiter: [Sun, Moon, Mars]
    Venus: [Mercury, Saturn]
    Saturn: [Mercury, Venus]
  enemies:
    Sun: [Saturn, Venus]
    Moon: [Rahu, Ketu]
    Mars: [Mercury]
    Mercury: [Moon]
    Jupiter: [Mercury, Venus]
    Venus: [Sun, Moon]
    Saturn: [Sun, Moon, Mars]

wearing_vidhan:
  steps:
    - "Purchase stone on the auspicious day (planet's day)"
    - "Get it set in proper metal by a trusted jeweler"
    - "On wearing day, wake up early, bathe"
    - "Place ring/pendant on a clean cloth with raw rice"
    - "Light incense and diya (lamp)"
    - "Sprinkle Gangajal (holy water) on the stone"
    - "Chant the planet's mantra specified number of times"
    - "Wear on the specified finger of specified hand"
    - "Best worn during planet's hora or during sunrise on planet's day"
  precautions:
    - "Blue Sapphire (Neelam) must be trialed for 3 days before permanent wear"
    - "Never wear a cracked, chipped, or cloudy stone"
    - "Remove stone if consistent negative effects for 7+ days"
    - "Consult a knowledgeable astrologer before wearing maraka planet stones"
