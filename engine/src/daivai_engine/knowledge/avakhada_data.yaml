# =============================================================================
# Avakhada Chakra — Complete Mapping Tables
# Source: Brihat Parasara Hora Shastra and classical Jyotish texts
# =============================================================================
# The Avakhada Chakra ("birth table") contains 18 classical qualities derived
# primarily from the Moon's nakshatra, pada, and sign position relative to the
# lagna. Used in birth analysis and Ashta Koota horoscope matching.
# =============================================================================

# -----------------------------------------------------------------------------
# PAYA (base metal) — determined by Moon's nakshatra number (1–27)
# -----------------------------------------------------------------------------
# Classical cyclical method: nakshatra_number % 4 determines the metal.
# The four metals cycle continuously through all 27 nakshatras.
#
# Verification:  Rohini = nakshatra 4,  4 % 4 = 0  →  Iron  ✓ (InstaAstro)
#                Ashwini = nakshatra 1, 1 % 4 = 1  →  Gold
#                Bharani = nakshatra 2, 2 % 4 = 2  →  Silver
#                Krittika = nakshatra 3, 3 % 4 = 3 →  Copper
# -----------------------------------------------------------------------------
paya:
  method: nakshatra_cyclic
  description: >
    Moon's 1-indexed nakshatra number modulo 4 determines Paya (base metal).
    Remainder 0=Iron, 1=Gold, 2=Silver, 3=Copper. Repeats every 4 nakshatras.
  mod_map:
    0: Iron
    1: Gold
    2: Silver
    3: Copper
  interpretation:
    Gold:   "Most auspicious — divine grace, prosperity, leadership quality"
    Silver: "Auspicious — social success, comfort, aesthetic refinement"
    Copper: "Mixed — moderate effort yields moderate results"
    Iron:   "Challenging — strong will needed; spiritual strength through trials"

# -----------------------------------------------------------------------------
# TATVA (element) — determined by Moon's nakshatra pada (1–4)
# -----------------------------------------------------------------------------
# The four padas of every nakshatra correspond to the four Purusharthas
# (life goals) which map to four of the five Panchamahabhuta elements.
# This is independent of the nakshatra itself — only the pada matters.
#
# Verification:  Manish Chaurasia, Rohini Pada 2  →  Tatva = Earth  ✓ (InstaAstro)
# -----------------------------------------------------------------------------
tatva:
  method: pada_based
  description: >
    Moon's pada (1–4) maps to Panchamahabhuta (five great elements).
    Pada 1=Fire (Dharma/Agni), Pada 2=Earth (Artha/Prithvi),
    Pada 3=Air (Kama/Vayu), Pada 4=Water (Moksha/Jala).
  pada_map:
    1: Fire
    2: Earth
    3: Air
    4: Water
  sanskrit_names:
    Fire:  Agni
    Earth: Prithvi
    Air:   Vayu
    Water: Jala

# -----------------------------------------------------------------------------
# YUNJA (birth group) — based on Moon's nakshatra number (1–27)
# -----------------------------------------------------------------------------
# The 27 nakshatras are divided into three equal groups of 9.
# Each group is called a Yunja (junction/period).
# Verification:  Rohini = nakshatra 4, falls in group 1–9  →  Poorva  ✓
# -----------------------------------------------------------------------------
yunja:
  method: nakshatra_thirds
  description: >
    27 nakshatras divided into three equal groups of 9.
    Poorva (former, nakshatras 1–9), Madhya (middle, 10–18),
    Uttara (latter, 19–27).
  groups:
    Poorva:
      range: [1, 9]
      nakshatras:
        - Ashwini
        - Bharani
        - Krittika
        - Rohini
        - Mrigashira
        - Ardra
        - Punarvasu
        - Pushya
        - Ashlesha
    Madhya:
      range: [10, 18]
      nakshatras:
        - Magha
        - Purva Phalguni
        - Uttara Phalguni
        - Hasta
        - Chitra
        - Swati
        - Vishakha
        - Anuradha
        - Jyeshtha
    Uttara:
      range: [19, 27]
      nakshatras:
        - Moola
        - Purva Ashadha
        - Uttara Ashadha
        - Shravana
        - Dhanishta
        - Shatabhisha
        - Purva Bhadrapada
        - Uttara Bhadrapada
        - Revati

# -----------------------------------------------------------------------------
# VASHYA (dominance/creature type) — based on Moon's sign (0–11)
# -----------------------------------------------------------------------------
# Each zodiac sign is associated with a class of creature. In Avakhada Chakra,
# this indicates the native's Vashya type for temperament and compatibility.
# -----------------------------------------------------------------------------
vashya:
  method: sign_based
  description: >
    Moon's sign (0-indexed, 0=Aries) determines the Vashya type —
    the class of creature the native represents in Avakhada Chakra.
  sign_map:
    0: Chatushpad   # Mesha (Aries) — four-legged/quadruped
    1: Chatushpad   # Vrishabha (Taurus) — four-legged/quadruped
    2: Manav        # Mithuna (Gemini) — human/biped
    3: Jalachara    # Karka (Cancer) — aquatic creature
    4: Vanchar      # Simha (Leo) — wild/forest animal
    5: Manav        # Kanya (Virgo) — human/biped
    6: Manav        # Tula (Libra) — human/biped
    7: Keet         # Vrischika (Scorpio) — insect/reptile
    8: Chatushpad   # Dhanu (Sagittarius) — four-legged
    9: Chatushpad   # Makara (Capricorn) — four-legged (some: Jalachara)
    10: Manav       # Kumbha (Aquarius) — human/biped
    11: Jalachara   # Meena (Pisces) — aquatic creature

# -----------------------------------------------------------------------------
