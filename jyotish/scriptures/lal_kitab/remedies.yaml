  # === SATURN IN HOUSES ===
  - verse: 31
    topic: "lal_kitab_remedy"
    planets: [Saturn]
    houses: [1]
    text_sanskrit: ""
    text_english: "Saturn in 1st house remedy: Abstain from alcohol and non-vegetarian food. Bury surma (kohl) or a piece of iron in the ground. Offer mustard oil at a Shani temple on Saturdays. Keep a square piece of iron in your pocket."
    text_hindi: "शनि प्रथम भाव उपाय: मद्य और माँसाहार का त्याग करें। सुरमा या लोहे का टुकड़ा भूमि में गाड़ें। शनिवार को शनि मन्दिर में सरसों का तेल अर्पित करें। जेब में लोहे का चौकोर टुकड़ा रखें।"
    rule_type: "remedy"

  - verse: 32
    topic: "lal_kitab_remedy"
    planets: [Saturn]
    houses: [4]
    text_sanskrit: ""
    text_english: "Saturn in 4th house remedy: Offer milk to a snake's burrow (not to a snake directly). Keep a square piece of silver in the house. Bury a flute (bansuri) made of bamboo in a deserted place. Pour milk into a well."
    text_hindi: "शनि चतुर्थ भाव उपाय: साँप की बाँबी में दूध अर्पित करें (सीधे साँप को नहीं)। घर में चाँदी का चौकोर टुकड़ा रखें। बाँस की बाँसुरी वीरान स्थान पर गाड़ें। कुएँ में दूध डालें।"
    rule_type: "remedy"

  - verse: 33
    topic: "lal_kitab_remedy"
    planets: [Saturn]
    houses: [7]
    text_sanskrit: ""
    text_english: "Saturn in 7th house remedy: Bury a flute (bansuri) in a cremation ground. Offer mustard oil and urad dal at a Shani temple on Saturdays. Avoid alcohol completely. Keep an iron ball in your pocket."
    text_hindi: "शनि सप्तम भाव उपाय: श्मशान भूमि में बाँसुरी गाड़ें। शनिवार को शनि मन्दिर में सरसों का तेल और उड़द दाल अर्पित करें। मद्य का पूर्णतः त्याग करें। जेब में लोहे की गोली रखें।"
    rule_type: "remedy"

  - verse: 34
    topic: "lal_kitab_remedy"
    planets: [Saturn]
    houses: [8]
    text_sanskrit: ""
    text_english: "Saturn in 8th house remedy: Keep a square piece of lead or iron with you always. Offer urad dal and sesame oil at a Shani temple. Bury surma in the ground near a peepal tree. Feed chapati to crows on Saturdays."
    text_hindi: "शनि अष्टम भाव उपाय: सीसे या लोहे का चौकोर टुकड़ा सदैव पास रखें। शनि मन्दिर में उड़द दाल और तिल का तेल अर्पित करें। पीपल के वृक्ष के पास सुरमा भूमि में गाड़ें। शनिवार को कौओं को रोटी खिलाएँ।"
    rule_type: "remedy"

  - verse: 35
    topic: "lal_kitab_remedy"
    planets: [Saturn]
    houses: [10]
    text_sanskrit: ""
    text_english: "Saturn in 10th house remedy: Keep a dark room in the house. Feed crows and offer them chapati with mustard oil on Saturdays. Keep an iron vessel filled with water by the bedside. Donate shoes or black blankets to the needy."
    text_hindi: "शनि दशम भाव उपाय: घर में एक अन्धेरा कमरा रखें। शनिवार को कौओं को सरसों के तेल वाली रोटी खिलाएँ। सिरहाने लोहे के बर्तन में जल रखें। जरूरतमन्दों को जूते या काले कम्बल दान करें।"
    rule_type: "remedy"

  # === RAHU IN HOUSES ===
  - verse: 36
    topic: "lal_kitab_remedy"
    planets: [Rahu]
    houses: [1]
    text_sanskrit: ""
    text_english: "Rahu in 1st house remedy: Keep a piece of silver in your pocket. Throw barley (jau) in running water. Keep electrical items and ivory-coloured items in the south-west of the house. Never accept free electrical items. Offer coconut in flowing water."
    text_hindi: "राहु प्रथम भाव उपाय: जेब में चाँदी का टुकड़ा रखें। बहते जल में जौ प्रवाहित करें। विद्युत उपकरण और हाथीदाँत रंग की वस्तुएँ घर के दक्षिण-पश्चिम में रखें। मुफ्त विद्युत उपकरण स्वीकार न करें। बहते जल में नारियल अर्पित करें।"
    rule_type: "remedy"

  - verse: 37
    topic: "lal_kitab_remedy"
    planets: [Rahu]
    houses: [4]
    text_sanskrit: ""
    text_english: "Rahu in 4th house remedy: Wear a silver pendant around your neck. Keep four pieces of silver in the house. Offer barley in running water. Store rain water or Ganga water in the house. Do not keep any ivory or elephant-related item."
    text_hindi: "राहु चतुर्थ भाव उपाय: गले में चाँदी का लॉकेट पहनें। घर में चाँदी के चार टुकड़े रखें। बहते जल में जौ प्रवाहित करें। घर में वर्षा जल या गंगा जल संचित रखें। हाथीदाँत या हाथी से सम्बन्धित वस्तु न रखें।"
    rule_type: "remedy"

  - verse: 38
    topic: "lal_kitab_remedy"
    planets: [Rahu]
    houses: [7]
    text_sanskrit: ""
    text_english: "Rahu in 7th house remedy: Keep a piece of silver with you. Offer coconut in flowing water regularly. Do not keep any ivory item in the house. Throw raw coal (koyla) in flowing water. Keep a silver chain in the house."
    text_hindi: "राहु सप्तम भाव उपाय: चाँदी का टुकड़ा पास रखें। नियमित रूप से बहते जल में नारियल अर्पित करें। घर में हाथीदाँत की कोई वस्तु न रखें। बहते जल में कच्चा कोयला प्रवाहित करें। घर में चाँदी की चेन रखें।"
    rule_type: "remedy"

  - verse: 39
    topic: "lal_kitab_remedy"
    planets: [Rahu]
    houses: [8]
    text_sanskrit: ""
    text_english: "Rahu in 8th house remedy: Keep a solid piece of silver with you always. Offer barley and coconut in flowing water. Keep raw rice tied in a white cloth under the pillow. Never accept electrical items for free. Feed birds daily."
    text_hindi: "राहु अष्टम भाव उपाय: चाँदी का ठोस टुकड़ा सदैव पास रखें। बहते जल में जौ और नारियल अर्पित करें। सफ़ेद कपड़े में कच्चे चावल बाँधकर तकिये के नीचे रखें। विद्युत उपकरण कभी मुफ्त न लें। प्रतिदिन पक्षियों को दाना डालें।"
    rule_type: "remedy"

  - verse: 40
    topic: "lal_kitab_remedy"
    planets: [Rahu]
    houses: [12]
    text_sanskrit: ""
    text_english: "Rahu in 12th house remedy: Keep raw rice tied in a white cloth and keep it with you. Throw barley in flowing water daily. Offer coconut in flowing water on Saturdays. Do not keep blue-coloured sapphire. Sleep with your head towards the south."
    text_hindi: "राहु द्वादश भाव उपाय: सफ़ेद कपड़े में कच्चे चावल बाँधकर पास रखें। प्रतिदिन बहते जल में जौ प्रवाहित करें। शनिवार को बहते जल में नारियल अर्पित करें। नीला नीलम न रखें। सिर दक्षिण दिशा की ओर करके सोएँ।"
    rule_type: "remedy"

  # === KETU IN HOUSES ===
  - verse: 41
    topic: "lal_kitab_remedy"
    planets: [Ketu]
    houses: [1]
    text_sanskrit: ""
    text_english: "Ketu in 1st house remedy: Keep a silver pot filled with honey in the house. Wear gold in the ear. Feed stray dogs regularly with chapati. Offer saffron at a Ganesh temple. Donate blankets of brown or grey colour."
    text_hindi: "केतु प्रथम भाव उपाय: घर में चाँदी के बर्तन में शहद भरकर रखें। कान में सोना पहनें। नियमित रूप से आवारा कुत्तों को रोटी खिलाएँ। गणेश मन्दिर में केसर अर्पित करें। भूरे या स्लेटी रंग के कम्बल दान करें।"
    rule_type: "remedy"

  - verse: 42
    topic: "lal_kitab_remedy"
    planets: [Ketu]
    houses: [4]
    text_sanskrit: ""
    text_english: "Ketu in 4th house remedy: Keep a dog as a pet or feed stray dogs daily. Wear gold in the ear. Offer blankets at a place of worship. Donate sesame seeds (til) and jaggery on Saturdays. Keep saffron in the house."
    text_hindi: "केतु चतुर्थ भाव उपाय: कुत्ता पालें या प्रतिदिन आवारा कुत्तों को खिलाएँ। कान में सोना पहनें। पूजा स्थल पर कम्बल अर्पित करें। शनिवार को तिल और गुड़ दान करें। घर में केसर रखें।"
    rule_type: "remedy"

  - verse: 43
    topic: "lal_kitab_remedy"
    planets: [Ketu]
    houses: [7]
    text_sanskrit: ""
    text_english: "Ketu in 7th house remedy: Feed brown-coloured dogs. Donate a blanket of grey or brown colour. Wear gold in the ear. Keep a piece of gold in your wallet. Offer seven grains (saptadhanya) at a temple."
    text_hindi: "केतु सप्तम भाव उपाय: भूरे रंग के कुत्तों को खिलाएँ। स्लेटी या भूरे रंग का कम्बल दान करें। कान में सोना पहनें। बटुए में सोने का टुकड़ा रखें। मन्दिर में सप्तधान्य अर्पित करें।"
    rule_type: "remedy"

