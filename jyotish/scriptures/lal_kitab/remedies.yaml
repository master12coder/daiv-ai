    houses: [10]
    text_sanskrit: ""
    text_english: "Ketu in 10th house remedy: Keep a dog in the house or feed stray dogs daily. Wear a gold ring in the ear. Offer sweet chapati to dogs. Donate brown and grey blankets. Keep saffron tilak on the forehead."
    text_hindi: "केतु दशम भाव उपाय: घर में कुत्ता रखें या प्रतिदिन आवारा कुत्तों को खिलाएँ। कान में सोने की बाली पहनें। कुत्तों को मीठी रोटी खिलाएँ। भूरे और स्लेटी कम्बल दान करें। माथे पर केसर का तिलक लगाएँ।"
    rule_type: "remedy"

