    text_english: "Ketu in 12th house remedy: Feed stray dogs with sweet chapatis daily. Keep a silver pot filled with honey in the house. Wear gold in the ear. Donate saptadhanya (seven grains) and blankets. Worship Lord Ganesh regularly."
    text_hindi: "केतु द्वादश भाव उपाय: प्रतिदिन आवारा कुत्तों को मीठी रोटी खिलाएँ। घर में चाँदी के बर्तन में शहद भरकर रखें। कान में सोना पहनें। सप्तधान्य और कम्बल दान करें। नियमित रूप से गणेश जी की पूजा करें।"
    rule_type: "remedy"
