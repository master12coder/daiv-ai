book: "Lal Kitab"
chapter: 1
title: "Lal Kitab Remedies"
description: "Simple, practical remedies from Lal Kitab tradition for planetary afflictions in specific houses."

rules:
  # === SUN IN HOUSES ===
  - verse: 1
    topic: "lal_kitab_remedy"
    planets: [Sun]
    houses: [1]
    text_sanskrit: ""
    text_english: "Sun in 1st house remedy: Offer water (arghya) to the Sun at sunrise daily from a copper vessel. Keep a copper vessel filled with water by the bedside at night. Avoid accepting free items or charity. Feed jaggery (gur) to monkeys on Sundays."
    text_hindi: "सूर्य प्रथम भाव उपाय: प्रतिदिन सूर्योदय के समय ताम्बे के पात्र से सूर्य को अर्घ्य दें। रात को सिरहाने ताम्बे के बर्तन में जल रखें। मुफ्त वस्तुएँ या दान स्वीकार न करें। रविवार को बन्दरों को गुड़ खिलाएँ।"
    rule_type: "remedy"

  - verse: 2
    topic: "lal_kitab_remedy"
    planets: [Sun]
    houses: [6]
    text_sanskrit: ""
    text_english: "Sun in 6th house remedy: Keep almonds (badam) by the bedside and distribute them in the morning. Do not accept electrical items as gift. Keep a solid ball of lead (sisa) near you. Offer wheat and jaggery at a temple on Sundays."
    text_hindi: "सूर्य षष्ठ भाव उपाय: रात को सिरहाने बादाम रखें और सुबह बाँट दें। विद्युत उपकरण उपहार में न लें। सीसे की ठोस गोली पास रखें। रविवार को गेहूँ और गुड़ मन्दिर में अर्पित करें।"
    rule_type: "remedy"

  - verse: 3
    topic: "lal_kitab_remedy"
    planets: [Sun]
    houses: [7]
    text_sanskrit: ""
    text_english: "Sun in 7th house remedy: Marry before the age of 24 if possible. Do not accept dowry. Offer wheat and gur at a religious place on Sundays. Keep a piece of copper (tamba) in your pocket."
    text_hindi: "सूर्य सप्तम भाव उपाय: यदि सम्भव हो तो 24 वर्ष की आयु से पहले विवाह करें। दहेज स्वीकार न करें। रविवार को धार्मिक स्थल पर गेहूँ और गुड़ अर्पित करें। जेब में ताम्बे का टुकड़ा रखें।"
    rule_type: "remedy"

  - verse: 4
    topic: "lal_kitab_remedy"
    planets: [Sun]
    houses: [10]
    text_sanskrit: ""
    text_english: "Sun in 10th house remedy: Keep a dark room (kotha) in the house. Do not keep a handpump or borewell in the house. Throw copper coins in flowing water. Avoid meat and alcohol."
    text_hindi: "सूर्य दशम भाव उपाय: घर में एक अन्धेरा कमरा (कोठा) रखें। घर में हैण्डपम्प या बोरवेल न रखें। बहते जल में ताम्बे के सिक्के प्रवाहित करें। माँस और मद्य का त्याग करें।"
    rule_type: "remedy"

  - verse: 5
    topic: "lal_kitab_remedy"
    planets: [Sun]
    houses: [12]
    text_sanskrit: ""
    text_english: "Sun in 12th house remedy: Throw gur (jaggery) and copper coins in flowing water. Serve your father and take his blessings daily. Keep a solid square piece of copper in the house. Do not live in a house facing south."
    text_hindi: "सूर्य द्वादश भाव उपाय: गुड़ और ताम्बे के सिक्के बहते जल में प्रवाहित करें। पिता की सेवा करें और प्रतिदिन उनका आशीर्वाद लें। घर में ताम्बे का ठोस चौकोर टुकड़ा रखें। दक्षिणमुखी घर में न रहें।"
    rule_type: "remedy"

  # === MOON IN HOUSES ===
  - verse: 6
    topic: "lal_kitab_remedy"
    planets: [Moon]
    houses: [1]
    text_sanskrit: ""
    text_english: "Moon in 1st house remedy: Keep water in a silver vessel by the bedside at night. Offer milk or rice-kheer at a Shiva temple on Mondays. Do not deal in milk or water commercially. Respect your mother and elderly women."
    text_hindi: "चन्द्र प्रथम भाव उपाय: रात को सिरहाने चाँदी के बर्तन में जल रखें। सोमवार को शिव मन्दिर में दूध या चावल की खीर अर्पित करें। दूध या जल का व्यापार न करें। माता और वृद्ध स्त्रियों का सम्मान करें।"
    rule_type: "remedy"

  - verse: 7
    topic: "lal_kitab_remedy"
    planets: [Moon]
    houses: [4]
    text_sanskrit: ""
    text_english: "Moon in 4th house remedy: Keep a square piece of silver in the house. Offer milk at the root of a banyan tree (bargad). Do not construct a well or underground water tank in the house. Wear a silver chain around the neck."
    text_hindi: "चन्द्र चतुर्थ भाव उपाय: घर में चाँदी का चौकोर टुकड़ा रखें। बरगद के वृक्ष की जड़ में दूध अर्पित करें। घर में कुआँ या भूमिगत जल टंकी न बनवाएँ। गले में चाँदी की चेन पहनें।"
    rule_type: "remedy"

  - verse: 8
    topic: "lal_kitab_remedy"
    planets: [Moon]
    houses: [8]
    text_sanskrit: ""
    text_english: "Moon in 8th house remedy: Keep a square piece of silver with you always. Offer milk at a place of worship on Mondays. Keep rain water stored in the house. Do not keep a well or handpump in the house. Bury silver in the foundation of the house."
    text_hindi: "चन्द्र अष्टम भाव उपाय: चाँदी का चौकोर टुकड़ा सदैव पास रखें। सोमवार को पूजा स्थल पर दूध अर्पित करें। घर में वर्षा का जल संचित रखें। घर में कुआँ या हैण्डपम्प न रखें। घर की नींव में चाँदी गाड़ें।"
    rule_type: "remedy"

  - verse: 9
    topic: "lal_kitab_remedy"
    planets: [Moon]
    houses: [10]
    text_sanskrit: ""
    text_english: "Moon in 10th house remedy: Place rice and silver in the foundation of your house. Store rain water or Ganga water in the house. Do not sell milk as a livelihood. Offer water at a religious place on Mondays."
    text_hindi: "चन्द्र दशम भाव उपाय: घर की नींव में चावल और चाँदी रखें। घर में वर्षा या गंगा जल संचित रखें। दूध बेचकर जीविका न चलाएँ। सोमवार को धार्मिक स्थान पर जल अर्पित करें।"
    rule_type: "remedy"

  - verse: 10
    topic: "lal_kitab_remedy"
    planets: [Moon]
    houses: [12]
    text_sanskrit: ""
    text_english: "Moon in 12th house remedy: Donate white cloth and rice to the needy. Offer milk to the Shivling. Keep rain water in the house. Always carry a silver square piece. Avoid selling milk."
    text_hindi: "चन्द्र द्वादश भाव उपाय: जरूरतमन्दों को श्वेत वस्त्र और चावल दान करें। शिवलिंग पर दूध चढ़ाएँ। घर में वर्षा जल रखें। सदैव चाँदी का चौकोर टुकड़ा साथ रखें। दूध बेचने से बचें।"
    rule_type: "remedy"

  # === MARS IN HOUSES ===
  - verse: 11
    topic: "lal_kitab_remedy"
    planets: [Mars]
    houses: [1]
    text_sanskrit: ""
    text_english: "Mars in 1st house remedy: Keep a deer skin (mrig chala) in the house. Offer sweets (batashe) in a place of worship. Do not sell ancestral property. Feed jaggery and gram (chana) to monkeys on Tuesdays."
    text_hindi: "मंगल प्रथम भाव उपाय: घर में मृग छाला रखें। पूजा स्थल पर बताशे अर्पित करें। पैतृक सम्पत्ति न बेचें। मंगलवार को बन्दरों को गुड़ और चना खिलाएँ।"
    rule_type: "remedy"

  - verse: 12
    topic: "lal_kitab_remedy"
    planets: [Mars]
    houses: [4]
    text_sanskrit: ""
    text_english: "Mars in 4th house remedy: Keep a square piece of silver in the house. Offer sindoor (vermilion) at a Hanuman temple on Tuesdays. Grow a neem tree in the house compound. Feed sweet chapati to dogs."
    text_hindi: "मंगल चतुर्थ भाव उपाय: घर में चाँदी का चौकोर टुकड़ा रखें। मंगलवार को हनुमान मन्दिर में सिन्दूर अर्पित करें। घर के आँगन में नीम का वृक्ष लगाएँ। कुत्तों को मीठी रोटी खिलाएँ।"
    rule_type: "remedy"

  - verse: 13
    topic: "lal_kitab_remedy"
    planets: [Mars]
    houses: [7]
    text_sanskrit: ""
    text_english: "Mars in 7th house remedy: Keep a solid piece of silver in the house. Offer sweet bread (meethi roti) to dogs. Wear a silver bangle or chain. Offer sindoor at Hanuman temple on Tuesdays. Avoid red-coloured clothing during important meetings."
    text_hindi: "मंगल सप्तम भाव उपाय: घर में चाँदी का ठोस टुकड़ा रखें। कुत्तों को मीठी रोटी खिलाएँ। चाँदी का कड़ा या चेन पहनें। मंगलवार को हनुमान मन्दिर में सिन्दूर अर्पित करें। महत्त्वपूर्ण बैठकों में लाल वस्त्र न पहनें।"
    rule_type: "remedy"

  - verse: 14
    topic: "lal_kitab_remedy"
    planets: [Mars]
    houses: [8]
    text_sanskrit: ""
    text_english: "Mars in 8th house remedy: Keep a deer skin at home. Offer sindoor and oil at Hanuman temple. Float rewari (sesame sweet) and gajak in flowing water. Keep an iron nail with you. Do not accept free items."
    text_hindi: "मंगल अष्टम भाव उपाय: घर में मृग छाला रखें। हनुमान मन्दिर में सिन्दूर और तेल अर्पित करें। रेवड़ी और गजक बहते जल में प्रवाहित करें। लोहे की कील पास रखें। मुफ्त वस्तुएँ स्वीकार न करें।"
    rule_type: "remedy"

  - verse: 15
    topic: "lal_kitab_remedy"
    planets: [Mars]
    houses: [12]
    text_sanskrit: ""
    text_english: "Mars in 12th house remedy: Offer sweet chapatis to dogs daily. Keep honey (shahad) in the house. Feed birds daily. Keep a red handkerchief in your pocket. Do not lie or deceive others."
    text_hindi: "मंगल द्वादश भाव उपाय: प्रतिदिन कुत्तों को मीठी रोटी खिलाएँ। घर में शहद रखें। प्रतिदिन पक्षियों को दाना डालें। जेब में लाल रूमाल रखें। झूठ न बोलें और किसी को धोखा न दें।"
    rule_type: "remedy"

  # === MERCURY IN HOUSES ===
  - verse: 16
    topic: "lal_kitab_remedy"
    planets: [Mercury]
    houses: [1]
    text_sanskrit: ""
    text_english: "Mercury in 1st house remedy: Pierce your nose (nath for women, pin for men in some traditions). Keep a solid copper ball in your pocket. Wash new clothes before wearing them for the first time. Feed green moong to birds."
    text_hindi: "बुध प्रथम भाव उपाय: नाक छिदवाएँ (स्त्रियों के लिए नथ)। जेब में ताम्बे की ठोस गोली रखें। नये वस्त्र पहनने से पहले धोएँ। पक्षियों को हरी मूँग खिलाएँ।"
    rule_type: "remedy"

  - verse: 17
    topic: "lal_kitab_remedy"
    planets: [Mercury]
    houses: [3]
    text_sanskrit: ""
    text_english: "Mercury in 3rd house remedy: Keep a solid piece of ivory or its substitute in the house. Avoid keeping parrots or green-coloured birds as pets. Donate green vegetables and moong dal on Wednesdays. Clean your teeth with alum (fitkari)."
    text_hindi: "बुध तृतीय भाव उपाय: घर में हाथीदाँत या उसके विकल्प का ठोस टुकड़ा रखें। तोता या हरे रंग के पक्षी पालतू न रखें। बुधवार को हरी सब्जियाँ और मूँग दाल दान करें। फिटकरी से दाँत साफ़ करें।"
    rule_type: "remedy"

  - verse: 18
    topic: "lal_kitab_remedy"
    planets: [Mercury]
    houses: [7]
    text_sanskrit: ""
    text_english: "Mercury in 7th house remedy: Pierce your nose. Bury a copper piece with a hole in deserted land. Do not keep birds as pets. Offer green-coloured items at a mosque or dargah on Wednesdays."
    text_hindi: "बुध सप्तम भाव उपाय: नाक छिदवाएँ। छेद वाला ताम्बे का टुकड़ा वीरान भूमि में गाड़ें। पक्षी पालतू न रखें। बुधवार को मस्जिद या दरगाह में हरे रंग की वस्तुएँ अर्पित करें।"
    rule_type: "remedy"

  - verse: 19
    topic: "lal_kitab_remedy"
    planets: [Mercury]
    houses: [10]
    text_sanskrit: ""
    text_english: "Mercury in 10th house remedy: Wear a copper coin with a hole as a pendant. Offer green bangles and green cloth at a temple. Keep a Gomti Chakra in the house. Do not keep pet birds."
    text_hindi: "बुध दशम भाव उपाय: छेद वाला ताम्बे का सिक्का गले में पहनें। मन्दिर में हरी चूड़ियाँ और हरा वस्त्र अर्पित करें। घर में गोमती चक्र रखें। पक्षी पालतू न रखें।"
    rule_type: "remedy"

  - verse: 20
    topic: "lal_kitab_remedy"
    planets: [Mercury]
    houses: [12]
    text_sanskrit: ""
    text_english: "Mercury in 12th house remedy: Fill an earthen pot with honey and bury it in a deserted place. Wear a stainless steel ring on the little finger. Donate green cloth and moong on Wednesdays. Avoid keeping pet birds or parrots."
    text_hindi: "बुध द्वादश भाव उपाय: मिट्टी के बर्तन में शहद भरकर वीरान स्थान पर गाड़ें। कनिष्ठिका में स्टील की अँगूठी पहनें। बुधवार को हरा वस्त्र और मूँग दान करें। पक्षी या तोता पालतू न रखें।"
    rule_type: "remedy"

  # === JUPITER IN HOUSES ===
  - verse: 21
    topic: "lal_kitab_remedy"
    planets: [Jupiter]
    houses: [1]
    text_sanskrit: ""
    text_english: "Jupiter in 1st house remedy: Apply saffron (kesar) tilak on the forehead. Offer gram dal (chana dal) and turmeric at a temple on Thursdays. Respect teachers, saints, and the elderly. Never cut a peepal tree."
    text_hindi: "गुरु प्रथम भाव उपाय: माथे पर केसर का तिलक लगाएँ। गुरुवार को मन्दिर में चना दाल और हल्दी अर्पित करें। गुरुजनों, सन्तों और वृद्धों का सम्मान करें। कभी पीपल का वृक्ष न काटें।"
    rule_type: "remedy"

  - verse: 22
    topic: "lal_kitab_remedy"
    planets: [Jupiter]
    houses: [2]
    text_sanskrit: ""
    text_english: "Jupiter in 2nd house remedy: Apply saffron tilak daily. Keep gold or yellow items in the house. Serve and feed sadhus and Brahmins on Thursdays. Plant a peepal tree and water it regularly."
    text_hindi: "गुरु द्वितीय भाव उपाय: प्रतिदिन केसर का तिलक लगाएँ। घर में सोना या पीली वस्तुएँ रखें। गुरुवार को साधुओं और ब्राह्मणों को भोजन कराएँ। पीपल का वृक्ष लगाएँ और नियमित जल दें।"
    rule_type: "remedy"

  - verse: 23
    topic: "lal_kitab_remedy"
    planets: [Jupiter]
    houses: [5]
    text_sanskrit: ""
    text_english: "Jupiter in 5th house remedy: Offer saffron and turmeric at a peepal tree on Thursdays. Feed bananas to the poor. Do not accept donations or free items. Keep your character and conduct righteous."
    text_hindi: "गुरु पंचम भाव उपाय: गुरुवार को पीपल के वृक्ष पर केसर और हल्दी अर्पित करें। गरीबों को केले खिलाएँ। दान या मुफ्त वस्तुएँ स्वीकार न करें। अपना चरित्र और आचरण धर्मपरायण रखें।"
    rule_type: "remedy"

  - verse: 24
    topic: "lal_kitab_remedy"
    planets: [Jupiter]
    houses: [8]
    text_sanskrit: ""
    text_english: "Jupiter in 8th house remedy: Apply saffron tilak on the forehead daily. Offer turmeric and gram dal at a temple on Thursdays. Keep gold in the house. Do not accept free items or charity. Worship the peepal tree."
    text_hindi: "गुरु अष्टम भाव उपाय: प्रतिदिन माथे पर केसर का तिलक लगाएँ। गुरुवार को मन्दिर में हल्दी और चना दाल अर्पित करें। घर में सोना रखें। मुफ्त वस्तुएँ या दान स्वीकार न करें। पीपल वृक्ष की पूजा करें।"
    rule_type: "remedy"

  - verse: 25
    topic: "lal_kitab_remedy"
    planets: [Jupiter]
    houses: [12]
    text_sanskrit: ""
    text_english: "Jupiter in 12th house remedy: Wear a yellow thread (pila dhaga) around the wrist. Offer gram dal and jaggery at a temple on Thursdays. Always carry gold on your person. Serve your guru or spiritual teacher."
    text_hindi: "गुरु द्वादश भाव उपाय: कलाई में पीला धागा बाँधें। गुरुवार को मन्दिर में चना दाल और गुड़ अर्पित करें। सदैव सोना अपने पास रखें। अपने गुरु या आध्यात्मिक शिक्षक की सेवा करें।"
    rule_type: "remedy"

  # === VENUS IN HOUSES ===
  - verse: 26
    topic: "lal_kitab_remedy"
    planets: [Venus]
    houses: [1]
    text_sanskrit: ""
    text_english: "Venus in 1st house remedy: Donate a cow or serve cows. Offer white flowers and camphor at a Lakshmi temple on Fridays. Keep curd (dahi) in the house always. Respect your wife and all women."
    text_hindi: "शुक्र प्रथम भाव उपाय: गाय दान करें या गायों की सेवा करें। शुक्रवार को लक्ष्मी मन्दिर में श्वेत पुष्प और कपूर अर्पित करें। घर में सदैव दही रखें। अपनी पत्नी और सभी स्त्रियों का सम्मान करें।"
    rule_type: "remedy"

  - verse: 27
    topic: "lal_kitab_remedy"
    planets: [Venus]
    houses: [4]
    text_sanskrit: ""
    text_english: "Venus in 4th house remedy: Donate white items — rice, sugar, camphor — on Fridays. Keep silver ornaments in the house. Offer perfume or scented items at a place of worship. Respect the opposite sex."
    text_hindi: "शुक्र चतुर्थ भाव उपाय: शुक्रवार को श्वेत वस्तुएँ — चावल, शक्कर, कपूर — दान करें। घर में चाँदी के आभूषण रखें। पूजा स्थल पर इत्र या सुगन्धित वस्तुएँ अर्पित करें। विपरीत लिंग का सम्मान करें।"
    rule_type: "remedy"

  - verse: 28
    topic: "lal_kitab_remedy"
    planets: [Venus]
    houses: [7]
    text_sanskrit: ""
    text_english: "Venus in 7th house remedy: Wash private parts with curd (dahi) as a remedy. Donate a cow. Offer ghee and camphor at a temple on Fridays. Keep the character pure. Feed green fodder to cows."
    text_hindi: "शुक्र सप्तम भाव उपाय: दही से गुप्तांग धोएँ (उपाय के रूप में)। गाय दान करें। शुक्रवार को मन्दिर में घी और कपूर अर्पित करें। चरित्र शुद्ध रखें। गायों को हरा चारा खिलाएँ।"
    rule_type: "remedy"

  - verse: 29
    topic: "lal_kitab_remedy"
    planets: [Venus]
    houses: [10]
    text_sanskrit: ""
    text_english: "Venus in 10th house remedy: Keep a piece of silver in your wallet or purse. Donate rice, white sugar, and camphor on Fridays. Offer white flowers at a Durga temple. Never insult or disrespect women."
    text_hindi: "शुक्र दशम भाव उपाय: बटुए में चाँदी का टुकड़ा रखें। शुक्रवार को चावल, सफ़ेद शक्कर और कपूर दान करें। दुर्गा मन्दिर में श्वेत पुष्प अर्पित करें। कभी स्त्रियों का अपमान न करें।"
    rule_type: "remedy"

  - verse: 30
    topic: "lal_kitab_remedy"
    planets: [Venus]
    houses: [12]
    text_sanskrit: ""
    text_english: "Venus in 12th house remedy: Feed a pair of cows. Throw blue flowers in dirty water (nala/drain). Donate white items on Fridays. Bury ghee in a deserted place. Avoid extramarital affairs strictly."
    text_hindi: "शुक्र द्वादश भाव उपाय: एक जोड़ी गायों को चारा खिलाएँ। गन्दे पानी (नाले) में नीले पुष्प बहाएँ। शुक्रवार को श्वेत वस्तुएँ दान करें। वीरान स्थान पर घी गाड़ें। विवाहेतर सम्बन्ध से सर्वथा बचें।"
