# House to compass direction mapping in Vedic astrology

house_directions:
  1:
    direction: East
    direction_hi: "पूर्व"
    planet: Sun
    significance: "Self, personality, health. Face east for personal strength."
  2:
    direction: North-East
    direction_hi: "ईशान (उत्तर-पूर्व)"
    planet: Jupiter
    significance: "Wealth, family, speech. Ishan corner for prosperity."
  3:
    direction: South-East
    direction_hi: "आग्नेय (दक्षिण-पूर्व)"
    planet: Mars
    significance: "Courage, siblings. Agni corner for energy and initiative."
  4:
    direction: North
    direction_hi: "उत्तर"
    planet: Moon
    significance: "Home, mother, comfort. Face north for emotional peace."
  5:
    direction: North-East
    direction_hi: "ईशान"
    planet: Jupiter
    significance: "Children, education, creativity."
  6:
    direction: South-East
    direction_hi: "आग्नेय"
    planet: Mars
    significance: "Enemies, disease, obstacles."
  7:
    direction: West
    direction_hi: "पश्चिम"
    planet: Saturn
    significance: "Marriage, partnership, business."
  8:
    direction: South-West
    direction_hi: "नैऋत्य (दक्षिण-पश्चिम)"
    planet: Rahu
    significance: "Hidden matters, longevity, transformation."
  9:
    direction: South
    direction_hi: "दक्षिण"
    planet: Venus
    significance: "Fortune, dharma, father, guru."
  10:
    direction: South
    direction_hi: "दक्षिण"
    planet: Mercury
    significance: "Career, public image, karma."
  11:
    direction: North-West
    direction_hi: "वायव्य (उत्तर-पश्चिम)"
    planet: Venus
    significance: "Gains, income, fulfillment of desires."
  12:
    direction: South-West
    direction_hi: "नैऋत्य"
    planet: Saturn
    significance: "Losses, expenses, moksha, foreign travel."

sign_directions:
  Mesha: East
  Vrishabha: South
  Mithuna: West
  Karka: North
  Simha: East
  Kanya: South
  Tula: West
  Vrischika: North
  Dhanu: East
  Makara: South
  Kumbha: West
  Meena: North
