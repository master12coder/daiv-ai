# Combustion limits per planet (degrees from Sun)
# When a planet is within these degrees of the Sun, it is combust (asta)

combustion_limits:
  Moon:
    normal: 12.0
    retrograde: 12.0  # Moon doesn't retrograde, same limit
    notes: "Moon within 12° of Sun = combust. New Moon = maximum combustion. Effects: mental stress, weak mind."

  Mars:
    normal: 17.0
    retrograde: 17.0
    notes: "Mars within 17° of Sun. Effects: reduced courage, blood-related issues, conflict with authority."

  Mercury:
    normal: 14.0
    retrograde: 12.0
    notes: "Mercury often combust due to proximity to Sun. When retrograde, limit reduces to 12°. Effects: communication problems, nervous issues."

  Jupiter:
    normal: 11.0
    retrograde: 11.0
    notes: "Jupiter within 11° of Sun. Effects: reduced wisdom, issues with guru/teacher, financial setbacks."

  Venus:
    normal: 10.0
    retrograde: 8.0
    notes: "Venus within 10° of Sun (8° when retrograde). Effects: relationship difficulties, reduced luxury/comfort."

  Saturn:
    normal: 15.0
    retrograde: 15.0
    notes: "Saturn within 15° of Sun. Effects: career obstacles, health issues, conflict with authority."

# Rahu and Ketu are shadow planets — they cannot be combust
# Sun itself is the combustor, not combustible

effects_of_combustion:
  general:
    - "Planet loses its signification power"
    - "Houses ruled by combust planet suffer"
    - "Dasha of combust planet gives mixed/reduced results"
    - "Person may struggle with the planet's natural themes"
  remedies:
    - "Strengthen the combust planet through its gemstone (with caution)"
    - "Chant the planet's mantra"
    - "Perform daan of the planet's items"
    - "Wear Sun-friendly colors on the planet's day"

cancellation_of_combustion:
  conditions:
    - "Planet in its own sign (still combust but effects reduced)"
    - "Planet in exaltation (strongly mitigates combustion)"
    - "Planet retrograde (reduced combustion effect)"
    - "Aspect of Jupiter on combust planet (partial relief)"
