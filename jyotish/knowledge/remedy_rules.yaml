# Remedy rules — mantras, daan, behavioral remedies per planet

Sun:
  mantra:
    vedic: "ओम् ह्रां ह्रीं ह्रौम् सः सूर्याय नमः"
    simple: "ओम् सूर्याय नमः"
    gayatri: "ओम् भास्कराय विद्महे महातेजाय धीमहि तन्नो सूर्यः प्रचोदयात्"
    count: 7000
  daan:
    items: ["Wheat", "Jaggery (gur)", "Copper", "Red cloth", "Ruby"]
    day: Sunday
    time: "Before sunset"
    recipient: "Temple or Brahmin"
  behavioral:
    - "Wake up early and greet the sunrise"
    - "Offer water (arghya) to Sun daily"
    - "Respect father and authority figures"
    - "Avoid ego-driven conflicts"
    - "Wear Ruby or Garnet on Sunday during Sun hora"
  temple: "Surya temple or any Shiva temple"
  fasting: "Sunday fast — eat one meal before sunset, avoid salt"

Moon:
  mantra:
    vedic: "ओम् श्रां श्रीं श्रौम् सः चन्द्राय नमः"
    simple: "ओम् नमः शिवाय"
    gayatri: "ओम् पद्मध्वजाय विद्महे हेमरूपाय धीमहि तन्नो सोमः प्रचोदयात्"
    count: 11000
  daan:
    items: ["Rice", "Milk", "White cloth", "Silver", "Sugar", "Pearl"]
    day: Monday
    time: "Evening"
    recipient: "Old women or temple"
  behavioral:
    - "Drink more water and milk"
    - "Keep a silver item on person"
    - "Respect mother and maternal figures"
    - "Practice meditation for mental peace"
    - "Avoid overthinking and emotional reactivity"
  temple: "Shiva temple — offer milk to Shivling"
  fasting: "Monday fast — milk/fruit diet"

Mars:
  mantra:
    vedic: "ओम् क्रां क्रीं क्रौम् सः भौमाय नमः"
    simple: "ओम् अंगारकाय नमः"
    gayatri: "ओम् वीरध्वजाय विद्महे विशालनेत्राय धीमहि तन्नो भौमः प्रचोदयात्"
    count: 10000
  daan:
    items: ["Red lentils (masoor dal)", "Red cloth", "Copper", "Jaggery", "Red Coral"]
    day: Tuesday
    time: "Before noon"
    recipient: "Hanuman temple"
  behavioral:
    - "Recite Hanuman Chalisa on Tuesdays"
    - "Avoid anger and aggression"
    - "Channel energy through physical exercise"
    - "Donate blood if healthy"
    - "Serve siblings and younger relatives"
  temple: "Hanuman temple"
  fasting: "Tuesday fast — avoid non-veg and alcohol"

Mercury:
  mantra:
    vedic: "ओम् ब्रां ब्रीं ब्रौम् सः बुधाय नमः"
    simple: "ओम् बुधाय नमः"
    gayatri: "ओम् गजध्वजाय विद्महे परोधासाय धीमहि तन्नो बुधः प्रचोदयात्"
    count: 9000
  daan:
    items: ["Green moong dal", "Green cloth", "Emerald", "Green vegetables"]
    day: Wednesday
    time: "Afternoon"
    recipient: "Students or educational institutions"
  behavioral:
    - "Wear green on Wednesdays"
    - "Study or read something new daily"
    - "Avoid lying or deception"
    - "Keep a green plant in workspace"
    - "Practice clear communication"
  temple: "Vishnu temple or Budh temple"
  fasting: "Wednesday fast — green vegetables diet"

Jupiter:
  mantra:
    vedic: "ओम् ग्रां ग्रीं ग्रौम् सः गुरुवे नमः"
    simple: "ओम् बृहस्पतये नमः"
    gayatri: "ओम् वृषभध्वजाय विद्महे ग्रहराजाय धीमहि तन्नो गुरुः प्रचोदयात्"
    count: 19000
  daan:
    items: ["Chana dal", "Turmeric (haldi)", "Yellow cloth", "Gold", "Books", "Yellow Sapphire"]
    day: Thursday
    time: "Morning"
    recipient: "Guru/teacher, temple priest"
  behavioral:
    - "Respect teachers and elders"
    - "Wear yellow on Thursdays"
    - "Feed bananas to cows"
    - "Read religious/spiritual texts"
    - "Donate to educational causes"
  temple: "Any major temple — especially Vishnu temple"
  fasting: "Thursday fast — banana and chana dal diet"

Venus:
  mantra:
    vedic: "ओम् द्रां द्रीं द्रौम् सः शुक्राय नमः"
    simple: "ओम् शुक्राय नमः"
    gayatri: "ओम् अश्वध्वजाय विद्महे धनुर्हस्ताय धीमहि तन्नो शुक्रः प्रचोदयात्"
    count: 16000
  daan:
    items: ["White rice", "White sweets", "Camphor", "Perfume", "Silver", "Diamond"]
    day: Friday
    time: "Afternoon"
    recipient: "Young women, Lakshmi temple"
  behavioral:
    - "Wear white or pastel colors on Friday"
    - "Maintain cleanliness and hygiene"
    - "Respect wife/partner"
    - "Practice generosity toward women"
    - "Engage in arts, music, or creative activities"
  temple: "Lakshmi temple or Durga temple"
  fasting: "Friday fast — rice and curd diet"

Saturn:
  mantra:
    vedic: "ओम् प्रां प्रीं प्रौम् सः शनैश्चराय नमः"
    simple: "ओम् शं शनैश्चराय नमः"
    gayatri: "ओम् काकध्वजाय विद्महे खड्गहस्ताय धीमहि तन्नो मन्दः प्रचोदयात्"
    count: 23000
  daan:
    items: ["Black sesame (til)", "Mustard oil", "Iron", "Black cloth", "Blue Sapphire", "Urad dal"]
    day: Saturday
    time: "Evening before sunset"
    recipient: "Servants, laborers, disabled persons, Shani temple"
  behavioral:
    - "Serve the underprivileged"
    - "Be disciplined and punctual"
    - "Avoid arrogance and cruelty to workers"
    - "Pour mustard oil on Shani idol on Saturday"
    - "Light a sesame oil lamp under a peepal tree on Saturday evening"
  temple: "Shani temple"
  fasting: "Saturday fast — avoid salt, eat urad dal khichdi"

Rahu:
  mantra:
    vedic: "ओम् भ्रां भ्रीं भ्रौम् सः राहवे नमः"
    simple: "ओम् रां राहवे नमः"
    gayatri: "ओम् नागध्वजाय विद्महे पद्महस्ताय धीमहि तन्नो राहुः प्रचोदयात्"
    count: 18000
  daan:
    items: ["Black sesame", "Coconut", "Blue/black cloth", "Hessonite", "Lead"]
    day: Saturday
    time: "During Rahu Kaal"
    recipient: "Sweepers or outcast persons"
  behavioral:
    - "Avoid materialism and greed"
    - "Don't deceive or manipulate others"
    - "Donate to leprosy patients or social outcasts"
    - "Keep drinking water for birds"
    - "Chant Durga Saptashati or Durga mantras"
  temple: "Kali/Durga temple or Nag temple"
  fasting: "Saturday — combine with Saturn remedies"

Ketu:
  mantra:
    vedic: "ओम् स्रां स्रीं स्रौम् सः केतवे नमः"
    simple: "ओम् कें केतवे नमः"
    gayatri: "ओम् अश्वध्वजाय विद्महे शूलहस्ताय धीमहि तन्नो केतुः प्रचोदयात्"
    count: 17000
  daan:
    items: ["Seven grains mix", "Gray/brown cloth", "Cat's Eye stone", "Sesame"]
    day: Tuesday
    time: "During Ketu time"
    recipient: "Spiritual organizations, sadhus"
  behavioral:
    - "Practice spiritual discipline daily"
    - "Feed dogs (Ketu's animal)"
    - "Practice detachment from material outcomes"
    - "Visit pilgrimages and spiritual places"
    - "Chant Ganesh mantra: ओम् गं गणपतये नमः"
  temple: "Ganesh temple"
  fasting: "Tuesday fast — combine with Mars remedies"
