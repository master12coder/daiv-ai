services:
  # ── Web App (FastAPI + Gunicorn) ──────────────────────────────────
  web:
    build: .
    container_name: jyotish-web
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Telegram Bot (interactive: /daily, /kundali, /level) ─────────
  bot:
    build: .
    container_name: jyotish-bot
    entrypoint: ["python", "-c", "from jyotish_app.telegram.bot import start_bot; start_bot()"]
    command: []
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./charts:/app/charts
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Scheduler (5:30 AM IST daily message) ────────────────────────
  scheduler:
    build: .
    container_name: jyotish-scheduler
    entrypoint: ["python", "-m", "jyotish_app.scheduler"]
    command: []
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./charts:/app/charts
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
